# SILOZI LANGUAGE - COMPREHENSIVE GRAMMAR
# ============================================================================
# SiLozi Grammar — Gobelo Grammar Toolkit (GGT)
# Schema: Gobelo-YAML Grammar Framework v1.0
# Reference: Givón (1970) The Si-Luyana Language; Jacottet (1896/1927)
# Generated: 2025-07-11
# ============================================================================

metadata:
  language:
    name: "SiLozi"
    iso_code: "loz"
    guthrie: "K.21"
    primary_region: "Zambia (Western Province, Barotseland)"
    approximate_speakers: "700000"
    family: "Niger-Congo, Bantu (Zone K)"
    description: "A comprehensive concord and verbal morphology system for SiLozi, covering Sotho-influenced prefix forms, the locative fa- series, and periphrastic TAM constructions, for linguistic, educational, and computational applications."
    dialects: ["Lozi proper", "Luyana", "Kwangwa", "Mbowe", "Mashi"]

  orthography:
    base: "Standard SiLozi Orthography (Zambia)"
    standard: "Zambia 1977 SiLozi Orthography"
    zimbawe: null
    zambia: "Zambia 1977 Orthography"
    alternative: "Missionary Orthography (Paris Evangelical Mission)"

  tone_marking: false
  date_created: "2025-07-11"
  last_updated: "2025-07-11"
  version: "1.0.0 (RC)"

  schema_compatibility:
    min_parser_version: "1.0"
    max_parser_version: "2.x"

  maintainer:
    name: "Your Name"
    email: "your.email@example.com"

  framework:
    name: "Gobelo-YAML Grammar Framework"
    version: "1.0"
    template_for: [Regional Official languages - Bemba, Nyanja, Lozi, Lunda, Kaonde, Luvale, Tonga]
    Yaml_version: 1.0
    license: "MIT"

  documentation: [See docs/grammar_documentation.yaml]
  Target_audience: [Educators, Linguists, Developers, Researchers, Students]
  reference_grammar: "Givón (1970), The Si-Luyana Language; Jacottet (1896/1927), Grammaire du Souto"
  editing_instructions: |
    This file is designed for linguists to read and edit.
    - Add examples liberally for clarity
    - Use verbose descriptions where helpful
    - Include linguistic references
    - NOTE: SiLozi prefix system is Sotho-influenced (mo-/ba-, si-/li-, fa-)
    - VERIFY flags mark forms needing confirmation against Givón (1970)

# ============================================================================
# PHONOLOGY SYSTEM
# ============================================================================

phonology:

  phonology_metadata:
    language: silozi
    framework: gobelo
    module: unified_phonology
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    design_goals:
      - full_reversibility
      - explicit_rule_ordering
      - autosegmental_tone
      - dialect_feature_gating
      - NLP_safe_normalization
      - integrated_sandhi_processing
    sources:
      - Givón 1970
      - Jacottet 1896
      - Fortune 1971
      - Mulenga 2000
      - Doke 1945
    integration_notes:
      This file integrates phonological and sandhi rules into a unified
      processing architecture. Sandhi rules apply post-morphology at
      boundary interfaces, while phonological rules apply at broader
      structural domains. SiLozi phonology is Sotho-influenced with
      some tone neutralisation in loanwords.
    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  # ================================
  # 1. PHONOLOGICAL INVENTORY
  # ================================

  vowels:
    segments: [i, e, a, o, u]
    short: [i, e, a, o, u]
    long: [ii, ee, aa, oo, uu]
    features:
      height:
        high: [i, u]
        mid: [e, o]
        low: [a]
      backness:
        front: [i, e]
        central: [a]
        back: [o, u]
      round:
        rounded: [o, u]
        unrounded: [i, e, a]
    notes: "Vowel length is less contrastive in SiLozi than in Bemba or Luvale; some neutralisation in Sotho-borrowed vocabulary"

  consonants:
    segments: [
        b, d, f, g, h, k, l, m, n, p, s, sh, t, v, w, y, z,
        mb, mp, mf, mv, nd, nf, ng, nk, ns, nt, ny, nz,
        bw, fw, gw, kw, lw, mw, pw, sw, tw, zw,
        by, dy, ky, ny, py, ty,
        zh, dz, ts
      ]
    features:
      place:
        labial: [p, b, m, f, v, w]
        alveolar: [t, d, n, s, z, l]
        velar: [k, g]
        palatal: [y, sh, zh, ny]
        labiodental: [f, v, mf, mv]
      manner:
        stop: [p, t, k, b, d, g]
        nasal: [m, n, ny]
        fricative: [f, v, s, z, sh, zh, h]
        affricate: [ts, dz]
        liquid: [l]
        glide: [w, y]
        prenasalised: [mb, mp, nd, nk, ng, nz, mf, mv]
      voicing:
        voiced: [b, d, g, m, n, v, z, l, w, y, mb, nd, ng, nz, mv, zh, dz]
        voiceless: [p, t, k, f, s, sh, mp, nk, ts, mf]
    notes: "SiLozi shows Sotho consonant influence: zh/sh series active; ts/dz affricates present. No clicks. The sh/zh series distinguishes SiLozi from most Zone M languages."

  syllable_structure:
    pattern: [(C)V(N), CCV(N), CCCV(N)]
    variants: []

  tones:
    levels: ["high", "low", "falling", "rising"]
    notation: ["´", "`", "^", "ˇ"]
    notes: "SiLozi is 2-tone H/L system; some tone neutralisation in loanwords (Sotho influence). Tone is grammatically significant in TAM and relative clause constructions."

  # ================================
  # 2. BOUNDARY MARKERS
  # ================================

  boundaries:
    morpheme: "+"
    zone: "|"
    word: "#"
    phrase: "##"

  # ================================
  # 3. ENGINE FEATURES
  # ================================

  engine_features:
    extended_H_spread:
      type: boolean
      default: false
      note: "Not applicable to SiLozi; extended H-spread is Chibemba-specific only"
    reduced_H_spread:
      type: boolean
      default: false
    initial_H_lowering:
      type: boolean
      default: false

  # ================================
  # 4. PROCESSING ARCHITECTURE
  # ================================

  processing_stages:
    - stage: morphophonology
      description: "Stem-internal and morpheme-triggered alternations"
      applies_to: [stem, affix_attachment]
    - stage: sandhi
      description: "Boundary-conditioned surface adjustments"
      applies_to: [morpheme_boundary, zone_boundary, word_boundary]
    - stage: prosody
      description: "Suprasegmental and phrasal processes"
      applies_to: [syllable, word, phrase]
    - stage: tone
      description: "Tonal association and spreading"
      applies_to: [mora, word, phrase]

  # ================================
  # 5. MORPHOPHONOLOGICAL RULES
  # ================================

  morphophonology:

    - id: VH.1
      type: segmental
      subtype: vowel_harmony
      domain: stem
      stage: morphophonology
      ordering: 1
      input:
        suffix: applicative
      conditions:
        stem_vowel:
          high_or_low: el
          mid: al
      output:
        suffix_form: conditioned
      reversible: true
      notes: "# VERIFY: SiLozi applicative vowel harmony pattern; Sotho influence may reduce height harmony — -el-/-al- reported (prompt Section 6.7); verify against Givón (1970)"

    - id: CA.1
      type: segmental
      subtype: consonant_alternation
      domain: syllable_onset
      stage: morphophonology
      ordering: 2
      input:
        consonant: l
        following_vowel: [+high]
      output:
        consonant: d
      reversible: true
      notes: "# VERIFY: l/d alternation before high vowels in SiLozi; may be reduced due to Sotho influence"

    - id: CA.2
      type: segmental
      subtype: palatalization
      domain: syllable_onset
      stage: morphophonology
      ordering: 3
      input:
        consonant: k
        following_vowel: [+front]
      output:
        consonant: sh
      reversible: true
      notes: "# VERIFY: SiLozi palatalisation reflex; sh- is plausible given Sotho influence, but c- or s- also possible — verify against Givón (1970)"

  # ================================
  # 6. SANDHI RULES
  # ================================

  sandhi_rules:

    - id: SND.1
      name: high_vowel_glide
      type: segmental
      subtype: glide_formation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme, zone]
      ordering: 10
      input:
        left:
          features: [+high, +vowel]
        right:
          features: [+vowel]
      output:
        mapping:
          i: y
          u: w
      blocks: [SND.2]
      reversible: true
      examples:
        - underlying: ku+i+ya
          surface: kuya
      notes: "Glide formation at morpheme boundaries; active in SiLozi ku-/mu- prefix allomorphy"

    - id: SND.2
      name: vowel_coalescence
      type: segmental
      subtype: vowel_coalescence
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 11
      input:
        sequence: [V, V]
      conditions:
        blocked_by: [SND.1]
      output:
        mapping:
          a+i: e
          a+u: o
          i+a: ya
          u+a: wa
      reversible: true
      examples:
        - underlying: ba+a+ya
          surface: baya
      notes: "Vowel coalescence when glide formation is blocked"

    - id: SND.3
      name: nasal_assimilation
      type: segmental
      subtype: nasal_assimilation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 12
      input:
        left:
          segment: N
        right:
          features: [+consonant, +oral]
      output:
        left: homorganic_nasal
      reversible: true
      examples:
        - underlying: N+b
          surface: mb
        - underlying: N+d
          surface: nd
        - underlying: N+f
          surface: mf
      notes: "Place assimilation of nasal prefix NC9/10; mf- before labiodentals active in SiLozi"

    - id: SND.4
      name: vowel_elision
      type: segmental
      subtype: vowel_deletion
      stage: sandhi
      direction: unidirectional
      applies_across: [word]
      ordering: 13
      input:
        left:
          features: [+vowel]
        right:
          boundary: word
      output:
        delete: left
      constraints:
        - prosodic_clitic
      reversible: false
      examples:
        - underlying: ni+ya+a#
          surface: niya
      notes: "Unidirectional; word-boundary vowel deletion in cliticisation"

  # ================================
  # 7. PROSODIC RULES
  # ================================

  prosody:

    - id: MP.1
      type: prosodic
      subtype: mora_preservation
      domain: syllable
      stage: prosody
      ordering: 20
      trigger:
        deleted_segment: consonant
      effect:
        target: adjacent_vowel
        add_mora: 1
      reversible: true

    - id: VL.2
      type: prosodic
      subtype: penultimate_lengthening
      domain: phonological_phrase
      stage: prosody
      ordering: 21
      input:
        position: penultimate
      output:
        vowel_length: long
      reversible: true

  # ================================
  # 8. TONAL RULES
  # ================================

  tone:

    - id: TBU.1
      type: tonal
      subtype: tone_bearing_unit
      domain: mora
      stage: tone
      ordering: 30
      definition:
        each_mora_bears_tone: true
      reversible: true

    - id: TS.1
      type: tonal
      subtype: high_spread
      domain: phonological_word
      stage: tone
      ordering: 31
      gate:
        tone: H
        following_tone: Ø
        block_if_following_tone: H
      effect:
        associate: H
      reversible: true

    - id: TS.2
      type: tonal
      subtype: unbounded_high_spread
      domain: phonological_phrase
      stage: tone
      ordering: 32
      gate:
        engine_feature: extended_H_spread
      effect:
        associate: H_to_all_following
      reversible: true
      notes: "Gated by extended_H_spread: false in SiLozi; this rule does not fire"

    - id: OCP.1
      type: tonal
      subtype: adjacent_H_resolution
      domain: phonological_word
      stage: tone
      ordering: 33
      input:
        sequence: H H
      output:
        delete: first_H
      reversible: true

    - id: TL.1
      type: tonal
      subtype: final_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 34
      gate:
        position: final
        tone: H
      output:
        contour: HL
      reversible: true

    - id: TL.2
      type: tonal
      subtype: penultimate_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 35
      gate:
        position: penultimate
        tone: H
      output:
        contour: HL
      reversible: true

  # ================================
  # 9. RULE INTERACTIONS
  # ================================

  rule_interactions:
    feeding:
      - [SND.1, SND.2]
      - [SND.3, MP.1]
    bleeding:
      - [SND.1, SND.2]
    counterfeeding:
      - [VL.2, SND.4]
    opacity:
      - note: "SND.1 creates opacity in vowel sequences; tone neutralisation in Sotho loanwords creates some opacity in TS.1 application"

  # ================================
  # 10. GLOBAL ORDERING
  # ================================

  global_ordering:
    - morphophonology: [1-9]
    - sandhi: [10-19]
    - prosody: [20-29]
    - tone: [30-39]
  notes:
    Sandhi rules apply after morphophonological processes but before
    phrasal prosody and tone. TS.2 (unbounded H-spread) does not fire
    in SiLozi (extended_H_spread = false). Some tone neutralisation
    occurs in Sotho-influenced vocabulary items.

  # ================================
  # 11. REVERSIBILITY CONSTRAINTS
  # ================================

  constraints:
    - id: R.1
      description: "Mora count must be preserved or explicitly reassigned"
      enforce: true

    - id: R.2
      description: "No contrastive feature deletion"
      forbidden:
        - tone
        - vowel_height
        - vowel_backness

    - id: R.3
      description: "Rule blocking must be explicit"
      enforce: true

    - id: R.4
      description: "Each rule must be independently invertible"
      enforce: true
      exceptions: [SND.4]

    - id: R.5
      description: "Sandhi rules must specify boundary conditions"
      enforce: true
      applies_to: sandhi


# ============================================================================
# NOUN CLASS SYSTEM
# ============================================================================

noun_class_system:

  noun_class_metadata:
    language: silozi
    framework: gobelo
    module: noun_class_system
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    default_pos_tag: NOUN

    augment_system:
      description: "SiLozi has NO augment/pre-prefix system"
      form: null
      usage: "not_applicable"
      contexts: []
      examples: []
      notes: "Unlike Chitonga (i-) or Chibemba (i-/a-), SiLozi does not use a pre-prefix augment. All augment fields are null throughout this file."

    loanword_assignment:
      default_class: "NC9"
      strategy: "phonological_and_semantic"
      notes: "Loanwords from English typically enter NC9/NC10; human loanwords enter NC1/NC2. SiLozi also absorbs Sotho loanwords into NC9."

    sources:
      - Givón 1970
      - Jacottet 1896
      - Fortune 1971
      - Mulenga 2000
      - Doke 1945

    integration_notes: |
      SiLozi (K.21) has a Sotho-influenced noun class prefix system that
      diverges significantly from Chitonga (M.64). Key differences:
      NC1 = mo- (not mu-); NC3 = mo- (not mu-); NC7 = si- (not ci-);
      NC8 = li- (not zi-); NC16 = fa- (not pa-). The mo-/ba- pairing
      mirrors Sotho-Tswana. NC5 and NC8 are both li- but distinguished
      by concord agreement. No augment system.

    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  # ============================================================================
  # NOUN CLASS DEFINITIONS
  # ============================================================================

  noun_classes:

    # ==========================================================================
    # CLASS 1 - Human Singular (Sotho-influenced: mo- not mu-)
    # ==========================================================================
    NC1:
      class_number: 1
      class_type: regular
      grammatical_number: singular
      paired_class: NC2
      frequency: very_high
      active: true

      prefix:
        canonical_form: "mo-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
            examples: [mwana, mwanaa]
        tone: L
        notes: "CRITICAL DIFFERENCE from Chitonga: SiLozi NC1 uses mo- (Sotho-influenced), not mu-. Verify against Givón (1970)."

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +singular]
        typical_referents: [humans, kinship, professions, titles]

    # ==========================================================================
    # CLASS 1a - Kinship/Proper Names Singular
    # ==========================================================================
    NC1a:
      class_number: 1
      class_type: irregular
      grammatical_number: singular
      paired_class: NC2a
      frequency: medium
      active: true

      prefix:
        canonical_form: "Ø-"
        allomorphs: []
        formatives:
          - form: ["na-", "ndate-", "Ø"]
        tone: L
        notes: "# VERIFY: SiLozi kinship prefix forms against Givón (1970); na- is attested for some kin terms"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: kinship_proper_names
        features: [+human, +animate, +singular]
        typical_referents: [kinship_terms, proper_names]

    # ==========================================================================
    # CLASS 2 - Human Plural (ba- — verified as ba- for SiLozi)
    # ==========================================================================
    NC2:
      class_number: 2
      class_type: regular
      grammatical_number: plural
      paired_class: NC1
      frequency: very_high
      active: true

      prefix:
        canonical_form: "ba-"
        allomorphs:
          - form: "b-"
            condition: before_vowels_e_o
            condition_formal: _V[e,o]
        tone: L
        notes: "# VERIFY: SiLozi NC2 prefix — ba- confirmed as likely based on prompt Section 6.2; verify Givón (1970)"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +plural]
        typical_referents: [human_groups, plural_kinship, professions_plural]

    # ==========================================================================
    # CLASS 2a - Kinship/Proper Names Plural
    # ==========================================================================
    NC2a:
      class_number: 2
      class_type: subclass
      grammatical_number: plural
      paired_class: NC1a
      frequency: high
      active: true

      prefix:
        canonical_form: "ba-"
        allomorphs: []
        tone: L
        notes: "Uses NC2 prefix; paired with NC1a nouns"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: kinship_proper_names_plural
        features: [+human, +animate, +plural]
        typical_referents: [kinship_plural, proper_name_plural]

    # ==========================================================================
    # CLASS 2b - Honorific/Respectful Plural
    # ==========================================================================
    NC2b:
      class_number: 2
      class_type: irregular
      grammatical_number: plural
      paired_class: NC1
      frequency: low
      active: true

      prefix:
        canonical_form: "ba-"
        allomorphs: []
        formative: "bama-"
        tone: L
        notes: "# VERIFY: SiLozi honorific plural prefix; bama- for elders/royalty attested in Lozi; verify Givón (1970)"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: respectful_reference
        features: [+human, +animate, +respectful]
        typical_referents: [elders, chiefs, royal_family, respected_persons]

    # ==========================================================================
    # CLASS 3 - Trees/Plants Singular (Sotho-influenced: mo-)
    # ==========================================================================
    NC3:
      class_number: 3
      class_type: regular
      grammatical_number: singular
      paired_class: NC4
      frequency: high
      active: true

      prefix:
        canonical_form: "mo-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "Homophonous with NC1; Sotho-influenced mo- (not mu-). Distinguished by concord agreement."

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: plants_trees_long_objects
        features: [-human, +animate, +singular]
        typical_referents: [trees, plants, long_objects, body_parts]

      notes: "Homophonous with NC1 in prefix form; distinguished by concord"

    # ==========================================================================
    # CLASS 4 - Trees/Plants Plural
    # ==========================================================================
    NC4:
      class_number: 4
      class_type: regular
      grammatical_number: plural
      paired_class: NC3
      frequency: high
      active: true

      prefix:
        canonical_form: "mi-"
        allomorphs:
          - form: "my-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: plants_trees_long_objects_plural
        features: [-human, +animate, +plural]
        typical_referents: [trees_plural, plants_plural, body_parts_plural]

    # ==========================================================================
    # CLASS 5 - Augmentative/Body Parts Singular
    # ==========================================================================
    NC5:
      class_number: 5
      class_type: regular
      grammatical_number: singular
      paired_class: NC6
      frequency: medium
      active: true

      prefix:
        canonical_form: "li-"
        allomorphs:
          - form: "l-"
            condition: before_vowels
            condition_formal: _V
          - form: "Ø"
            condition: some_nouns_take_zero_prefix
        tone: L
        notes: "SiLozi NC5 = li- (same as in Sotho). NOTE: NC8 is also li- — these classes are distinguished ONLY by concord agreement (NC5 concords vs NC8 concords)."

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - CA.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: augmentative_body_parts
        features: [-human, +singular]
        typical_referents: [body_parts, large_items, paired_body_parts, natural_objects]

    # ==========================================================================
    # CLASS 6 - Liquids/Masses/Plurals
    # ==========================================================================
    NC6:
      class_number: 6
      class_type: regular
      grammatical_number: plural
      paired_class: NC5
      frequency: high
      active: true

      prefix:
        canonical_form: "ma-"
        allomorphs:
          - form: "m-"
            condition: before_consonants
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: liquids_masses_plurals
        features: [-human, +plural]
        typical_referents: [liquids, masses, collectives, NC5_plurals]

    # ==========================================================================
    # CLASS 7 - Things/Instruments Singular (CRITICAL: si- not ci-)
    # ==========================================================================
    NC7:
      class_number: 7
      class_type: regular
      grammatical_number: singular
      paired_class: NC8
      frequency: very_high
      active: true

      prefix:
        canonical_form: "si-"
        allomorphs:
          - form: "s-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "CRITICAL DIFFERENCE from Chitonga: SiLozi NC7 = si- (Sotho-influenced), NOT ci-. Verify against Givón (1970) and Jacottet (1896/1927)."

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: things_instruments_languages
        features: [-human, -animate, +singular]
        typical_referents: [objects, instruments, languages, customs, diminutives]

    # ==========================================================================
    # CLASS 8 - Things/Instruments Plural (CRITICAL: li- not zi-)
    # ==========================================================================
    NC8:
      class_number: 8
      class_type: regular
      grammatical_number: plural
      paired_class: NC7
      frequency: very_high
      active: true

      prefix:
        canonical_form: "li-"
        allomorphs:
          - form: "l-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "CRITICAL DIFFERENCE from Chitonga: SiLozi NC8 = li- (NOT zi-). WARNING: NC8 (li-) is homophonous with NC5 (li-) — distinguished ONLY by concord agreement and pairing context. Verify against Givón (1970)."

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: things_instruments_plural
        features: [-human, -animate, +plural]
        typical_referents: [objects_plural, instruments_plural, languages_plural]

    # ==========================================================================
    # CLASS 9 - Animals/Loanwords Singular
    # ==========================================================================
    NC9:
      class_number: 9
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: very_high
      active: true

      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
            condition_formal: _[+labial]
          - form: "n-"
            condition: before_alveolars
            condition_formal: _[+alveolar]
          - form: "ng-"
            condition: before_velars
            condition_formal: _[+velar]
          - form: "mf-"
            condition: before_labiodentals
            condition_formal: _f
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
        notes: "Abstract N- assimilates to following consonant place"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.3
        - MP.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: animals_loanwords_diverse
        features: [-human, +singular]
        typical_referents: [animals, loanwords, diverse_objects]

      notes: "NC9 is the only class with exclusive nasal assimilation rules"

    # ==========================================================================
    # CLASS 10 - Animals/Loanwords Plural
    # ==========================================================================
    NC10:
      class_number: 10
      class_type: regular
      grammatical_number: plural
      paired_class: NC9
      frequency: very_high
      active: true

      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
            condition_formal: _[+labial]
          - form: "n-"
            condition: before_alveolars
            condition_formal: _[+alveolar]
          - form: "ng-"
            condition: before_velars
            condition_formal: _[+velar]
          - form: "mf-"
            condition: before_labiodentals
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
        notes: "# VERIFY: NC10 plural forms — may also use li- in some analyses; nasal prefix form is most conservative"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.3
        - MP.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: animals_loanwords_diverse_plural
        features: [-human, +plural]
        typical_referents: [animals_plural, loanwords_plural]

    # ==========================================================================
    # CLASS 11 - Long Objects Singular
    # ==========================================================================
    NC11:
      class_number: 11
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: medium
      active: true

      prefix:
        canonical_form: "lu-"
        allomorphs:
          - form: "lw-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: long_thin_objects
        features: [-human, +singular]
        typical_referents: [long_thin_objects, abstract_nouns, body_parts_linear]

    # ==========================================================================
    # CLASS 12 - Diminutive Singular
    # ==========================================================================
    NC12:
      class_number: 12
      class_type: regular
      grammatical_number: singular
      paired_class: NC13
      frequency: medium
      active: true

      prefix:
        canonical_form: "ka-"
        allomorphs:
          - form: "k-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: diminutives_small
        features: [-human, +singular, +diminutive]
        typical_referents: [small_objects, diminutives, affectionate_reference]

    # ==========================================================================
    # CLASS 13 - Diminutive Plural
    # ==========================================================================
    NC13:
      class_number: 13
      class_type: regular
      grammatical_number: plural
      paired_class: NC12
      frequency: medium
      active: true

      prefix:
        canonical_form: "tu-"
        allomorphs:
          - form: "tw-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: diminutives_plural
        features: [-human, +plural, +diminutive]
        typical_referents: [small_objects_plural, diminutives_plural]

    # ==========================================================================
    # CLASS 14 - Abstract/Mass Nouns
    # ==========================================================================
    NC14:
      class_number: 14
      class_type: regular
      grammatical_number: singular
      paired_class: null
      frequency: high
      active: true

      prefix:
        canonical_form: "bu-"
        allomorphs:
          - form: "bw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "SiLozi NC14 = bu- (same as Chitonga); NOT u- as in Nyanja/Chichewa"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: abstract_mass
        features: [-human, -count, +singular]
        typical_referents: [abstract_qualities, masses, uncountables]

      notes: "Typically has no plural; mass/abstract interpretation"

    # ==========================================================================
    # CLASS 15 - Infinitives
    # ==========================================================================
    NC15:
      class_number: 15
      class_type: verbal
      grammatical_number: null
      paired_class: null
      frequency: very_high
      active: true

      prefix:
        canonical_form: "ku-"
        allomorphs:
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: verbal_infinitives
        features: [+verbal, -count]
        typical_referents: [actions, processes, infinitival_complements]

      notes: "Forms infinitives; ku- consistent with Chitonga baseline"

    # ==========================================================================
    # CLASS 16 - Locative (Definite Surface) — CRITICAL: fa- not pa-
    # ==========================================================================
    NC16:
      class_number: 16
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true

      prefix:
        canonical_form: "fa-"
        allomorphs:
          - form: "f-"
            condition: before_a_vowel
        tone: L
        notes: "CRITICAL DIFFERENCE from all other Zambian languages: SiLozi NC16 = fa- (Sotho influence), NOT pa-. This affects ALL NC16 concords throughout the file. Verify against Givón (1970)."

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: definite_surface_location
        features: [+locative, +definite, +surface]
        typical_referents: [specific_places, surfaces, at_locations]

    # ==========================================================================
    # CLASS 17 - Locative (Directional/General)
    # ==========================================================================
    NC17:
      class_number: 17
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true

      prefix:
        canonical_form: "ku-"
        allomorphs:
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: directional_general_location
        features: [+locative, -definite]
        typical_referents: [general_areas, directions, to_locations]

      notes: "Homophonous with NC15 in prefix; distinguished by context"

    # ==========================================================================
    # CLASS 18 - Locative (Interior)
    # ==========================================================================
    NC18:
      class_number: 18
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: medium
      active: true

      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1

      semantics:
        primary_domain: interior_location
        features: [+locative, +interior]
        typical_referents: [inside_places, within_locations, in_locations]

      notes: "Homophonous with NC1/NC3 in reduced form; distinguished by concord and semantics"

  # ============================================================================
  # NOUN CLASS FEATURES
  # ============================================================================

  noun_class_features:
    cross_class_patterns:
      high_vowel_classes:
        description: "Classes triggering SND.1 (Glide Formation)"
        classes: [NC1, NC3, NC4, NC5, NC7, NC8, NC11, NC12, NC13, NC14, NC15, NC17, NC18]
        rule: SND.1

      low_vowel_classes:
        description: "Classes triggering SND.2 (Vowel Coalescence)"
        classes: [NC2, NC6, NC16]
        rule: SND.2

      nasal_classes:
        description: "Classes with exclusive nasal assimilation"
        classes: [NC9, NC10]
        rule: SND.3
        note: "ONLY classes with class-specific phonology"

      human_classes:
        description: "Classes for human reference"
        classes: [NC1, NC2]
        features: [+human, +animate]

      locative_classes:
        description: "Locative noun classes"
        classes: [NC16, NC17, NC18]
        features: [+locative]

      homophonous_prefixes:
        "mo-": [NC1, NC3]
        "ku-": [NC15, NC17]
        "mu-": [NC18]
        "li-": [NC5, NC8]
        note: "li- is shared by NC5 and NC8 — distinguished exclusively by concord agreement"

      derivational_patterns:

        diminutive_formation:
          source_class: "any"
          target_class: "NC12/NC13"
          pattern: "ka-/tu- + stem"
          semantic_change: "indicates smallness, affection, or contempt"
          examples:
            - base: "mutu (person, NC1)"
              derived: "kamutu (little person)"
              plural: "tumutu (little people)"
            - base: "ndu (house, NC9)"
              derived: "kandu (little house)"
              plural: "tundu (little houses)"
            - base: "sicintu (thing, NC7)"
              derived: "kacintu (little thing)"  # VERIFY: diminutive of si- class noun
              plural: "tucintu (little things)"

        augmentative_formation:
          source_class: "any"
          target_class: "NC5/NC6"
          pattern: "li-/ma- + stem"
          semantic_change: "indicates largeness or importance"
          examples:
            - base: "sicintu (thing, NC7)"
              derived: "licintu (big thing)"  # VERIFY
              plural: "macintu (big things)"

        language_names:
          source_class: "NC1 (ethnic group)"
          target_class: "NC7"
          pattern: "si- + ethnic stem"
          semantic_change: "creates language name from ethnic group"
          examples:
            - base: "mulozi (Lozi person, NC1)"
              derived: "silozi (Lozi language, NC7)"
            - base: "mutonga (Tonga person)"
              derived: "sitonga (Tonga language)"
            - base: "mungeleji (English person)"
              derived: "sингeleji (English language)"  # VERIFY orthography

        abstract_nouns:
          source_class: "adjective"
          target_class: "NC14"
          pattern: "bu- + adjective stem"
          semantic_change: "creates abstract quality noun"
          examples:
            - base: "-tuna (big)"
              derived: "butuna (bigness)"  # VERIFY
            - base: "-nde (good/beautiful)"
              derived: "bunde (goodness/beauty)"  # VERIFY
            - base: "-swa (new)"
              derived: "buswa (newness)"  # VERIFY

        infinitives:
          source_class: "verb stem"
          target_class: "NC15"
          pattern: "ku- + verb stem"
          semantic_change: "creates infinitive/verbal noun"
          examples:
            - base: "-ca (eat)"
              derived: "kuca (to eat/eating)"
            - base: "-ya (go)"
              derived: "kuya (to go/going)"
            - base: "-beleka (work)"
              derived: "kubeleka (to work/working)"  # VERIFY

        manner_nouns:
          source_class: "verb stem"
          target_class: "NC7"
          pattern: "si- + verb stem"
          semantic_change: "creates manner/way of doing"
          examples:
            - base: "-bala (read)"
              derived: "sibala (way of reading)"  # VERIFY

        locative_derivation:
          source_class: "any noun"
          target_class: "NC16/17/18"
          patterns:
            - "fa- + noun (at/on) — SiLozi-specific"
            - "ku- + noun (to/towards)"
            - "mu- + noun (in/inside)"
          examples:
            - base: "ndu (house, NC9)"
              derived:
                - "fandu (at the house)"  # VERIFY fa- + ndu
                - "kundo (to the house)"  # VERIFY
                - "mundo (in the house)"  # VERIFY

      semantic_notes:

        class_pairing_semantics:
          description: "Semantic relationships between singular and plural classes"
          patterns:
            - pairing: "NC1/NC2"
              semantics: "human beings"
              examples: ["mutu/batu (person/people)"]  # VERIFY batu vs bantu
            - pairing: "NC3/NC4"
              semantics: "trees, plants, natural objects"
              examples: ["muti/miti (tree/trees)", "mutwe/mitwe (head/heads)"]  # VERIFY
            - pairing: "NC5/NC6"
              semantics: "large/important objects, paired body parts"
              examples: ["lino/mano (tooth/teeth)"]  # VERIFY
            - pairing: "NC7/NC8"
              semantics: "things, objects, instruments, languages (si-/li-)"
              examples: ["sicintu/licintu (thing/things)", "silozi (Lozi language)"]  # VERIFY li- plural
            - pairing: "NC9/NC10"
              semantics: "animals, loanwords, various objects"
              examples: ["ng'ombe/ing'ombe (cow/cows)"]  # VERIFY
            - pairing: "NC12/NC13"
              semantics: "diminutives, small objects"
              examples: ["kamutu/tumutu (little person/little people)"]  # VERIFY

        loanword_assignment:
          description: "How borrowed words are assigned to noun classes"
          strategies:
            - strategy: "phonological"
              description: "Nouns entering with consonant onset → NC9"
              examples:
                - word: "basi (bus)"
                  class: "NC9"
                  plural: "mabasi (NC6)"
                - word: "foni (phone)"
                  class: "NC9"
            - strategy: "semantic"
              description: "Human referents → NC1/NC2"
              examples:
                - word: "dokotela (doctor)"
                  class: "NC1"
                  plural: "badokotela (NC2)"

        homonymy_disambiguation:
          description: "How context and concord disambiguate identical prefix forms"
          examples:
            - forms: "li-"
              meanings:
                - class: "NC5"
                  meaning: "augmentative/body parts singular"
                  example: "lino (tooth) — NC5 concord: la"
                - class: "NC8"
                  meaning: "plural of NC7 (si-) nouns"
                  example: "licintu (things) — NC8 concord: za (VERIFY)"
            - forms: "mo-"
              meanings:
                - class: "NC1"
                  meaning: "human singular"
                  example: "mofu (blind person) — NC1 concord: wa"
                - class: "NC3"
                  meaning: "tree/plant singular"
                  example: "muti (tree) — NC3 concord: wa"

      dialectal_variation:
        description: "Variation across SiLozi dialects"

        major_dialects:
          - name: "Lozi proper"
            region: "Mongu, Senanga, Sesheke — Western Province"
            speakers: "~400,000"
            characteristics:
              - "Prestige dialect; standard written form"
              - "Most developed literary tradition (Paris Mission)"
              - "Sotho influence strongest in prefix forms"
          - name: "Luyana"
            region: "Northern and central Barotseland"
            speakers: "~100,000"
            characteristics:
              - "Substrate of SiLozi; historically prior language of Barotseland"
              - "More conservative in some morphological features"
              - "Distinct vocabulary in some domains"  # VERIFY
          - name: "Kwangwa"
            region: "Western Barotseland"
            speakers: "~50,000"
            characteristics:
              - "# VERIFY: Relationship to SiLozi proper"
          - name: "Mashi"
            region: "Southern Barotseland (Namibia border)"
            speakers: "~50,000"
            characteristics:
              - "# VERIFY: Distinctive features against SiLozi proper"

        phonological_variation:
          - feature: "NC7 prefix"
            lozi_proper: "si-"
            luyana: "si- (consistent)"  # VERIFY
            note: "si- appears consistent across dialects"
          - feature: "NC16 locative"
            lozi_proper: "fa-"
            other_dialects: "fa- (consistent — Sotho origin)"

        lexical_variation:
          - concept: "house"
            lozi_proper: "ndu"  # VERIFY
            variation: "ng'anda (Chitonga-borrowed form also used)"
          - concept: "person"
            lozi_proper: "mutu"  # VERIFY
            variation: "muntu (more Bantu conservative form)"

      usage_notes:

        register_variation:
          formal:
            description: "Used in official contexts, church (Paris Mission legacy), education"
            features:
              - "Fuller forms preferred"
              - "Standard SiLozi orthography"
              - "Less mixing with Sotho or Chitonga vocabulary"
          informal:
            description: "Used in casual conversation"
            features:
              - "More loanwords from English and Chitonga"
              - "Some tone simplification"
          respectful:
            description: "Used for royalty (Litunga), elders, and formal occasions"
            features:
              - "NC2b honorific forms"
              - "Special register for addressing the Litunga (paramount chief)"
              - "Avoidance of direct reference to royalty"

        contemporary_changes:
          - change: "english_loanwords"
            description: "Increasing English loanwords entering NC9"
            examples: ["foni (phone)", "kompyuta (computer)", "motoka (car)"]
          - change: "chitonga_contact"
            description: "Some Chitonga vocabulary entering urban SiLozi"
            trend: "increasing in Livingstone and along line-of-rail"
          - change: "tone_neutralisation"
            description: "Tonal distinctions weakening in urban varieties"
            trend: "observed among younger speakers"

        cultural_notes:
          - note: "royal_language"
            description: "SiLozi is the language of the Litunga (king) and the Kuomboka ceremony"
            example: "Kuomboka — the royal barge ceremony; documented Lozi cultural institution"
          - note: "lingua_franca"
            description: "SiLozi serves as a regional lingua franca across Western Province"
          - note: "kinship_system"
            description: "Extensive kinship terminology; different terms for maternal/paternal relatives"

        special_rules:
          - rule: "mo_glide_formation"
            description: "mo- becomes mw- before vowel-initial stems"
            examples:
              - "mo- + ana → mwana (child)"
              - "mo- + ami → mwami (chief/husband)"
          - rule: "fa_locative"
            description: "fa- is the SiLozi-specific surface locative (NC16); replaces pa- of other Bantu languages"
            examples:
              - "fa + ndu → fandu (at the house)"  # VERIFY
          - rule: "si_li_homophony"
            description: "NC5 li- and NC8 li- are distinguished only by concord patterns and semantic pairing"
            note: "Parser must track concord, not just prefix, to disambiguate NC5 vs NC8"


# ============================================================================
# CONCORD SYSTEM
# ============================================================================

concord_system:
  concords_metadata:
    description: "Agreement markers for SiLozi across all grammatical contexts. Critical differences from Chitonga: NC7 concords use si- series; NC8 concords use li-/za- series; NC16 locative uses fa-; NC1/NC3 use mo-/wa- pattern."

  concords:

    # === SUBJECT CONCORDS ===
    subject_concords:
      description: "Subject markers appearing on verbs"
      position: "pre_TAM"

      NEG.SG:    { forms: ["ha", "si"], tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "NEG.1SG", note: "# VERIFY: SiLozi 1SG negative; ha- or si- based on Sotho/Bantu hybrid" }
      1SG:       { forms: ["ni"], allomorphs: { forms: ["n"] }, tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "1SG.SM", note: "ni- (Sotho-influenced 1SG)" }
      2SG:       { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "2SG.SM" }
      3SG:       { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "3SG.SM" }
      NEG.1PL:   { forms: ["ha"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "NEG.1PL", note: "# VERIFY: SiLozi 1PL negative marker" }
      1PL_EXCL:  { forms: ["lu"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.EXCL.SM", note: "lu- 1PL exclusive (Sotho-influenced)" }
      1PL_INCL:  { forms: ["lw"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.INCL.SM" }
      2PL:       { forms: ["mu"], allomorphs: { forms: ["mw"] }, tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "2PL.SM" }
      3PL_HUMAN: { forms: ["ba", "b"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "3PL.SM" }
      # Noun class concords
      NC3:  { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC3", syntax_expectation: "subject", gloss: "CL3.SM" }
      NC4:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC4", syntax_expectation: "subject", gloss: "CL4.SM" }
      NC5:  { forms: ["li"], allomorphs: { forms: ["l"] }, tone: "L", agreement: "NC5", syntax_expectation: "subject", gloss: "CL5.SM" }
      NC6:  { forms: ["a"], allomorphs: { forms: ["Ø"] }, tone: "L", agreement: "NC6", syntax_expectation: "subject", gloss: "CL6.SM" }
      NC7:  { forms: ["si"], allomorphs: { forms: ["s"] }, tone: "L", agreement: "NC7", syntax_expectation: "subject", gloss: "CL7.SM", note: "si- not ci- — Sotho-influenced K.21 zone" }
      NC8:  { forms: ["li"], allomorphs: { forms: ["l"] }, tone: "L", agreement: "NC8", syntax_expectation: "subject", gloss: "CL8.SM", note: "li- same as NC5 but different agreement — VERIFY distinction" }
      NC9:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC9", syntax_expectation: "subject", gloss: "CL9.SM" }
      NC10: { forms: ["li", "i"], tone: "L", agreement: "NC10", syntax_expectation: "subject", gloss: "CL10.SM", note: "# VERIFY: NC10 SM form in SiLozi; li- or i-?" }

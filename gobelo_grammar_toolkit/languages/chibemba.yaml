# CHIBEMBA LANGUAGE - COMPREHENSIVE GRAMMAR
# ============================================================================
# ChiBemba Grammar — Gobelo Grammar Toolkit (GGT)
# Schema: Gobelo-YAML Grammar Framework v1.0
# Reference: Spitulnik & Kashoki (1992); Hoch (1960)
# Generated: 2025-07-11
# ============================================================================

metadata:
  language:
    name: "ChiBemba"
    iso_code: "bem"
    guthrie: "M.42"
    primary_region: "Zambia (Northern, Luapula, Copperbelt Provinces)"
    approximate_speakers: "4.1 million"
    family: "Niger-Congo, Bantu (Zone M)"
    description: "A comprehensive concord and verbal morphology system for ChiBemba, covering major dialects for linguistic, educational, and computational applications."
    dialects: ["Bemba proper", "Bisa", "Lala", "Swaka", "Luunda"]

  orthography:
    base: "Standard Zambia Bemba Orthography"
    standard: "Zambia 1977 Revised Orthography"
    alternative: "Missionary Orthography (White Fathers)"

  tone_marking: false
  date_created: "2025-07-11"
  last_updated: "2025-07-11"
  version: "1.0.0 (RC)"

  schema_compatibility:
    min_parser_version: "1.0"
    max_parser_version: "2.x"

  maintainer:
    name: "Your Name"
    email: "your.email@example.com"

  framework:
    name: "Gobelo-YAML Grammar Framework"
    version: "1.0"
    template_for: [Regional Official languages - Bemba, Nyanja, Lozi, Lunda, Kaonde, Luvale, Tonga]
    Yaml_version: 1.0
    license: "MIT"

  documentation: [See docs/grammar_documentation.yaml]
  Target_audience: [Educators, Linguists, Developers, Researchers, Students]
  reference_grammar: "Spitulnik & Kashoki (1992), A Bemba Grammar; Hoch (1960), Bemba Pocket Grammar"
  editing_instructions: |
    This file is designed for linguists to read and edit.
    - Add examples liberally for clarity
    - Use verbose descriptions where helpful
    - Include linguistic references

# ============================================================================
# PHONOLOGY SYSTEM
# ============================================================================

phonology:

  phonology_metadata:
    language: chibemba
    framework: gobelo
    module: unified_phonology
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    design_goals:
      - full_reversibility
      - explicit_rule_ordering
      - autosegmental_tone
      - dialect_feature_gating
      - NLP_safe_normalization
      - integrated_sandhi_processing
    sources:
      - Spitulnik & Kashoki 1992
      - Hoch 1960
      - Jones 1943
      - Goldsmith 1984
      - Hyman 2007
    integration_notes:
      This file integrates phonological and sandhi rules into a unified
      processing architecture. Sandhi rules apply post-morphology at
      boundary interfaces, while phonological rules apply at broader structural domains.
    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  # ================================
  # 1. PHONOLOGICAL INVENTORY
  # ================================

  vowels:
    segments: [i, e, a, o, u]
    short: [i, e, a, o, u]
    long: [ii, ee, aa, oo, uu]
    features:
      height:
        high: [i, u]
        mid: [e, o]
        low: [a]
      backness:
        front: [i, e]
        central: [a]
        back: [o, u]
      round:
        rounded: [o, u]
        unrounded: [i, e, a]
    notes: "Contrastive vowel length is phonologically significant in Chibemba, especially in TAM distinctions"

  consonants:
    segments: [
        b, f, fy, g, h, k, l, m, n, p, s, sh, t, v, w, y,
        mb, mp, mf, mfsh, mv, mw, my, nc, nd, nf, ng, nk, ns, nt, nsh, nw, ny, nz,
        bw, fw, gw, kw, lw, pw, sw, tw, vw,
        by, ky, py, ty,
        bb, ff, gg, kk, pp, tt
      ]
    features:
      place:
        labial: [p, b, m, f, v, w, fy, mv]
        alveolar: [t, d, n, s, z, l]
        velar: [k, g]
        palatal: [y, sh, ny]
      manner:
        stop: [p, t, k, b, g]
        nasal: [m, n, ny]
        fricative: [f, v, s, sh, fy]
        liquid: [l]
        glide: [w, y]
        prenasalised: [mb, mp, mf, mv, nd, nk, ng, ns, nt, nsh]
      voicing:
        voiced: [b, g, m, n, v, l, w, y, mb, mv, nd, ng]
        voiceless: [p, t, k, f, s, sh, mp, mf, nk, ns, nt, nsh]
    notes: "The fy/fsh bilabial-palatal fricative series is characteristic of Chibemba (M.42 zone). Geminate consonants (bb, ff, etc.) occur in intensive verb forms."

  syllable_structure:
    pattern: [(C)V(N), CCV(N), CCCV(N)]
    variants: []

  tones:
    levels: ["high", "low", "falling", "rising"]
    notation: ["´", "`", "^", "ˇ"]
    notes: "Chibemba has complex H-tone spreading (unbounded rightward); floating H tones on prefixes are grammatically distinctive. TAM distinctions depend heavily on tonal melody."

  # ================================
  # 2. BOUNDARY MARKERS
  # ================================

  boundaries:
    morpheme: "+"
    zone: "|"
    word: "#"
    phrase: "##"

  # ================================
  # 3. ENGINE FEATURES
  # ================================

  engine_features:
    extended_H_spread:
      type: boolean
      default: true
      note: "Chibemba-specific: unbounded rightward H-tone spreading activates TS.2"
    reduced_H_spread:
      type: boolean
      default: false
    initial_H_lowering:
      type: boolean
      default: false

  # ================================
  # 4. PROCESSING ARCHITECTURE
  # ================================

  processing_stages:
    - stage: morphophonology
      description: "Stem-internal and morpheme-triggered alternations"
      applies_to: [stem, affix_attachment]
    - stage: sandhi
      description: "Boundary-conditioned surface adjustments"
      applies_to: [morpheme_boundary, zone_boundary, word_boundary]
    - stage: prosody
      description: "Suprasegmental and phrasal processes"
      applies_to: [syllable, word, phrase]
    - stage: tone
      description: "Tonal association and spreading (including unbounded H-spread)"
      applies_to: [mora, word, phrase]

  # ================================
  # 5. MORPHOPHONOLOGICAL RULES
  # ================================

  morphophonology:

    - id: VH.1
      type: segmental
      subtype: vowel_harmony
      domain: stem
      stage: morphophonology
      ordering: 1
      input:
        suffix: applicative
      conditions:
        stem_vowel:
          high_or_low: il
          mid: el
      output:
        suffix_form: conditioned
      reversible: true
      notes: "Height harmony conditions applicative -il-/-el- and related suffixes"

    - id: CA.1
      type: segmental
      subtype: consonant_alternation
      domain: syllable_onset
      stage: morphophonology
      ordering: 2
      input:
        consonant: l
        following_vowel: [+high]
      output:
        consonant: d
      reversible: true
      notes: "l/d alternation before high vowels; attested in some Bemba dialects"

    - id: CA.2
      type: segmental
      subtype: palatalization
      domain: syllable_onset
      stage: morphophonology
      ordering: 3
      input:
        consonant: k
        following_vowel: [+front]
      output:
        consonant: sh
      reversible: true
      notes: "Chibemba reflex of *k-palatalisation is sh (not c as in Chitonga); e.g., *ki- → shi- in some environments"

  # ================================
  # 6. SANDHI RULES
  # ================================

  sandhi_rules:

    - id: SND.1
      name: high_vowel_glide
      type: segmental
      subtype: glide_formation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme, zone]
      ordering: 10
      input:
        left:
          features: [+high, +vowel]
        right:
          features: [+vowel]
      output:
        mapping:
          i: y
          u: w
      blocks: [SND.2]
      reversible: true
      examples:
        - underlying: ku+i+enda
          surface: kuyenda
      notes: "Glide formation at morpheme boundaries; same as Chitonga baseline"

    - id: SND.2
      name: vowel_coalescence
      type: segmental
      subtype: vowel_coalescence
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 11
      input:
        sequence: [V, V]
      conditions:
        blocked_by: [SND.1]
      output:
        mapping:
          a+i: e
          a+u: o
          i+a: ya
          u+a: wa
      reversible: true
      examples:
        - underlying: ba+a+enda
          surface: benda
      notes: "Vowel coalescence applies when glide formation is blocked"

    - id: SND.3
      name: nasal_assimilation
      type: segmental
      subtype: nasal_assimilation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 12
      input:
        left:
          segment: N
        right:
          features: [+consonant, +oral]
      output:
        left: homorganic_nasal
      reversible: true
      examples:
        - underlying: N+b
          surface: mb
        - underlying: N+d
          surface: nd
        - underlying: N+f
          surface: mf
        - underlying: N+sh
          surface: nsh
      notes: "Place assimilation of nasal prefix to following consonant; includes labiodental mf- before /f/"

    - id: SND.4
      name: vowel_elision
      type: segmental
      subtype: vowel_deletion
      stage: sandhi
      direction: unidirectional
      applies_across: [word]
      ordering: 13
      input:
        left:
          features: [+vowel]
        right:
          boundary: word
      output:
        delete: left
      constraints:
        - prosodic_clitic
      reversible: false
      examples:
        - underlying: na+enda+a#
          surface: naenda
      notes: "Unidirectional; applies only in word-boundary cliticisation contexts"

  # ================================
  # 7. PROSODIC RULES
  # ================================

  prosody:

    - id: MP.1
      type: prosodic
      subtype: mora_preservation
      domain: syllable
      stage: prosody
      ordering: 20
      trigger:
        deleted_segment: consonant
      effect:
        target: adjacent_vowel
        add_mora: 1
      reversible: true
      notes: "Compensatory lengthening; passive vowel lengthening -w-/-iiw- in Chibemba is analysed via this rule"

    - id: VL.2
      type: prosodic
      subtype: penultimate_lengthening
      domain: phonological_phrase
      stage: prosody
      ordering: 21
      input:
        position: penultimate
      output:
        vowel_length: long
      reversible: true

  # ================================
  # 8. TONAL RULES
  # ================================

  tone:

    - id: TBU.1
      type: tonal
      subtype: tone_bearing_unit
      domain: mora
      stage: tone
      ordering: 30
      definition:
        each_mora_bears_tone: true
      reversible: true

    - id: TS.1
      type: tonal
      subtype: high_spread
      domain: phonological_word
      stage: tone
      ordering: 31
      gate:
        tone: H
        following_tone: Ø
        block_if_following_tone: H
      effect:
        associate: H
      reversible: true

    - id: TS.2
      type: tonal
      subtype: unbounded_high_spread
      domain: phonological_phrase
      stage: tone
      ordering: 32
      gate:
        engine_feature: extended_H_spread
      effect:
        associate: H_to_all_following
      reversible: true
      notes: "Chibemba-specific: rightward unbounded H-tone spreading across the phonological phrase; activated by engine_features.extended_H_spread: true"

    - id: OCP.1
      type: tonal
      subtype: adjacent_H_resolution
      domain: phonological_word
      stage: tone
      ordering: 33
      input:
        sequence: H H
      output:
        delete: first_H
      reversible: true

    - id: TL.1
      type: tonal
      subtype: final_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 34
      gate:
        position: final
        tone: H
      output:
        contour: HL
      reversible: true

    - id: TL.2
      type: tonal
      subtype: penultimate_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 35
      gate:
        position: penultimate
        tone: H
      output:
        contour: HL
      reversible: true

  # ================================
  # 9. RULE INTERACTIONS
  # ================================

  rule_interactions:
    feeding:
      - [SND.1, SND.2]
      - [SND.3, MP.1]
      - [OCP.1, TS.1]   # OCP feeds H-spread (Meeussen's Rule ordering)
    bleeding:
      - [SND.1, SND.2]
    counterfeeding:
      - [VL.2, SND.4]
    opacity:
      - note: "SND.1 creates opacity in vowel sequences; extended H-spread creates opaque tonal domains in TS.2"

  # ================================
  # 10. GLOBAL ORDERING
  # ================================

  global_ordering:
    - morphophonology: [1-9]
    - sandhi: [10-19]
    - prosody: [20-29]
    - tone: [30-39]
  notes:
    Sandhi rules must apply after morphophonological processes but before
    phrasal prosody and tone. OCP.1 is ordered before TS.1 to respect
    Meeussen's Rule in Chibemba tonal derivations. TS.2 (unbounded spread)
    is gated by engine_features.extended_H_spread and applies only in Chibemba.

  # ================================
  # 11. REVERSIBILITY CONSTRAINTS
  # ================================

  constraints:
    - id: R.1
      description: "Mora count must be preserved or explicitly reassigned"
      enforce: true

    - id: R.2
      description: "No contrastive feature deletion"
      forbidden:
        - tone
        - vowel_height
        - vowel_backness

    - id: R.3
      description: "Rule blocking must be explicit"
      enforce: true

    - id: R.4
      description: "Each rule must be independently invertible"
      enforce: true
      exceptions: [SND.4]

    - id: R.5
      description: "Sandhi rules must specify boundary conditions"
      enforce: true
      applies_to: sandhi


# ============================================================================
# NOUN CLASS SYSTEM
# ============================================================================

noun_class_system:

  noun_class_metadata:
    language: chibemba
    framework: gobelo
    module: noun_class_system
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    default_pos_tag: NOUN

    augment_system:
      description: "Pre-prefix that appears before noun class prefix"
      form: "i-"
      secondary_form: "a-"
      usage: "optional"
      contexts: ["definite_reference", "specific_reference", "emphasis", "isolation_form"]
      examples:
        - without_augment: "umuntu (a person)"
          with_augment: "umuntu (the person — tone distinguishes)"
        - without_augment: "ifikolwe (things)"
          with_augment: "ifikolwe (the things)"
      notes: "# VERIFY: Augment realisation in Chibemba is closely tied to tonal melody; the augment i- may fuse with the noun prefix via glide formation or coalescence"

    loanword_assignment:
      default_class: "NC9"
      strategy: "phonological_and_semantic"
      notes: "Loanwords from English typically enter NC9/NC10; human loanwords enter NC1/NC2"

    sources:
      - Spitulnik & Kashoki 1992
      - Hoch 1960
      - Jones 1943
      - CBOLD

    integration_notes:
      Noun class prefixes in Chibemba (M.42 zone) differ critically from Chitonga
      (M.64) in the NC7/NC8 slot — Chibemba uses fi-/bi- where Chitonga uses ci-/zi-.
      The NC12/NC13 ka-/tu- diminutive series is highly productive in Chibemba.

    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  # ============================================================================
  # NOUN CLASS DEFINITIONS
  # ============================================================================

  noun_classes:

    # ==========================================================================
    # CLASS 1 - Human Singular
    # ==========================================================================
    NC1:
      class_number: 1
      class_type: regular
      grammatical_number: singular
      paired_class: NC2
      frequency: very_high
      active: true

      prefix:
        canonical_form: "u-"
        allomorphs:
          - form: "w-"
            condition: before_vowels
            condition_formal: _V
            examples: [umwana, umwaume]
        tone: L
        notes: "# VERIFY: Some analyses give mu- for NC1 in Chibemba; u- is the most common surface form in modern Zambia Bemba"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +singular]
        typical_referents: [humans, kinship, professions, titles]

    # ==========================================================================
    # CLASS 1a - Kinship/Proper Names Singular
    # ==========================================================================
    NC1a:
      class_number: 1
      class_type: irregular
      grammatical_number: singular
      paired_class: NC2a
      frequency: medium
      active: true

      prefix:
        canonical_form: "Ø-"
        allomorphs: []
        formatives:
          - form: ["na-", "shi-", "ba-", "Ø"]
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: kinship_proper_names
        features: [+human, +animate, +singular]
        typical_referents: [kinship_terms, proper_names, animals_treated_as_persons]

    # ==========================================================================
    # CLASS 2 - Human Plural
    # ==========================================================================
    NC2:
      class_number: 2
      class_type: regular
      grammatical_number: plural
      paired_class: NC1
      frequency: very_high
      active: true

      prefix:
        canonical_form: "ba-"
        allomorphs:
          - form: "b-"
            condition: before_vowels_e_o
            condition_formal: _V[e,o]
        tone: L

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +plural]
        typical_referents: [human_groups, plural_kinship, professions_plural]

    # ==========================================================================
    # CLASS 2a - Kinship/Proper Names Plural
    # ==========================================================================
    NC2a:
      class_number: 2
      class_type: subclass
      grammatical_number: plural
      paired_class: NC1a
      frequency: high
      active: true

      prefix:
        canonical_form: "ba-"
        allomorphs: []
        tone: L
        notes: "Uses NC2 prefix; paired with NC1a nouns"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: kinship_proper_names_plural
        features: [+human, +animate, +plural]
        typical_referents: [kinship_plural, proper_name_plural]

    # ==========================================================================
    # CLASS 2b - Honorific/Respectful Plural
    # ==========================================================================
    NC2b:
      class_number: 2
      class_type: irregular
      grammatical_number: plural
      paired_class: NC1
      frequency: low
      active: true

      prefix:
        canonical_form: "ba-"
        allomorphs: []
        formative: "bama-"
        tone: L
        notes: "Plural prefix used for respectful reference to singular person"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: respectful_reference
        features: [+human, +animate, +respectful]
        typical_referents: [elders, chiefs, respected_persons]

    # ==========================================================================
    # CLASS 3 - Trees/Plants Singular
    # ==========================================================================
    NC3:
      class_number: 3
      class_type: regular
      grammatical_number: singular
      paired_class: NC4
      frequency: high
      active: true

      prefix:
        canonical_form: "u-"
        allomorphs:
          - form: "w-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "Homophonous with NC1 in surface form; distinguished by concord agreement"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: plants_trees_long_objects
        features: [-human, +animate, +singular]
        typical_referents: [trees, plants, long_objects, body_parts]

      notes: "Homophonous with NC1 in prefix form; distinguished by concord"

    # ==========================================================================
    # CLASS 4 - Trees/Plants Plural
    # ==========================================================================
    NC4:
      class_number: 4
      class_type: regular
      grammatical_number: plural
      paired_class: NC3
      frequency: high
      active: true

      prefix:
        canonical_form: "i-"
        allomorphs:
          - form: "y-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: plants_trees_long_objects_plural
        features: [-human, +animate, +plural]
        typical_referents: [trees_plural, plants_plural, body_parts_plural]

    # ==========================================================================
    # CLASS 5 - Augmentative/Body Parts Singular
    # ==========================================================================
    NC5:
      class_number: 5
      class_type: regular
      grammatical_number: singular
      paired_class: NC6
      frequency: medium
      active: true

      prefix:
        canonical_form: "ili-"
        allomorphs:
          - form: "li-"
            condition: common_shortened_form
          - form: "Ø"
            condition: some_nouns_zero_prefix
        tone: L
        notes: "# VERIFY: Chibemba NC5 prefix is often cited as ili- (fuller form than Chitonga li-); verify against Spitulnik & Kashoki (1992)"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - CA.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: augmentative_body_parts
        features: [-human, +singular]
        typical_referents: [body_parts, large_items, paired_body_parts, natural_objects]

    # ==========================================================================
    # CLASS 6 - Liquids/Masses/Plurals
    # ==========================================================================
    NC6:
      class_number: 6
      class_type: regular
      grammatical_number: plural
      paired_class: NC5
      frequency: high
      active: true

      prefix:
        canonical_form: "ama-"
        allomorphs:
          - form: "ma-"
            condition: reduced_form_common
          - form: "m-"
            condition: before_consonants
        tone: L
        notes: "# VERIFY: Chibemba often shows fuller ama- (not just ma-); verify frequency of ama- vs ma- in modern usage"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: liquids_masses_plurals
        features: [-human, +plural]
        typical_referents: [liquids, masses, collectives, NC5_plurals]

    # ==========================================================================
    # CLASS 7 - Things/Instruments Singular (KEY DIFFERENCE: fi- not ci-)
    # ==========================================================================
    NC7:
      class_number: 7
      class_type: regular
      grammatical_number: singular
      paired_class: NC8
      frequency: very_high
      active: true

      prefix:
        canonical_form: "ifi-"
        allomorphs:
          - form: "fi-"
            condition: reduced_form_common
          - form: "f-"
            condition: before_vowels
        tone: L
        notes: "CRITICAL DIFFERENCE from Chitonga: Chibemba NC7 prefix is fi- (not ci-). The fuller form ifi- is common in isolation."

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: things_instruments_diminutives
        features: [-human, -animate, +singular]
        typical_referents: [objects, instruments, diminutives, languages, customs]

    # ==========================================================================
    # CLASS 8 - Things/Instruments Plural (KEY DIFFERENCE: bi- not zi-)
    # ==========================================================================
    NC8:
      class_number: 8
      class_type: regular
      grammatical_number: plural
      paired_class: NC7
      frequency: very_high
      active: true

      prefix:
        canonical_form: "ibi-"
        allomorphs:
          - form: "bi-"
            condition: reduced_form_common
          - form: "b-"
            condition: before_vowels
        tone: L
        notes: "CRITICAL DIFFERENCE from Chitonga: Chibemba NC8 prefix is bi- (not zi-). The fuller form ibi- appears in isolation contexts."

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: things_instruments_plural
        features: [-human, -animate, +plural]
        typical_referents: [objects_plural, instruments_plural, diminutives_plural]

    # ==========================================================================
    # CLASS 9 - Animals/Loanwords Singular
    # ==========================================================================
    NC9:
      class_number: 9
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: very_high
      active: true

      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
            condition_formal: _[+labial]
          - form: "n-"
            condition: before_alveolars
            condition_formal: _[+alveolar]
          - form: "ng-"
            condition: before_velars
            condition_formal: _[+velar]
          - form: "mf-"
            condition: before_labiodentals
            condition_formal: _f
          - form: "nsh-"
            condition: before_palatals_sh
            condition_formal: _sh
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
        notes: "Abstract N- assimilates to following consonant; includes mf- before /f/ which is a Chibemba-specific allomorph"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.3
        - MP.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: animals_loanwords_diverse
        features: [-human, +singular]
        typical_referents: [animals, loanwords, diverse_objects]

      notes: "NC9 is the only class with exclusive nasal assimilation rules. Chibemba adds mf- before /f/ beyond the Chitonga baseline."

    # ==========================================================================
    # CLASS 10 - Animals/Loanwords Plural
    # ==========================================================================
    NC10:
      class_number: 10
      class_type: regular
      grammatical_number: plural
      paired_class: NC9
      frequency: very_high
      active: true

      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
            condition_formal: _[+labial]
          - form: "n-"
            condition: before_alveolars
            condition_formal: _[+alveolar]
          - form: "ng-"
            condition: before_velars
            condition_formal: _[+velar]
          - form: "mf-"
            condition: before_labiodentals
            condition_formal: _f
          - form: "nsh-"
            condition: before_palatals_sh
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
        notes: "Identical to NC9 in prefix form; distinguished by concord agreement"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.3
        - MP.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: animals_loanwords_diverse_plural
        features: [-human, +plural]
        typical_referents: [animals_plural, loanwords_plural]

    # ==========================================================================
    # CLASS 11 - Long Objects Singular
    # ==========================================================================
    NC11:
      class_number: 11
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: medium
      active: true

      prefix:
        canonical_form: "ulu-"
        allomorphs:
          - form: "lu-"
            condition: reduced_form
          - form: "lw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "# VERIFY: Chibemba NC11 may appear as ulu- in isolation vs lu- in connected speech"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: long_thin_objects
        features: [-human, +singular]
        typical_referents: [long_thin_objects, abstract_nouns, body_parts_linear]

    # ==========================================================================
    # CLASS 12 - Diminutive Singular (highly productive in Chibemba)
    # ==========================================================================
    NC12:
      class_number: 12
      class_type: regular
      grammatical_number: singular
      paired_class: NC13
      frequency: high
      active: true

      prefix:
        canonical_form: "aka-"
        allomorphs:
          - form: "ka-"
            condition: reduced_form
          - form: "k-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "NC12 ka- diminutive is highly productive in Chibemba, more so than in Chitonga"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: diminutives_small
        features: [-human, +singular, +diminutive]
        typical_referents: [small_objects, diminutives, affectionate_reference]

    # ==========================================================================
    # CLASS 13 - Diminutive Plural (highly productive in Chibemba)
    # ==========================================================================
    NC13:
      class_number: 13
      class_type: regular
      grammatical_number: plural
      paired_class: NC12
      frequency: high
      active: true

      prefix:
        canonical_form: "utu-"
        allomorphs:
          - form: "tu-"
            condition: reduced_form
          - form: "tw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "NC13 tu- diminutive plural; fuller form utu- in isolation"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: diminutives_plural
        features: [-human, +plural, +diminutive]
        typical_referents: [small_objects_plural, diminutives_plural]

    # ==========================================================================
    # CLASS 14 - Abstract/Mass Nouns
    # ==========================================================================
    NC14:
      class_number: 14
      class_type: regular
      grammatical_number: singular
      paired_class: null
      frequency: high
      active: true

      prefix:
        canonical_form: "ubu-"
        allomorphs:
          - form: "bu-"
            condition: reduced_form
          - form: "bw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "Chibemba NC14 prefix is bu- (same as Chitonga); fuller form ubu- in isolation"

      augment:
        form: "i-"
        usage: optional

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: abstract_mass
        features: [-human, -count, +singular]
        typical_referents: [abstract_qualities, masses, uncountables]

      notes: "Typically has no plural; mass/abstract interpretation"

    # ==========================================================================
    # CLASS 15 - Infinitives
    # ==========================================================================
    NC15:
      class_number: 15
      class_type: verbal
      grammatical_number: null
      paired_class: null
      frequency: very_high
      active: true

      prefix:
        canonical_form: "uku-"
        allomorphs:
          - form: "ku-"
            condition: reduced_form_in_connected_speech
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "Chibemba infinitive prefix is uku- (fuller form) / ku- (reduced); same function as Chitonga ku-"

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: verbal_infinitives
        features: [+verbal, -count]
        typical_referents: [actions, processes, infinitival_complements]

      notes: "Forms infinitives from verb roots; no plural"

    # ==========================================================================
    # CLASS 16 - Locative (Definite Surface)
    # ==========================================================================
    NC16:
      class_number: 16
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true

      prefix:
        canonical_form: "pa-"
        allomorphs:
          - form: "p-"
            condition: before_a_vowel
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: definite_surface_location
        features: [+locative, +definite, +surface]
        typical_referents: [specific_places, surfaces, at_locations]

    # ==========================================================================
    # CLASS 17 - Locative (Directional/General)
    # ==========================================================================
    NC17:
      class_number: 17
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true

      prefix:
        canonical_form: "ku-"
        allomorphs:
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: directional_general_location
        features: [+locative, -definite]
        typical_referents: [general_areas, directions, to_locations]

      notes: "Homophonous with NC15 in reduced form; distinguished by context"

    # ==========================================================================
    # CLASS 18 - Locative (Interior)
    # ==========================================================================
    NC18:
      class_number: 18
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: medium
      active: true

      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
        tone: L

      augment:
        form: null
        usage: not_applicable

      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TS.2

      semantics:
        primary_domain: interior_location
        features: [+locative, +interior]
        typical_referents: [inside_places, within_locations, in_locations]

      notes: "Homophonous with NC3 in reduced form; distinguished by concord and semantics"

  # ============================================================================
  # NOUN CLASS FEATURES
  # ============================================================================

  noun_class_features:
    cross_class_patterns:
      high_vowel_classes:
        description: "Classes triggering SND.1 (Glide Formation)"
        classes: [NC1, NC3, NC4, NC7, NC8, NC11, NC14, NC15, NC17, NC18]
        rule: SND.1

      low_vowel_classes:
        description: "Classes triggering SND.2 (Vowel Coalescence)"
        classes: [NC2, NC6, NC16]
        rule: SND.2

      nasal_classes:
        description: "Classes with exclusive nasal assimilation"
        classes: [NC9, NC10]
        rule: SND.3
        note: "ONLY classes with class-specific phonology"

      human_classes:
        description: "Classes for human reference"
        classes: [NC1, NC2]
        features: [+human, +animate]

      locative_classes:
        description: "Locative noun classes"
        classes: [NC16, NC17, NC18]
        features: [+locative]

      homophonous_prefixes:
        "u-": [NC1, NC3]
        "ku-": [NC15, NC17]
        "mu-": [NC18]
        note: "Distinguished by concord agreement patterns"

      derivational_patterns:

        diminutive_formation:
          source_class: "any"
          target_class: "NC12/NC13"
          pattern: "aka-/utu- + stem"
          semantic_change: "indicates smallness, affection, or contempt; highly productive in Chibemba"
          examples:
            - base: "umuntu (person, NC1)"
              derived: "akamuntu (little person)"
              plural: "utumuntu (little people)"
            - base: "imbwa (dog, NC9)"
              derived: "akambwa (little dog)"
              plural: "utumbwa (little dogs)"
            - base: "inshima (porridge, NC9)"
              derived: "akanshima (small portion of porridge)"
              plural: "utunsima (small portions)"

        augmentative_formation:
          source_class: "any"
          target_class: "NC5/NC6"
          pattern: "ili-/ama- + stem"
          semantic_change: "indicates largeness or importance"
          examples:
            - base: "ifikolwe (things, NC7)"
              derived: "ilikolwe (big thing)"
              plural: "amakolwe (big things)"

        language_names:
          source_class: "NC1 (ethnic group)"
          target_class: "NC7"
          pattern: "ifi- + ethnic stem"
          semantic_change: "creates language name from ethnic group"
          examples:
            - base: "umubemba (Bemba person, NC1)"
              derived: "ichibemba (Bemba language, NC7)"
            - base: "umutonga (Tonga person)"
              derived: "ichitonga (Tonga language)"
            - base: "umufwila (Luvale person)"
              derived: "ichiluvale (Luvale language)"

        abstract_nouns:
          source_class: "adjective"
          target_class: "NC14"
          pattern: "ubu-/bu- + adjective stem"
          semantic_change: "creates abstract quality noun"
          examples:
            - base: "-mfumu (chief)"
              derived: "ubufumu (chieftainship)"
            - base: "-suma (good)"
              derived: "ubusuma (goodness)"
            - base: "-muntu (person)"
              derived: "ubuntu (humanity, personhood)"

        infinitives:
          source_class: "verb stem"
          target_class: "NC15"
          pattern: "uku- + verb stem"
          semantic_change: "creates infinitive/verbal noun"
          examples:
            - base: "-lya (eat)"
              derived: "ukulya (to eat/eating)"
            - base: "-buta (hunt)"
              derived: "ukubuta (to hunt/hunting)"
            - base: "-ya (go)"
              derived: "ukuya (to go/going)"

        manner_nouns:
          source_class: "verb stem"
          target_class: "NC7"
          pattern: "ifi- + verb stem"
          semantic_change: "creates manner/way of doing"
          examples:
            - base: "-soma (read)"
              derived: "ifisomo (reading matter, literacy)"
            - base: "-bele (speak)"
              derived: "ifikabelo (saying, proverb)"

        locative_derivation:
          source_class: "any noun"
          target_class: "NC16/17/18"
          patterns:
            - "pa- + noun (at/on)"
            - "ku- + noun (to/towards)"
            - "mu- + noun (in/inside)"
          examples:
            - base: "ng'anda (house, NC9)"
              derived:
                - "pang'anda (at the house)"
                - "kung'anda (to the house)"
                - "mung'anda (in the house)"

      semantic_notes:

        class_pairing_semantics:
          description: "Semantic relationships between singular and plural classes"
          patterns:
            - pairing: "NC1/NC2"
              semantics: "human beings"
              examples: ["umuntu/abantu (person/people)"]
            - pairing: "NC3/NC4"
              semantics: "trees, plants, natural objects, extended body parts"
              examples: ["umuti/imiti (tree/trees)", "umutwe/imitwe (head/heads)"]
            - pairing: "NC5/NC6"
              semantics: "large/important objects, paired body parts"
              examples: ["iliino/amano (tooth/teeth)", "ilisabi/amasabi (fish/fish)"]
            - pairing: "NC7/NC8"
              semantics: "things, objects, instruments, languages, customs (fi-/bi- in Chibemba)"
              examples: ["ifintu/ibintu (thing/things)", "ichibemba (Bemba language)"]
            - pairing: "NC9/NC10"
              semantics: "animals, loanwords, various objects"
              examples: ["imbwa/imbwa (dog/dogs)", "inshimi/inshimi (bee/bees)"]
            - pairing: "NC12/NC13"
              semantics: "diminutives, small objects (highly productive)"
              examples: ["akamuntu/utumuntu (little person/little people)"]

        loanword_assignment:
          description: "How borrowed words are assigned to noun classes"
          strategies:
            - strategy: "phonological"
              description: "Nouns beginning with certain sounds → NC9"
              examples:
                - word: "basi (bus)"
                  class: "NC9"
                  plural: "mabasi (NC6)"
                - word: "sitima (train)"
                  class: "NC9"
            - strategy: "semantic"
              description: "Human referents → NC1/NC2"
              examples:
                - word: "dokotela (doctor)"
                  class: "NC1"
                  plural: "badokotela (NC2)"

        homonymy_disambiguation:
          description: "How context and concord disambiguate identical forms"
          examples:
            - forms: "umuntu"
              meanings:
                - class: "NC1"
                  meaning: "person (human)"
                - class: "NC18"
                  meaning: "# VERIFY: potential interior locative usage"
            - forms: "imbwa"
              meanings:
                - singular: "dog (one)"
                  example: "imbwa iyi (this dog — NC9 concord)"
                - plural: "dogs (many)"
                  example: "imbwa izi (these dogs — NC10 concord)"

      dialectal_variation:
        description: "Variation across Chibemba dialects"

        major_dialects:
          - name: "Bemba proper"
            region: "Northern Province, Kasama, Chinsali"
            speakers: "~2.5 million"
            characteristics:
              - "Prestige dialect; basis of standard written form"
              - "Fuller prefix forms (ifi-, ibi-, uku-) more common"
              - "Complex tonal system fully preserved"
          - name: "Bisa"
            region: "Muchinga Province"
            speakers: "~300,000"
            characteristics:
              - "Closely related variety"
              - "Some lexical divergence"
              - "High mutual intelligibility with Bemba proper"
          - name: "Lala"
            region: "Central Province, Serenje"
            speakers: "~350,000"
            characteristics:
              - "More innovative; some prefix simplifications"
              - "Possible NC7 fi- vs shi- variation"  # VERIFY
          - name: "Swaka"
            region: "Mpika area"
            speakers: "~80,000"
            characteristics:
              - "Conservative variety"
              - "Close to Bemba proper"

        phonological_variation:
          - feature: "NC7 prefix"
            bemba_proper: "ifi-/fi-"
            lala: "ifi-/fi-"  # VERIFY: some sources suggest shi- variant
            note: "fi- is standard across dialects but # VERIFY Lala variant"
          - feature: "NC15 prefix"
            bemba_proper: "uku-/ku-"
            others: "uku-/ku- (consistent)"

        lexical_variation:
          - concept: "water"
            bemba_proper: "amanzi"
            variation: "amanshi (some dialects)"  # VERIFY
          - concept: "fire"
            bemba_proper: "umoto"
            variation: "umwoto (some dialects)"  # VERIFY

      usage_notes:

        register_variation:
          formal:
            description: "Used in official contexts, church, education, media"
            features:
              - "Fuller prefix forms (uku-, ifi-, ubu-)"
              - "Conservative tonal patterns"
              - "Avoidance of loanwords where Chibemba equivalent exists"
          informal:
            description: "Used in casual conversation"
            features:
              - "Reduced prefix forms (ku-, fi-, bu-)"
              - "More loanwords from English"
              - "Contracted forms common on Copperbelt"
          respectful:
            description: "Used when addressing elders or in ceremonial contexts"
            features:
              - "NC2b honorific usage"
              - "Respectful kinship terms"
              - "Use of bama- prefix for respected adults"

        contemporary_changes:
          - change: "prefix_reduction"
            description: "Younger and urban speakers use shorter prefix forms"
            example: "ku- instead of uku-; fi- instead of ifi-"
          - change: "tone_simplification"
            description: "Complex tonal patterns simplified on Copperbelt"
            trend: "increasing among urban youth"
          - change: "loanword_integration"
            description: "More English loanwords entering NC9"
            examples: ["foni (phone)", "basi (bus)", "motoka (car)"]

        cultural_notes:
          - note: "respect_system"
            description: "Hierarchical respect shown through NC2b and bama- prefix for elders"
            example: "Addressing an elder man as bamishimbi (father figure)"
          - note: "kinship_terms"
            description: "Elaborate kinship system with distinct terms for maternal/paternal relatives"
          - note: "chieftaincy_language"
            description: "Special vocabulary around chiefs (abafumu); plural of umufumu is abafumu"

        special_rules:
          - rule: "vowel_coalescence_at_prefix_boundary"
            description: "uku- becomes ukw- before vowels; ifi- becomes if- before vowels"
            examples:
              - "uku- + -iya → ukuya (to go)"
              - "ifi- + -ino → ifino (this thing — shortened)"
          - rule: "augment_tonal_function"
            description: "In Chibemba the augment i-/a- also carries tonal information distinguishing definite from indefinite"
            examples:
              - "umuntu (indefinite — a person)"
              - "omuntu / umuntu-H (definite tone — the person)"  # VERIFY tone pattern
          - rule: "honorific_concord"
            description: "Elders and chiefs addressed with plural concords even when singular"
            note: "Uses bama- prefixed forms or straight NC2 concords for respect"


# ============================================================================
# CONCORD SYSTEM
# ============================================================================

concord_system:
  concords_metadata:
    description: "Agreement markers for ChiBemba across all grammatical contexts. Key differences from Chitonga: NC7 concords use fi-/f- series; NC8 concords use bi-/b- series."

  concords:

    # === SUBJECT CONCORDS ===
    subject_concords:
      description: "Subject markers appearing on verbs"
      position: "pre_TAM"

      # Personal pronouns
      NEG.SG:  { forms: ["nshi", "si"], tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "NEG.1SG" }
      1SG:     { forms: ["ndi"], allomorphs: { forms: ["nd", "n"] }, tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "1SG.SM" }
      2SG:     { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "2SG.SM" }
      3SG:     { forms: ["a"], allomorphs: { forms: ["Ø"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "3SG.SM" }
      NEG.1PL: { forms: ["te"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "NEG.1PL" }
      1PL_EXCL: { forms: ["tu"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.EXCL.SM" }
      1PL_INCL: { forms: ["tw"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.INCL.SM" }
      2PL:     { forms: ["mu"], allomorphs: { forms: ["mw"] }, tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "2PL.SM" }
      3PL_HUMAN: { forms: ["ba", "b"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "3PL.SM" }
      # Noun class concords
      NC3:  { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC3", syntax_expectation: "subject", gloss: "CL3.SM" }
      NC4:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC4", syntax_expectation: "subject", gloss: "CL4.SM" }
      NC5:  { forms: ["ili", "li"], allomorphs: { forms: ["ly"] }, tone: "L", agreement: "NC5", syntax_expectation: "subject", gloss: "CL5.SM" }
      NC6:  { forms: ["a"], allomorphs: { forms: ["Ø"] }, tone: "L", agreement: "NC6", syntax_expectation: "subject", gloss: "CL6.SM" }
      NC7:  { forms: ["ifi", "fi"], allomorphs: { forms: ["f"] }, tone: "L", agreement: "NC7", syntax_expectation: "subject", gloss: "CL7.SM", note: "fi- not ci- — Chibemba M.42 zone" }
      NC8:  { forms: ["ibi", "bi"], allomorphs: { forms: ["b"] }, tone: "L", agreement: "NC8", syntax_expectation: "subject", gloss: "CL8.SM", note: "bi- not zi- — Chibemba M.42 zone" }
      NC9:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC9", syntax_expectation: "subject", gloss: "CL9.SM" }
      NC10: { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC10", syntax_expectation: "subject", gloss: "CL10.SM", note: "# VERIFY: NC10 SM may be i- same as NC9 or bi- in some analyses" }
      NC11: { forms: ["lu"], allomorphs: { forms: ["lw"] }, tone: "L", agreement: "NC11", syntax_expectation: "subject", gloss: "CL11.SM" }
      NC12: { forms: ["aka", "ka"], allomorphs: { forms: ["k"] }, tone: "L", agreement: "NC12", syntax_expectation: "subject", gloss: "CL12.SM" }

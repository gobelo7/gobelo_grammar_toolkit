# ============================================================================
# CHITONGA LANGUAGE - COMPREHENSIVE NOUN CLASS SYSTEM
# ============================================================================
metadata:
  language:
    name: "ChiTonga"
    iso_code: "toi"
    guthrie: "M.64"
    primary_region: "Zambia (Southern, Central Provinces)"
    approximate_speakers: "1.5 million"
    family: "Niger-Congo, Bantu (Zone M)"
    description: "A comprehensive concord and verbal morphology system for Chitonga, covering major dialects for linguistic, educational, and computational applications."

    dialects: ["Zambian Chitonga", "Zimbabwean Chitonga", "Plateau Chitonga", "Valley Chitonga"]

  orthography:
    base: Tonga-Pronto
    standard: Modern Zambia Standard Chitonga
    zimbawe: Zimbabwe Chitonga 2013 Version
    zambia: Zambia 1973 Orthography
    alternative: Missionary Orthography
  tone_marking: false
  
  date_created: "2025-04-07"
  last_updated: "2025-04-25"
  
  version: "1.0.0 (RC)"

  
  schema_compatibility:
    min_parser_version: "1.0"
    max_parser_version: "2.x"

  maintainer:
    name: "Your Name"
    email: "your.email@example.com"
    
  framework:
    name: "Gobelo-YAML Grammar Framework"
    version: "1.0"
    template_for: [Regional Official languages - Bemba, Nyanja, Lozi, Lunda, Kaonde, Luvale, Tonga]
    Yaml_version: 1.0  
    license: "MIT"
       
  documentation: [See docs\grammar_documentation.yaml]
  Target_audience: [Educators, Linguists, Developers, Researchers, Students]
  reference_grammar: "Hazel Carter, An Outline of Chitonga, 1982), An Outline of ChiTonga Language"
  editing_instructions: |
      This file is designed for linguists to read and edit.
      - Add examples liberally for clarity
      - Use verbose descriptions where helpful
      - Include linguistic references

# =========================================================================
# PHONOLOGY SYSTEM 
# ==========================================================================
  
phonology:

  phonology_metadata: 
    language: chitonga
    framework: gobelo
    module: unified_phonology
    version: "1.0"
    last_updated: "2025-12-15"
    status: stable
    design_goals:
      - full_reversibility
      - explicit_rule_ordering
      - autosegmental_tone
      - dialect_feature_gating
      - NLP_safe_normalization
      - integrated_sandhi_processing
      
    sources:
      - Carter 1962
      - Collins 1962
      - Goldsmith 1984
      - Hyman 2007
      - Downing 2011
    integration_notes: 
      This file integrates phonological and sandhi rules into a unified
      processing architecture. Sandhi rules apply post-morphology at    boundary interfaces, while phonological rules apply at broader structural domains.
    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"
  #################################
  # 1. PHONOLOGICAL INVENTORY
  #################################

  vowels:
    segments: [i, e, a, o, u]
    short: [i, e, a, o, u]
    long: [ii, ee, aa, oo, uu]
    features:
      height:
        high: [i, u]
        mid: [e, o]
        low: [a]
      backness:
        front: [i, e]
        central: [a]
        back: [o, u]
      round:
        rounded: [o, u]
        unrounded: [i, e, a]

  consonants:
    # segments: [p, t, k, b, d, g, m, n, f, s, v, z, l, w, y]
    segments: [
        b, bb, c, cc, ch, d, f, g, h, hh, k,kk, l,m, n, p,s, t, v,  w, y, z,
        mb, mp, my, mw, nc, nd, nh, ng, nk, ns, nt, ny, nw, nz, 
        bw, dw, fw, gw, jw, kw, lw,  pw, tw, sw, zw, vw
        by, dy, gy, ky, ny, py, ty, sh, sy, zy,
        bbw, mvw, ndw, ngw, ngy, nkw, nky, nsy, nchw
      ]
    features:
      place:
        labial: [p, b, m, f, v, w]
        alveolar: [t, d, n, s, z, l, r]
        velar: [k, g]
        palatal: [y]
      manner:
        stop: [p, t, k, b, d, g]
        nasal: [m, n]
        fricative: [f, s, v, z]
        liquid: [l, r]
        glide: [w, y]
      voicing:
        voiced: [b, d, g, m, n, v, z, l, r, w, y]
        voiceless: [p, t, k, f, s]

  syllable_structure:
    pattern: [(C)V(N), CCV(N), CCCV(N), CCCCV(N)]
    variants: []   # insert dialectical variants

  tones:
    levels: ["high", "low", "falling", "rising"]
    notation: ["´", "`", "^", "ˇ"]


  #################################
  # 2. BOUNDARY MARKERS
  #################################

  boundaries:
    morpheme: "+"
    zone: "|"
    word: "#"
    phrase: "##"

  #################################
  # 3. ENGINE FEATURES (DIALECT)
  #################################

  engine_features:
    extended_H_spread:
      type: boolean
      default: false
    reduced_H_spread:
      type: boolean
      default: false
    initial_H_lowering:
      type: boolean
      default: false

  #################################
  # 4. PROCESSING ARCHITECTURE
  #################################

  processing_stages:
    - stage: morphophonology
      description: "Stem-internal and morpheme-triggered alternations"
      applies_to: [stem, affix_attachment]
    
    - stage: sandhi
      description: "Boundary-conditioned surface adjustments"
      applies_to: [morpheme_boundary, zone_boundary, word_boundary]
    
    - stage: prosody
      description: "Suprasegmental and phrasal processes"
      applies_to: [syllable, word, phrase]
    
    - stage: tone
      description: "Tonal association and spreading"
      applies_to: [mora, word, phrase]

  #################################
  # 5. MORPHOPHONOLOGICAL RULES
  #################################

  morphophonology:
    
    # --- VOWEL HARMONY ---

    - id: VH.1
      type: segmental
      subtype: vowel_harmony
      domain: stem
      stage: morphophonology
      ordering: 1
      input:
        suffix: applicative
      conditions:
        stem_vowel:
          high_or_low: il
          mid: el
      output:
        suffix_form: conditioned
      reversible: true

    # --- CONSONANT ALTERNATIONS ---

    - id: CA.1
      type: segmental
      subtype: consonant_alternation
      domain: syllable_onset
      stage: morphophonology
      ordering: 2
      input:
        consonant: l
        following_vowel: [+high]
      output:
        consonant: d
      reversible: true

    - id: CA.2
      type: segmental
      subtype: palatalization
      domain: syllable_onset
      stage: morphophonology
      ordering: 3
      input:
        consonant: k
        following_vowel: [+front]
      output:
        consonant: c
      reversible: true

  #################################
  # 6. SANDHI RULES (BOUNDARY PROCESSES)
  #################################

  sandhi_rules:
    # description: "Post-morphology boundary-conditioned surface adjustments"
    # ================================#
    #   HIGH VOWEL GLIDE FORMATION ---#
    # ================================#

    - id: SND.1
      name: high_vowel_glide
      type: segmental
      subtype: glide_formation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme, zone]
      ordering: 10
      input:
        left: 
          features: [+high, +vowel]
        right: 
          features: [+vowel]
      output:
        mapping:
          i: y
          u: w
      blocks: [SND.2]
      reversible: true
      examples:
        - underlying: ku+i+enda
          surface: kuyenda
      notes: "Corresponds to GF.1 in phonological rules; applied at boundaries"

    # --- VOWEL COALESCENCE ---

    - id: SND.2
      name: vowel_coalescence
      type: segmental
      subtype: vowel_coalescence
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 11
      input:
        sequence: [V, V]
      conditions:
        blocked_by: [SND.1]
      output:
        mapping:
          a+i: e
          a+u: o
          i+a: ya
          u+a: wa
      reversible: true
      examples:
        - underlying: ba+a+enda
          surface: benda
      notes: "Applies when glide formation is blocked"

    # --- NASAL ASSIMILATION ---

    - id: SND.3
      name: nasal_assimilation
      type: segmental
      subtype: nasal_assimilation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 12
      input:
        left: 
          segment: N
        right: 
          features: [+consonant, +oral]
      output:
        left: homorganic_nasal
      reversible: true
      examples:
        - underlying: N+b
          surface: mb
        - underlying: N+d
          surface: nd
      notes: "Place assimilation of nasal prefix to following consonant"

    # --- VOWEL ELISION AT WORD BOUNDARY ---

    - id: SND.4
      name: vowel_elision
      type: segmental
      subtype: vowel_deletion
      stage: sandhi
      direction: unidirectional
      applies_across: [word]
      ordering: 13
      input:
        left: 
          features: [+vowel]
        right: 
          boundary: word
      output:
        delete: left
      constraints:
        - prosodic_clitic
      reversible: false
      examples:
        - underlying: na+enda+a#
          surface: naenda
      notes: "Unidirectional; applies only in word-boundary cliticization contexts"

  #################################
  # 7. PROSODIC RULES
  #################################

  prosody:

    # --- MORA PRESERVATION (COMPENSATORY LENGTHENING) ---

    - id: MP.1
      type: prosodic
      subtype: mora_preservation
      domain: syllable
      stage: prosody
      ordering: 20
      trigger:
        deleted_segment: consonant
      effect:
        target: adjacent_vowel
        add_mora: 1
      reversible: true

    # --- PENULTIMATE LENGTHENING ---

    - id: VL.2
      type: prosodic
      subtype: penultimate_lengthening
      domain: phonological_phrase
      stage: prosody
      ordering: 21
      input:
        position: penultimate
      output:
        vowel_length: long
      reversible: true

  #################################
  # 8. TONAL RULES (FEATURE-GATED)
  #################################

  tone:

    - id: TBU.1
      type: tonal
      subtype: tone_bearing_unit
      domain: mora
      stage: tone
      ordering: 30
      definition:
        each_mora_bears_tone: true
      reversible: true

    - id: TS.1
      type: tonal
      subtype: high_spread
      domain: phonological_word
      stage: tone
      ordering: 31
      gate:
        tone: H
        following_tone: Ø
        block_if_following_tone: H
      effect:
        associate: H
      reversible: true

    - id: TS.2
      type: tonal
      subtype: unbounded_high_spread
      domain: phonological_phrase
      stage: tone
      ordering: 32
      gate:
        engine_feature: extended_H_spread
      effect:
        associate: H_to_all_following
      reversible: true

    - id: OCP.1
      type: tonal
      subtype: adjacent_H_resolution
      domain: phonological_word
      stage: tone
      ordering: 33
      input:
        sequence: H H
      output:
        delete: first_H
      reversible: true

    - id: TL.1
      type: tonal
      subtype: final_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 34
      gate:
        position: final
        tone: H
      output:
        contour: HL
      reversible: true

    - id: TL.2
      type: tonal
      subtype: penultimate_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 35
      gate:
        position: penultimate
        tone: H
      output:
        contour: HL
      reversible: true

  #################################
  # 9. RULE INTERACTION MATRIX
  #################################

  rule_interactions:
    feeding:
      - [SND.1, SND.2]  # Glide formation feeds coalescence
      - [SND.3, MP.1]   # Nasal assimilation can feed compensatory lengthening
    
    bleeding:
      - [SND.1, SND.2]  # Glide formation bleeds coalescence
    
    counterfeeding:
      - [VL.2, SND.4]   # Penultimate lengthening before elision
    
    opacity:
      - note: "SND.1 creates opacity in vowel sequences"

  #################################
  # 10. GLOBAL ORDERING CONSTRAINTS
  #################################

  global_ordering:
    - morphophonology: [1-9]
    - sandhi: [10-19]
    - prosody: [20-29]
    - tone: [30-39]
  notes: 
      Sandhi rules must apply after morphophonological processes
      but before phrasal prosody and tone. This ensures boundary
      phenomena are handled at the correct derivational stage.

  #################################
  # 11. REVERSIBILITY CONSTRAINTS
  #################################

  constraints:
    - id: R.1
      description: "Mora count must be preserved or explicitly reassigned"
      enforce: true

    - id: R.2
      description: "No contrastive feature deletion"
      forbidden:
        - tone
        - vowel_height
        - vowel_backness

    - id: R.3
      description: "Rule blocking must be explicit"
      enforce: true

    - id: R.4
      description: "Each rule must be independently invertible"
      enforce: true
      exceptions: [SND.4]  # Vowel elision is unidirectional

    - id: R.5
      description: "Sandhi rules must specify boundary conditions"
      enforce: true
      applies_to: sandhi


# =========================================================================
# NOUN CLASS SYSTEM 
# ==========================================================================
  
noun_class_system: 

  # ============================================================================
  # NOUN CLASS METADATA
  # ============================================================================
  
  noun_class_metadata:
    language: chitonga
    framework: gobelo
    module: unified_phonology
    version: "1.0"
    last_updated: "2025-12-15"
    status: stable
    default_pos_tag: NOUN
    
    augment_system:
      description: "Pre-prefix that appears before noun class prefix"
      form: "i-"
      usage: "optional"
      contexts: ["definite_reference", "specific_reference", "emphasis"]
      examples:
        - without_augment: "muntu (a person)"
          with_augment: "imuntu (the person)"

    
    loanword_assignment:
          default_class: "NC9"
          strategy: "phonological_and_semantic"
          notes: "Loanwords from English typically enter NC9 unless semantically human"
    sources:
      - Carter 1962
      - Collins 1962
      - Goldsmith 1984
      - Hyman 2007
      - Downing 2011
    integration_notes: 
      This file integrates phonological and sandhi rules into a unified
      processing architecture. Sandhi rules apply post-morphology at    boundary interfaces, while phonological rules apply at broader structural domains.
    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"   # ============================================================================
  # NOUN CLASS DEFINITIONS
  # ============================================================================
  noun_classes:

    # ==========================================================================
    # CLASS 1 - Human Singular
    # ==========================================================================
    NC1:
      class_number: 1
      class_type: regular
      grammatical_number: singular
      paired_class: NC2
      frequency: very_high
      active: true
      
      prefix:
        canonical_form: mu-
        allomorphs:
          - form: mw-
            condition: before_vowels
            condition_formal: _V
            examples: [mwana, mwami]
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: mu- + V → mw-
        - VL.2   # Penultimate Lengthening (applies to all classes)
        - TS.1   # High Tone Spreading (applies to all classes)
        - TL.1   # Final Lowering (applies to all classes)
      
      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +singular]
        typical_referents: [humans, kinship, professions, titles]

    # ==========================================================================
    # CLASS 1 - Human Singular
    # ==========================================================================
    NC1a:
      class_number: 1
      class_type: irregular
      grammatical_number: singular
      paired_class: NC2a
      frequency: medium
      active: true
      
      prefix:
        canonical_form:  Ø-
        allomorphs: []
        formatives:
          - form: [na-, si-, sys-, Ø]
        tone: L
      
      augment:
        form: null
        usage: not_applicable
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: mu- + V → mw-
        - VL.2   # Penultimate Lengthening (applies to all classes)
        - TS.1   # High Tone Spreading (applies to all classes)
        - TL.1   # Final Lowering (applies to all classes)
      
      semantics:
        primary_domain: kinfolk_proper_names
        features: [+human, +animate, +singular]
        typical_referents: [humans, kinship, professions, titles, animals]

    # ==========================================================================
    # CLASS 2 - Human Plural
    # ==========================================================================
    NC2:
      class_number: 2
      class_type: regular
      grammatical_number: plural
      paired_class: NC1
      frequency: very_high
      active: true
      
      prefix:
        canonical_form: ba-
        allomorphs:
          - form: b-
            condition: standard_plural_prefix_before_vowels_e_o
            condition_formal: _V
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.2  # Vowel Coalescence: ba- + V → coalescence patterns
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +plural]
        typical_referents: [human_groups, plural_kinship, professions_plural]

    # ==========================================================================
    # CLASS 2a - Honorific Plural (Kinship/Proper)
    # ==========================================================================
    NC2a:
      class_number: 2
      class_type: subclass
      grammatical_number: plural
      paired_class: NC1a
      frequency: high
      active: true
      
      prefix:
        canonical_form: ba-
        allomorphs: []
        tone: L
        notes: "Uses NC2 prefix; paired with NC1a nouns"
      
      augment:
        form: null
        usage: not-applicable
      
      triggers_rules:
        - SND.2  # Vowel Coalescence: ba- + V → coalescence patterns
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: kinship_proper_names_plural
        features: [+human, +animate, +plural]
        typical_referents: [kinship_plural, proper_name_plural]
    
    # ==========================================================================
    # CLASS 2 - Human Plural
    # ==========================================================================
    NC2b:
      class_number: 2
      class_type: irregular
      grammatical_number: plural
      paired_class: NC1
      frequency: low
      active: true
      
      prefix:
        canonical_form: ba-
        allomorphs: []
        formative: bama-
        tone: L
        notes: "Plural prefix used for respectful reference to singular person"

      
      augment:
        form: null
        usage: not_applicable
      
      triggers_rules:
        - SND.2  # Vowel Coalescence: ba- + V → coalescence patterns
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering

      semantics:
        primary_domain: respectful_reference
        features: [+human, +animate, +respectful]
        typical_referents: [elders, chiefs, respected_persons]

    # ==========================================================================
    # CLASS 3 - Trees/Plants Singular
    # ==========================================================================
    NC3:
      class_number: 3
      class_type: regular
      grammatical_number: singular
      paired_class: NC4
      frequency: high
      active: true
      
      prefix:
        canonical_form: mu-
        allomorphs:
          - form: mw-
            condition: before_vowels
            condition_formal: _V
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation (same as NC1)
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: plants_and_trees
        features: [-human, +animate, +singular]
        typical_referents: [trees, plants, long_objects]
      
      
      notes: "Homophonous with NC1 in prefix form; distinguished by concord"

    # ==========================================================================
    # CLASS 4 - Trees/Plants Plural
    # ==========================================================================
    NC4:
      class_number: 4
      class_type: regular
      grammatical_number: plural
      paired_class: NC3
      frequency: high
      active: true
      
      prefix:
        canonical_form: mi-
        allomorphs:
          - form: my-
            condition: before_vowels
            condition_formal: _V
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: mi- + V → my-
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: plants_and_trees
        features: [-human, +animate, +plural]
        typical_referents: [trees_plural, plants_plural, long_objects_plural]
      

    # ==========================================================================
    # CLASS 5 - Augmentative/Singular (often unpaired)
    # ==========================================================================
    NC5:
      class_number: 5
      class_type: regular
      grammatical_number: singular
      paired_class: NC6
      frequency: medium
      active: true
      
      prefix:
        canonical_form: li-
        allomorphs:
          - form: Ø
            condition: "some nouns take zero prefix"
          - form: [d, g, j]
          - condition: express augmentative, perjorative
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation (when li- is used)
        - CA.1   # l/d alternation (in some environments)
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: augmentative_diverse
        features: [-human, +singular]
        typical_referents: [large_items, body_parts, natural_objects]
      

    # ==========================================================================
    # CLASS 6 - Liquids/Masses/Plurals
    # ==========================================================================
    NC6:
      class_number: 6
      class_type: regular
      grammatical_number: plural
      paired_class: NC5
      frequency: high
      active: true
      
      prefix:
        canonical_form: ma-
        allomorphs: 
          form: m-
          conditions: ["before consonants"]
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.2  # Vowel Coalescence: ma- + V
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: liquids_masses_plurals
        features: [-human, +plural]
        typical_referents: [liquids, masses, collectives, class_5_plurals]

    # ==========================================================================
    # CLASS 7 - Things/Diminutives Singular
    # ==========================================================================
    NC7:
      class_number: 7
      class_type: regular
      grammatical_number: singular
      paired_class: NC8
      frequency: very_high
      active: true
      
      prefix:
        canonical_form: ci-
        allomorphs:
          - form: cc-
            condition: variant_form
          - form: chi-
            condition: variant_form
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: ci- + V → cy-
        - CA.2   # Palatalization (historical *ki- → ci-)
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: things_diminutives
        features: [-human, -animate, +singular]
        typical_referents: [objects, instruments, diminutives, languages]
      

    # ==========================================================================
    # CLASS 8 - Things/Diminutives Plural
    # ==========================================================================
    NC8:
      class_number: 8
      class_type: regular
      grammatical_number: plural
      paired_class: NC7
      frequency: very_high
      active: true
      
      prefix:
        canonical_form: zi-
        allomorphs:
          - form: zy-
            condition: before_vowels and variant_form
            condition_formal: _V

        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: zi- + V → zy-
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: things_diminutives
        features: [-human, -animate, +plural]
        typical_referents: [objects_plural, instruments_plural, diminutives_plural]


    # ==========================================================================
    # CLASS 9 - Animals/Loanwords Singular
    # ==========================================================================
    NC9:
      class_number: 9
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: very_high
      active: true
      
      prefix:
        canonical_form: N-
        allomorphs:
          - form: m-
            condition: before_labials
            condition_formal: _[+labial]
          - form: n-
            condition: before_alveolars
            condition_formal: _[+alveolar]
          - form: [ng-, ŋ-]
            condition: before_velars
            condition_formal: _[+velar]
          - form: Ø
            condition: before_fricatives_and_vowels
        tone: L
        notes: "Abstract N- assimilates to following consonant place"
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.3  # Nasal Assimilation (CLASS-SPECIFIC - NC9/10 ONLY)
        - MP.1   # Mora Preservation (if nasal deletes)
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: animals_loanwords_diverse
        features: [-human, +singular]
        typical_referents: [animals, loanwords, diverse_objects]
      
      notes: |
        NC9 is the ONLY class with exclusive phonological rules.
        Surface forms [mb-, nd-, ŋg-] are diagnostic for NC9/10.

    # ==========================================================================
    # CLASS 10 - Animals/Loanwords Plural
    # ==========================================================================
    NC10:
      class_number: 10
      class_type: regular
      grammatical_number: plural
      paired_class: NC9
      frequency: very_high
      active: true
      
      prefix:
        canonical_form: N-
        allomorphs:
          - form: m-
            condition: before_labials
            condition_formal: _[+labial]
          - form: n-
            condition: before_alveolars
            condition_formal: _[+alveolar]
          - form: [ng-, ŋ-]
            condition: before_velars
            condition_formal: _[+velar]
          - form: Ø
            condition: before_fricatives_and_vowels
        tone: L
        notes: "Identical to NC9 in prefix form; distinguished by concord"
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.3  # Nasal Assimilation (CLASS-SPECIFIC - NC9/10 ONLY)
        - MP.1   # Mora Preservation
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: animals_loanwords_diverse
        features: [-human, +plural]
        typical_referents: [animals_plural, loanwords_plural]

    # ==========================================================================
    # CLASS 11 - Long Objects Singular
    # ==========================================================================
    NC11:
      class_number: 11
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: medium
      active: true
      
      prefix:
        canonical_form: lu-
        allomorphs:
          - form: lw-
            condition: before_vowels
            condition_formal: _V
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: lu- + V → lw-
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: long_objects
        features: [-human, +singular]
        typical_referents: [long_thin_objects, body_parts, abstracts]

    # ==========================================================================
    # CLASS 12 - Diminutive Singular (Small)
    # ==========================================================================
    NC12:
      class_number: 12
      class_type: regular
      grammatical_number: singular
      paired_class: NC13
      frequency: limited
      active: true
      
      prefix:
        canonical_form: ka-
        allomorphs:
          - form: k-
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "Identical to NC9 in prefix form; distinguished by concord"
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.3  # Nasal Assimilation (CLASS-SPECIFIC - NC9/10 ONLY)
        - MP.1   # Mora Preservation
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: diminutives_small
        features: [-human, +singular]
        typical_referents: [small_objects, diminutives]

    # ==========================================================================
    # # CLASS 13 - Diminutive Plural (Small)
    # ==========================================================================
    NC13:
      class_number: 13
      class_type: regular
      grammatical_number: plural
      paired_class: NC12
      frequency:  limited
      active: true
      
      prefix:
        canonical_form: tu-
        allomorphs:
          - form: tw-
            condition: before_vowels
            condition_formal: _V
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: lu- + V → lw-
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: diminutives_plural
        features: [-human, +plural]
        typical_referents: [small_objects_plural, diminutives_plural]

    # ==========================================================================
    # CLASS 14 - Abstract/Mass Nouns
    # ==========================================================================
    NC14:
      class_number: 14
      class_type: regular
      grammatical_number: singular
      paired_class: null
      frequency: high
      active: true
      
      prefix:
        canonical_form: bu-
        allomorphs:
          - form: bw-
            condition: before_vowels
            condition_formal: _V
        tone: L
      
      augment:
        form: i-
        usage: optional
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: bu- + V → bw-
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: abstract_mass
        features: [-human, -count, +singular]
        typical_referents: [abstract_qualities, masses, uncountables]
        
      notes: "Typically has no plural; mass/abstract interpretation"

    # ==========================================================================
    # CLASS 15 - Infinitives
    # ==========================================================================
    NC15:
      class_number: 15
      class_type: verbal
      grammatical_number: null
      paired_class: null
      frequency: very_high
      active: true
      
      prefix:
        canonical_form: ku-
        allomorphs:
          - form: kw-
            condition: before_vowels
            condition_formal: _V
        tone: L
      
      augment:
        form: null
        usage: not_applicable
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: ku- + V → kw-
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: verbal_infinitives
        features: [+verbal, -count]
        typical_referents: [actions, processes, infinitival_complements]
        
      notes: "Forms infinitives from verb roots; no plural"

    # ==========================================================================
    # CLASS 16 - Locative (Definite)
    # ==========================================================================
    NC16:
      class_number: 16
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true
      
      prefix:
        canonical_form: a-
        allomorphs: 
          - form: aa
            condition: variant_form
        tone: L
      
      augment:
        form: null
        usage: not_applicable
      
      triggers_rules:
        - SND.2  # Vowel Coalescence: pa- + V
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: definite_location
        features: [+locative, +definite]
        typical_referents: [specific_places, surfaces, at_locations]

    # ==========================================================================
    # CLASS 17 - Locative (General)
    # ==========================================================================
    NC17:
      class_number: 17
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true
      
      prefix:
        canonical_form: ku-
        allomorphs:
          - form: kw-
            condition: before_vowels
            condition_formal: _V
        tone: L
      
      augment:
        form: null
        usage: not_applicable
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: ku- + V → kw-
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: general_location
        features: [+locative, -definite]
        typical_referents: [general_areas, directions, to_locations]
        
      notes: "Homophonous with NC15; distinguished by context"

    # ==========================================================================
    # CLASS 18 - Locative (Interior)
    # ==========================================================================
    NC18:
      class_number: 18
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: medium
      active: true
      
      prefix:
        canonical_form: mu-
        allomorphs:
          - form: mw-
            condition: before_vowels
            condition_formal: _V
        tone: L
      
      augment:
        form: null
        usage: not_applicable
      
      triggers_rules:
        - SND.1  # High Vowel Glide Formation: mu- + V → mw-
        - VL.2   # Penultimate Lengthening
        - TS.1   # High Tone Spreading
        - TL.1   # Final Lowering
      
      semantics:
        primary_domain: interior_location
        features: [+locative, +interior]
        typical_referents: [inside_places, within_locations, in_locations]
      
      notes: "Homophonous with NC1/NC3; distinguished by concord and semantics"
  
  # ============================================================================
    # NOUN-CLASS FEATURES
    # ============================================================================
  noun_class_features:
    # ============================================================================
    # CROSS-CLASS PATTERNS
    # ============================================================================
  
    cross_class_patterns:
      high_vowel_classes:
        description: "Classes triggering SND.1 (Glide Formation)"
        classes: [NC1, NC3, NC4, NC7, NC8, NC11, NC14, NC15, NC17, NC18]
        rule: SND.1
      
      low_vowel_classes:
        description: "Classes triggering SND.2 (Vowel Coalescence)"
        classes: [NC2, NC6, NC16]
        rule: SND.2
      
      nasal_classes:
        description: "Classes with exclusive nasal assimilation"
        classes: [NC9, NC10]
        rule: SND.3
        note: "ONLY classes with class-specific phonology"
      
      human_classes:
        description: "Classes for human reference"
        classes: [NC1, NC2]
        features: [+human, +animate]
      
      locative_classes:
        description: "Locative noun classes"
        classes: [NC16, NC17, NC18]
        features: [+locative]
      
      homophonous_prefixes:
        mu-: [NC1, NC3, NC18]
        ku-: [NC15, NC17]
        zi-: [NC8, NC10]
        note: "Distinguished by concord agreement patterns"



      
      # === DERIVATIONAL PATTERNS ===
      derivational_patterns:
        
        diminutive_formation:
          source_class: "any"
          target_class: "NC12/NC13"
          pattern: "ka-/tu- + stem"
          semantic_change: "indicates smallness, affection, or contempt"
          examples:
            - base: "muntu (person, NC1)"
              derived: "kamuntu (little person)"
              plural: "tumuntu (little people)"
            
            - base: "ng'anda (house, NC9)"
              derived: "kang'anda (little house)"
              plural: "tung'anda (little houses)"
            
            - base: "cintu (thing, NC7)"
              derived: "kantu (little thing)"
              plural: "tuntu (little things)"
        
        augmentative_formation:
          source_class: "any"
          target_class: "NC5/NC6"
          pattern: "li-/ma- + stem"
          semantic_change: "indicates largeness or importance"
          examples:
            - base: "cintu (thing, NC7)"
              derived: "lintu/intu (big thing)"
              plural: "mantu (big things)"
        
        language_names:
          source_class: "NC1 (ethnic group)"
          target_class: "NC7"
          pattern: "ci- + ethnic stem"
          semantic_change: "creates language name from ethnic group"
          examples:
            - base: "mutonga (Tonga person, NC1)"
              derived: "citonga (Tonga language, NC7)"
            
            - base: "mubemba (Bemba person)"
              derived: "cibemba (Bemba language)"
            
            - base: "mungeleji (English person)"
              derived: "cingeleji (English language)"
        
        abstract_nouns:
          source_class: "adjective"
          target_class: "NC14"
          pattern: "bu- + adjective stem"
          semantic_change: "creates abstract quality noun"
          examples:
            - base: "-tali (long/tall)"
              derived: "butali (length/height)"
            
            - base: "-suma (good)"
              derived: "busuma (goodness)"
            
            - base: "-pya (new)"
              derived: "bupya (newness)"
            
            - base: "-laho (beautiful)"
              derived: "bulaho (beauty)"
        
        infinitives:
          source_class: "verb stem"
          target_class: "NC15"
          pattern: "ku- + verb stem"
          semantic_change: "creates infinitive/verbal noun"
          examples:
            - base: "-lya (eat)"
              derived: "kulya (to eat/eating)"
            
            - base: "-beleka (work)"
              derived: "kubeleka (to work/working)"
            
            - base: "-ya (go)"
              derived: "kuya (to go/going)"
        
        manner_nouns:
          source_class: "verb stem"
          target_class: "NC7"
          pattern: "ci- + verb stem"
          semantic_change: "creates manner/way of doing"
          examples:
            - base: "-belenga (read)"
              derived: "cibelenga (way of reading/reading style)"
            
            - base: "-dansa (dance)"
              derived: "cidansa (dance style/way of dancing)"
        
        locative_derivation:
          source_class: "any noun"
          target_class: "NC16/17/18"
          patterns:
            - "a- + noun (at/on)"
            - "ku- + noun (to/towards)"
            - "mu- + noun (in/inside)"
          examples:
            - base: "ng'anda (house, NC9)"
              derived:
                - "aang'anda (at the house)"
                - "kung'anda (to the house)"
                - "mung'anda (in the house)"

      # === SEMANTIC NOTES ===
      semantic_notes:
        
        class_pairing_semantics:
          description: "Semantic relationships between singular and plural classes"
          patterns:
            - pairing: "NC1/NC2"
              semantics: "human beings"
              examples: ["muntu/bantu (person/people)"]
            
            - pairing: "NC3/NC4"
              semantics: "trees, plants, natural objects, extended body parts"
              examples: ["muti/miti (tree/trees)", "mutwe/mitwe (head/heads)"]
            
            - pairing: "NC5/NC6"
              semantics: "large/important objects, paired body parts, natural phenomena"
              examples: ["linso/menso (eye/eyes)", "lyanga/manga (sun/days)"]
            
            - pairing: "NC7/NC8"
              semantics: "things, objects, instruments, languages, customs"
              examples: ["cintu/zintu (thing/things)", "citonga (Tonga language)"]
            
            - pairing: "NC9/NC10"
              semantics: "animals, loanwords, various objects"
              examples: ["ng'ombe/ing'ombe (cow/cows)", "ng'anda/ing'anda (house/houses)"]
            
            - pairing: "NC11/NC10 or NC6"
              semantics: "long thin objects, strings, ropes"
              examples: ["lukunga/nkunga (string/strings)"]
            
            - pairing: "NC12/NC13"
              semantics: "diminutives, small objects"
              examples: ["kantu/tuntu (little thing/little things)"]
        
        loanword_assignment:
          description: "How borrowed words are assigned to noun classes"
          strategies:
            - strategy: "phonological"
              description: "Nouns beginning with certain sounds → NC9"
              examples:
                - word: "basi (bus)"
                  class: "NC9"
                  plural: "mabasi (NC10 with ma-)"
                - word: "galasi (glass)"
                  class: "NC9"
                  plural: "zigalasi (NC10 with zi-)"
            
            - strategy: "semantic"
              description: "Human referents → NC1/NC2"
              examples:
                - word: "dokotela (doctor)"
                  class: "NC1"
                  plural: "badokotela (NC2)"
            
            - strategy: "diminutive"
              description: "Small objects → NC12/NC13 or NC7/NC8"
              examples:
                - word: "cikomputala (small computer)"
                  class: "NC7"
        
        homonymy_disambiguation:
          description: "How context and concord disambiguate identical forms"
          examples:
            - forms: "munzi"
              meanings:
                - class: "NC3"
                  meaning: "village"
                  example: "munzi uyu (this village - NC3 concord)"
                - class: "NC18"
                  meaning: "in the village"
                  example: "munzi muno (in this village - NC18 concord)"
            
            - forms: "ng'ombe"
              meanings:
                - singular: "cow (one)"
                  example: "ng'ombe iyi (this cow - NC9 concord)"
                - plural: "cows (many)"
                  example: "ng'ombe ezi (these cows - NC10 concord)"

      # === DIALECTAL VARIATION ===
      dialectal_variation:
        description: "Variation across Chitonga dialects"
        
        major_dialects:
          - name: "Valley Tonga"
            region: "Gwembe Valley, Southern Province"
            speakers: "~300,000"
            characteristics:
              - "Conservative dialect"
              - "Maintains li- prefix in NC5"
              - "Distinctive vocabulary"
          
          - name: "Plateau Tonga"
            region: "Monze, Choma areas"
            speakers: "~800,000"
            characteristics:
              - "More innovative"
              - "Increasing use of i- instead of li- in NC5"
              - "Standard written form based largely on this"
          
          - name: "Ila"
            region: "Namwala area"
            speakers: "~100,000"
            characteristics:
              - "Closely related variety"
              - "Some distinct vocabulary"
              - "Mutual intelligibility high"
        
        phonological_variation:
          - feature: "NC5 prefix"
            valley_tonga: "li- (conservative)"
            plateau_tonga: "i- (innovative)"
            examples:
              - "eye: linso (Valley) vs inso (Plateau)"
              - "tooth: lino (Valley) vs ino (Plateau)"
          
          - feature: "NC7 plural (NC8)"
            variation: "zi- vs. zyi-"
            note: "Some speakers use zyi- before certain vowels"
        
        lexical_variation:
          - concept: "woman"
            valley_tonga: "mukaintu"
            plateau_tonga: "musiimi"
          
          - concept: "child"
            variation: "mwana vs mwaanace (different social contexts)"

      # === USAGE NOTES ===
      usage_notes:
        
        register_variation:
          formal:
            description: "Used in official contexts, church, education"
            features:
              - "Full augment usage"
              - "Conservative vocabulary"
              - "Avoidance of loanwords where Chitonga equivalent exists"
          
          informal:
            description: "Used in casual conversation"
            features:
              - "Reduced augment usage"
              - "More loanwords"
              - "Contracted forms"
          
          respectful:
            description: "Used when addressing elders or in formal situations"
            features:
              - "NC2b honorific usage"
              - "Respectful kinship terms"
              - "Avoidance of direct personal names"
        
        contemporary_changes:
          - change: "augment_reduction"
            description: "Younger speakers use augments less frequently"
            example: "muntu (common) vs imuntu (less common among youth)"
          
          - change: "nc5_prefix_simplification"
            description: "i- replacing li- in NC5"
            trend: "increasing among younger speakers"
          
          - change: "loanword_integration"
            description: "More English loanwords entering NC9"
            examples: ["komputala (computer)", "foni (phone)", "basi (bus)"]
        
        cultural_notes:
            - note: "respect_system"
              description: "NC2b used for showing respect to elders and chiefs"
              example: "Addressing a chief with plural concords even when singular"
          
            - note: "kinship_terms"
              description: "NC1a kinship terms vary by formality"
              examples:
                - "mayo (informal 'mother')"
                - "nyina (respectful 'mother')"
            
            - note: "name_taboos"
              description: "Direct use of names avoided in some contexts; use of NC2a forms'ntu'"
              surface_form: "muntu"
              with_augment: "imuntu"
              gloss: "person/human being"
              plural_class: "NC2"
              plural_form: "bantu"
              plural_with_augment: "ibantu"
            
            - stem: "ana"
              surface_form: "mwana"
              with_augment: "imwana"
              gloss: "child/son/daughter"
              plural_class: "NC2"
              plural_form: "bana"
              note: "general term for offspring"
            
            - stem: "anda"
              surface_form: "mwaanda"
              with_augment: "imwaanda"
              gloss: "girl/daughter"
              plural_class: "NC2"
              plural_form: "baanda"
            
            - stem: "lombe"
              surface_form: "mulombe"
              with_augment: "imulombe"
              gloss: "boy/son"
              plural_class: "NC2"
              plural_form: "balombe"
            
            - stem: "kaintu"
              surface_form: "mukaintu"
              with_augment: "imukaintu"
              gloss: "woman"
              plural_class: "NC2"
              plural_form: "bakaintu"
            
            - stem: "lumi"
              surface_form: "mulumi"
              with_augment: "imulumi"
              gloss: "man/male"
              plural_class: "NC2"
              plural_form: "balumi"
            
            - stem: "tonga"
              surface_form: "mutonga"
              with_augment: "imutonga"
              gloss: "Tonga person"
              plural_class: "NC2"
              plural_form: "batonga"
            
            - stem: "lwazi"
              surface_form: "mulwazi"
              with_augment: "imulwazi"
              gloss: "patient/sick person"
              plural_class: "NC2"
              plural_form: "balwazi"

        special_rules:
            - rule: "vowel_coalescence"
              description: "mu- becomes mw- before vowels (a, e, i, o, u)"
              examples:
                - "mu- + ana → mwana"
                - "mu- + anda → mwaanda"
            
            - rule: "augment_definiteness"
              description: "Augment i- marks definiteness, specificity, or emphasis"
              examples:
                - "muntu = a person (indefinite)"
                - "imuntu = the person (definite)"
            
            - rule: "honorific_concord"
              description: "Some NC1 nouns may trigger NC2 concords for respect"
              note: "Chiefs and elders may be referred to with plural concords"
    

# ==========================================================================
# CONCORD SYSTEM 
# ==========================================================================
concord_system:
  concords_metadata:
    description: "Agreement markers used across all grammatical contexts"

# ============================================================================
# CONCORD SYSTEM (EXTERNALIZED); for easier reference and cross-linguistic comparison
# ============================================================================
  concords:

    # === SUBJECT CONCORDS ===
    subject_concords:
      description: "Subject markers appearing on verbs"
      position: "pre_TAM"
      
      # Personal pronouns
      NEG.SG: { forms: ["nse","nsi", "nsye", "nsyi"], tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "NEG.1SG" }
      1SG: { forms: ["ndi"], allomorphs: { forms: ["nd", "n"]}, tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "1SG.SM" }
      2SG: { forms: ["u"], allomorphs: { forms: ["w"]}, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "2SG.SM" }
      3SG: { forms: ["u"], allomorphs: { forms: ["w"]}, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "3SG.SM" }
      NEG.1PL: { forms: ["to"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "NEG.1PL" }

# LUVALE LANGUAGE - COMPREHENSIVE GRAMMAR
# ============================================================================
# ciLuvale Grammar — Gobelo Grammar Toolkit (GGT)
# Schema: Gobelo-YAML Grammar Framework v1.0
# Reference: Horton (1949) A Grammar of Luvale; Pearson (1908); SIL Luvale
# Generated: 2025-07-11
# ============================================================================

metadata:
  language:
    name: "Luvale"
    iso_code: "lue"
    guthrie: "K.14"
    primary_region: "Zambia (North-Western Province); Angola"
    approximate_speakers: "400000"
    family: "Niger-Congo, Bantu (Zone K)"
    description: "A comprehensive concord and verbal morphology system for ciLuvale, a Zone K Bantu language of North-Western Province, Zambia and eastern Angola. Key features: NC7=chi-/tʃi-; NC8=vi- (Zone K diagnostic); NC2=a- (VERIFY); passive -w-/-aw-; negation ka-. Related to ciKaonde (L.41) and Lunda (L.52) in the broader K/L zone complex."
    dialects: ["ciLuvale proper", "Chokwe", "Lucazi", "Mbunda"]

  orthography:
    base: "Standard ciLuvale Orthography (Zambia)"
    standard: "Zambia SIL/MoE ciLuvale Orthography"
    zimbawe: null
    zambia: "Zambia SIL Luvale Orthography"
    alternative: "Missionary Orthography (various missions; Pearson 1908)"

  tone_marking: false
  date_created: "2025-07-11"
  last_updated: "2025-07-11"
  version: "1.0.0 (RC)"

  schema_compatibility:
    min_parser_version: "1.0"
    max_parser_version: "2.x"

  maintainer:
    name: "Your Name"
    email: "your.email@example.com"

  framework:
    name: "Gobelo-YAML Grammar Framework"
    version: "1.0"
    template_for: [Regional Official languages - Bemba, Nyanja, Lozi, Lunda, Kaonde, Luvale, Tonga]
    Yaml_version: 1.0
    license: "MIT"

  documentation: [See docs/grammar_documentation.yaml]
  Target_audience: [Educators, Linguists, Developers, Researchers, Students]
  reference_grammar: "Horton (1949), A Grammar of Luvale; Pearson (1908); SIL Luvale materials"
  editing_instructions: |
    This file is designed for linguists to read and edit.
    - Add examples liberally for clarity
    - Use verbose descriptions where helpful
    - Include linguistic references
    - NOTE: ciLuvale is Zone K Bantu; NC7=chi- (NOT ci-); NC8=vi- (NOT zi-)
    - NC2 human plural = a- (VERIFY against Horton 1949; differs from ba- of Chitonga)
    - Augment system present: a-/i- optional
    - Negation: ka- pre-initial (VERIFY Horton 1949)
    - Passive: -w-/-aw- (shared with SiLozi)
    - VERIFY flags mark forms requiring confirmation

# ============================================================================
# PHONOLOGY SYSTEM
# ============================================================================

phonology:

  phonology_metadata:
    language: luvale
    framework: gobelo
    module: unified_phonology
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    design_goals:
      - full_reversibility
      - explicit_rule_ordering
      - autosegmental_tone
      - dialect_feature_gating
      - NLP_safe_normalization
      - integrated_sandhi_processing
    sources:
      - Horton 1949
      - Pearson 1908
      - SIL_Luvale_materials
      - Doke 1945
    integration_notes: |
      ciLuvale (K.14) is a Zone K Bantu language closely related to
      Chokwe. Key phonological characteristics: prominent tʃ/dʒ affricates
      (NC7 chi- prefix); labiodental v/f series active; NC8 vi- prefix
      (voiced labiodental fricative onset); contrastive vowel length;
      H-tone on penultimate is highly productive. No extended H-spread.
    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  # ================================
  # 1. PHONOLOGICAL INVENTORY
  # ================================

  vowels:
    segments: [i, e, a, o, u]
    short: [i, e, a, o, u]
    long: [ii, ee, aa, oo, uu]
    features:
      height:
        high: [i, u]
        mid: [e, o]
        low: [a]
      backness:
        front: [i, e]
        central: [a]
        back: [o, u]
      round:
        rounded: [o, u]
        unrounded: [i, e, a]
    notes: "Contrastive vowel length is productive in ciLuvale (Zone K characteristic); long vowels ii/ee/aa/oo/uu are phonemically distinct"

  consonants:
    segments: [
        b, ch, d, f, g, h, j, k, l, m, n, p, s, sh, t, v, w, y, z,
        mb, mp, nd, nf, ng, nk, ns, nt, nv, nz, ny,
        bw, chw, fw, gw, kw, lw, mw, pw, shw, tw, vw, zw,
        by, chy, dy, jy, ky, ny, py, ty, vy,
        dj, ts, dz, mv
      ]
    features:
      place:
        labial: [p, b, m, w]
        labiodental: [f, v, mv, nv, nf, mf]
        alveolar: [t, d, n, s, z, l]
        palatal: [ch, j, y, sh, ny]
        velar: [k, g]
      manner:
        stop: [p, t, k, b, d, g]
        nasal: [m, n, ny]
        fricative: [f, v, s, z, sh, h]
        affricate: [ch, j, ts, dz]
        liquid: [l]
        glide: [w, y]
        prenasalised: [mb, mp, nd, nk, ng, nz, nv, mv, nf]
      voicing:
        voiced: [b, d, g, m, n, v, z, l, w, y, j, mb, nd, ng, nz, nv, mv, dz]
        voiceless: [p, t, k, f, s, sh, mp, nk, ch, ts, nf]
    notes: "Zone K characteristic: prominent ch/j affricate series; v/f labiodental series productive (nv-, mv- prenasalised forms); tʃ/dʒ allophonic/phonemic distribution (# VERIFY Horton 1949)"

  syllable_structure:
    pattern: [(C)V(N), CCV(N), CCCV(N)]
    variants: []

  tones:
    levels: ["high", "low", "falling", "rising"]
    notation: ["´", "`", "^", "ˇ"]
    notes: "ciLuvale is 2-tone H/L; H-tone on penultimate is highly productive (Zone K feature); tone is grammatically significant in TAM and relative constructions"

  # ================================
  # 2. BOUNDARY MARKERS
  # ================================

  boundaries:
    morpheme: "+"
    zone: "|"
    word: "#"
    phrase: "##"

  # ================================
  # 3. ENGINE FEATURES
  # ================================

  engine_features:
    extended_H_spread:
      type: boolean
      default: false
      note: "Not applicable to ciLuvale; extended H-spread is Chibemba-specific. Penultimate H prominence is a distinct Zone K feature not modelled by this flag."
    reduced_H_spread:
      type: boolean
      default: false
    initial_H_lowering:
      type: boolean
      default: false

  # ================================
  # 4. PROCESSING ARCHITECTURE
  # ================================

  processing_stages:
    - stage: morphophonology
      description: "Stem-internal and morpheme-triggered alternations"
      applies_to: [stem, affix_attachment]
    - stage: sandhi
      description: "Boundary-conditioned surface adjustments"
      applies_to: [morpheme_boundary, zone_boundary, word_boundary]
    - stage: prosody
      description: "Suprasegmental and phrasal processes"
      applies_to: [syllable, word, phrase]
    - stage: tone
      description: "Tonal association and spreading"
      applies_to: [mora, word, phrase]

  # ================================
  # 5. MORPHOPHONOLOGICAL RULES
  # ================================

  morphophonology:

    - id: VH.1
      type: segmental
      subtype: vowel_harmony
      domain: stem
      stage: morphophonology
      ordering: 1
      input:
        suffix: applicative
      conditions:
        stem_vowel:
          high_or_low: il
          mid: el
      output:
        suffix_form: conditioned
      reversible: true
      notes: "Height harmony in extensions; -il-/-el- pattern; active in ciLuvale (# VERIFY Horton 1949 conditioning)"

    - id: CA.1
      type: segmental
      subtype: consonant_alternation
      domain: syllable_onset
      stage: morphophonology
      ordering: 2
      input:
        consonant: l
        following_vowel: [+high]
      output:
        consonant: d
      reversible: true
      notes: "l/d alternation before high vowels; # VERIFY distribution in ciLuvale"

    - id: CA.2
      type: segmental
      subtype: palatalization
      domain: syllable_onset
      stage: morphophonology
      ordering: 3
      input:
        consonant: k
        following_vowel: [+front]
      output:
        consonant: ch
      reversible: true
      notes: "Palatalisation k → ch before front vowels; Zone K reflex is ch- (as in chi- NC7 prefix); # VERIFY ciLuvale palatalisation environments (Horton 1949)"

  # ================================
  # 6. SANDHI RULES
  # ================================

  sandhi_rules:

    - id: SND.1
      name: high_vowel_glide
      type: segmental
      subtype: glide_formation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme, zone]
      ordering: 10
      input:
        left:
          features: [+high, +vowel]
        right:
          features: [+vowel]
      output:
        mapping:
          i: y
          u: w
      blocks: [SND.2]
      reversible: true
      examples:
        - underlying: ku+i+ya
          surface: kuya
        - underlying: mu+ana
          surface: mwana
      notes: "Active in chi-/vi- allomorphy before vowels (chi → ch-)"

    - id: SND.2
      name: vowel_coalescence
      type: segmental
      subtype: vowel_coalescence
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 11
      input:
        sequence: [V, V]
      conditions:
        blocked_by: [SND.1]
      output:
        mapping:
          a+i: e
          a+u: o
          i+a: ya
          u+a: wa
      reversible: true
      examples:
        - underlying: a+a+ya
          surface: aya
      notes: "Vowel coalescence when glide formation is blocked; active with a- NC2/NC6 prefix"

    - id: SND.3
      name: nasal_assimilation
      type: segmental
      subtype: nasal_assimilation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 12
      input:
        left:
          segment: N
        right:
          features: [+consonant, +oral]
      output:
        left: homorganic_nasal
      reversible: true
      examples:
        - underlying: N+b
          surface: mb
        - underlying: N+d
          surface: nd
        - underlying: N+v
          surface: nv
      notes: "Nasal assimilation; nv- before /v/ active in ciLuvale (labiodental nasal)"

    - id: SND.4
      name: vowel_elision
      type: segmental
      subtype: vowel_deletion
      stage: sandhi
      direction: unidirectional
      applies_across: [word]
      ordering: 13
      input:
        left:
          features: [+vowel]
        right:
          boundary: word
      output:
        delete: left
      constraints:
        - prosodic_clitic
      reversible: false
      examples:
        - underlying: ku+i+ya#
          surface: kuya
      notes: "Unidirectional; word-boundary vowel deletion in cliticisation"

  # ================================
  # 7. PROSODIC RULES
  # ================================

  prosody:

    - id: MP.1
      type: prosodic
      subtype: mora_preservation
      domain: syllable
      stage: prosody
      ordering: 20
      trigger:
        deleted_segment: consonant
      effect:
        target: adjacent_vowel
        add_mora: 1
      reversible: true

    - id: VL.2
      type: prosodic
      subtype: penultimate_lengthening
      domain: phonological_phrase
      stage: prosody
      ordering: 21
      input:
        position: penultimate
      output:
        vowel_length: long
      reversible: true
      notes: "Penultimate lengthening; interacts with the prominent penultimate H-tone pattern of ciLuvale"

  # ================================
  # 8. TONAL RULES
  # ================================

  tone:

    - id: TBU.1
      type: tonal
      subtype: tone_bearing_unit
      domain: mora
      stage: tone
      ordering: 30
      definition:
        each_mora_bears_tone: true
      reversible: true

    - id: TS.1
      type: tonal
      subtype: high_spread
      domain: phonological_word
      stage: tone
      ordering: 31
      gate:
        tone: H
        following_tone: Ø
        block_if_following_tone: H
      effect:
        associate: H
      reversible: true
      notes: "H-tone spread; ciLuvale shows prominent penultimate H"

    - id: TS.2
      type: tonal
      subtype: unbounded_high_spread
      domain: phonological_phrase
      stage: tone
      ordering: 32
      gate:
        engine_feature: extended_H_spread
      effect:
        associate: H_to_all_following
      reversible: true
      notes: "Gated by extended_H_spread: false in ciLuvale; this rule does not fire"

    - id: OCP.1
      type: tonal
      subtype: adjacent_H_resolution
      domain: phonological_word
      stage: tone
      ordering: 33
      input:
        sequence: H H
      output:
        delete: first_H
      reversible: true

    - id: TL.1
      type: tonal
      subtype: final_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 34
      gate:
        position: final
        tone: H
      output:
        contour: HL
      reversible: true

    - id: TL.2
      type: tonal
      subtype: penultimate_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 35
      gate:
        position: penultimate
        tone: H
      output:
        contour: HL
      reversible: true

  # ================================
  # 9. RULE INTERACTIONS
  # ================================

  rule_interactions:
    feeding:
      - [SND.1, SND.2]
      - [SND.3, MP.1]
    bleeding:
      - [SND.1, SND.2]
    counterfeeding:
      - [VL.2, SND.4]
    opacity:
      - note: "SND.1 creates opacity in vowel sequences; augment a- triggers SND.2 in relevant environments"

  # ================================
  # 10. GLOBAL ORDERING
  # ================================

  global_ordering:
    - morphophonology: [1-9]
    - sandhi: [10-19]
    - prosody: [20-29]
    - tone: [30-39]
  notes: |
    Sandhi rules apply after morphophonological processes but before
    phrasal prosody and tone. TS.2 (unbounded H-spread) does not fire
    in ciLuvale. Penultimate H-prominence is handled via TS.1 + VL.2
    interaction rather than extended spreading.

  # ================================
  # 11. REVERSIBILITY CONSTRAINTS
  # ================================

  constraints:
    - id: R.1
      description: "Mora count must be preserved or explicitly reassigned"
      enforce: true

    - id: R.2
      description: "No contrastive feature deletion"
      forbidden:
        - tone
        - vowel_height
        - vowel_backness

    - id: R.3
      description: "Rule blocking must be explicit"
      enforce: true

    - id: R.4
      description: "Each rule must be independently invertible"
      enforce: true
      exceptions: [SND.4]

    - id: R.5
      description: "Sandhi rules must specify boundary conditions"
      enforce: true
      applies_to: sandhi


# ============================================================================
# NOUN CLASS SYSTEM
# ============================================================================

noun_class_system:

  noun_class_metadata:
    language: luvale
    framework: gobelo
    module: noun_class_system
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    default_pos_tag: NOUN

    augment_system:
      description: "ciLuvale HAS an augment/pre-prefix system (a-/i- optional)"
      form: "a-"
      usage: "optional"
      contexts: ["definite_reference", "specific_reference", "emphasis", "topicalisation"]
      examples:
        - without_augment: "muntu (a person)"
          with_augment: "amuntu (the person)"
        - without_augment: "chitu (a thing, NC7)"
          with_augment: "achitu (the thing)"
      notes: "# VERIFY: ciLuvale augment distribution against Horton (1949); a- is primary, i- also reported. Unlike Kaonde/SiLozi which have no augment."

    loanword_assignment:
      default_class: "NC9"
      strategy: "phonological_and_semantic"
      notes: "Loanwords from English typically enter NC9/NC10; human loanwords enter NC1/NC2 (a-)"

    sources:
      - Horton 1949
      - Pearson 1908
      - SIL_Luvale_materials
      - Doke 1945

    integration_notes: |
      ciLuvale (K.14) is a Zone K Bantu language of NW Zambia/Angola.
      Critical divergences from Chitonga: NC7=chi- (Zone K affricate);
      NC8=vi- (voiced labiodental onset — KEY Zone K diagnostic);
      NC2=a- (not ba-; # VERIFY Horton 1949 — cascades to ALL NC2 concords);
      NC14=bu- (same as Chitonga); NC16=pa- (standard Bantu);
      augment a-/i- optional; negation ka-; passive -w-/-aw-.

    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  # ============================================================================
  # NOUN CLASS DEFINITIONS
  # ============================================================================

  noun_classes:

    # ==========================================================================
    # CLASS 1 - Human Singular
    # ==========================================================================
    NC1:
      class_number: 1
      class_type: regular
      grammatical_number: singular
      paired_class: NC2
      frequency: very_high
      active: true
      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
            examples: [mwana, mwami]
        tone: L
      augment:
        form: "a-"
        usage: optional
        notes: "a- augment before mu- → amu-"
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +singular]
        typical_referents: [humans, kinship, professions, titles]

    # ==========================================================================
    # CLASS 1a - Kinship/Proper Names Singular
    # ==========================================================================
    NC1a:
      class_number: 1
      class_type: irregular
      grammatical_number: singular
      paired_class: NC2a
      frequency: medium
      active: true
      prefix:
        canonical_form: "Ø-"
        allomorphs: []
        formatives:
          - form: ["na-", "Ø"]
        tone: L
        notes: "# VERIFY: ciLuvale kinship prefix forms (Horton 1949)"
      augment:
        form: null
        usage: not_applicable
      triggers_rules:
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: kinship_proper_names
        features: [+human, +animate, +singular]
        typical_referents: [kinship_terms, proper_names]

    # ==========================================================================
    # CLASS 2 - Human Plural (CRITICAL: a- not ba-)
    # ==========================================================================
    NC2:
      class_number: 2
      class_type: regular
      grammatical_number: plural
      paired_class: NC1
      frequency: very_high
      active: true
      prefix:
        canonical_form: "a-"
        allomorphs: []
        tone: L
        notes: "CRITICAL DIFFERENCE from Chitonga: ciLuvale NC2 = a- (NOT ba-). # VERIFY against Horton (1949). This cascades to ALL NC2 concord paradigms throughout this file."
      augment:
        form: "a-"
        usage: optional
        notes: "# VERIFY: augment before a- NC2; may surface as aa-"
      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +plural]
        typical_referents: [human_groups, plural_kinship, professions_plural]

    # ==========================================================================
    # CLASS 2a - Kinship/Proper Names Plural
    # ==========================================================================
    NC2a:
      class_number: 2
      class_type: subclass
      grammatical_number: plural
      paired_class: NC1a
      frequency: high
      active: true
      prefix:
        canonical_form: "a-"
        allomorphs: []
        tone: L
        notes: "Uses NC2 a- prefix; paired with NC1a nouns"
      augment:
        form: null
        usage: not_applicable
      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: kinship_proper_names_plural
        features: [+human, +animate, +plural]
        typical_referents: [kinship_plural, proper_name_plural]

    # ==========================================================================
    # CLASS 2b - Honorific/Respectful Plural
    # ==========================================================================
    NC2b:
      class_number: 2
      class_type: irregular
      grammatical_number: plural
      paired_class: NC1
      frequency: low
      active: true
      prefix:
        canonical_form: "a-"
        allomorphs: []
        formative: "ama-"
        tone: L
        notes: "# VERIFY: ciLuvale honorific plural prefix; ama- or other respectful form (Horton 1949)"
      augment:
        form: null
        usage: not_applicable
      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: respectful_reference
        features: [+human, +animate, +respectful]
        typical_referents: [elders, chiefs, respected_persons]

    # ==========================================================================
    # CLASS 3 - Trees/Plants/Long Objects Singular
    # ==========================================================================
    NC3:
      class_number: 3
      class_type: regular
      grammatical_number: singular
      paired_class: NC4
      frequency: high
      active: true
      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: plants_trees_long_objects
        features: [-human, +animate, +singular]
        typical_referents: [trees, plants, long_objects, body_parts]
      notes: "Homophonous with NC1; distinguished by concord"

    # ==========================================================================
    # CLASS 4 - Trees/Plants/Long Objects Plural
    # ==========================================================================
    NC4:
      class_number: 4
      class_type: regular
      grammatical_number: plural
      paired_class: NC3
      frequency: high
      active: true
      prefix:
        canonical_form: "mi-"
        allomorphs:
          - form: "my-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: plants_trees_long_objects_plural
        features: [-human, +animate, +plural]
        typical_referents: [trees_plural, plants_plural, body_parts_plural]

    # ==========================================================================
    # CLASS 5 - Augmentative/Body Parts Singular
    # ==========================================================================
    NC5:
      class_number: 5
      class_type: regular
      grammatical_number: singular
      paired_class: NC6
      frequency: medium
      active: true
      prefix:
        canonical_form: "li-"
        allomorphs:
          - form: "l-"
            condition: before_vowels
            condition_formal: _V
          - form: "Ø"
            condition: some_nouns_take_zero_prefix
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.1
        - CA.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: augmentative_body_parts
        features: [-human, +singular]
        typical_referents: [body_parts, large_items, paired_body_parts]

    # ==========================================================================
    # CLASS 6 - Liquids/Masses/Plurals
    # ==========================================================================
    NC6:
      class_number: 6
      class_type: regular
      grammatical_number: plural
      paired_class: NC5
      frequency: high
      active: true
      prefix:
        canonical_form: "ma-"
        allomorphs:
          - form: "m-"
            condition: before_consonants
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: liquids_masses_plurals
        features: [-human, +plural]
        typical_referents: [liquids, masses, collectives, NC5_plurals]

    # ==========================================================================
    # CLASS 7 - Things/Instruments Singular (Zone K: chi-/tʃi-)
    # ==========================================================================
    NC7:
      class_number: 7
      class_type: regular
      grammatical_number: singular
      paired_class: NC8
      frequency: very_high
      active: true
      prefix:
        canonical_form: "chi-"
        allomorphs:
          - form: "ch-"
            condition: before_vowels
            condition_formal: _V
          - form: "ci-"
            condition: variant_orthography
        tone: L
        notes: "Zone K characteristic: NC7 = chi- (tʃi-), not ci- as in Chitonga or si- as in SiLozi. # VERIFY orthographic convention in Horton (1949) — may use ci- or chi- depending on edition."
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.1
        - CA.2
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: things_instruments_languages
        features: [-human, -animate, +singular]
        typical_referents: [objects, instruments, languages, customs]

    # ==========================================================================
    # CLASS 8 - Things/Instruments Plural (CRITICAL: vi- not zi-)
    # ==========================================================================
    NC8:
      class_number: 8
      class_type: regular
      grammatical_number: plural
      paired_class: NC7
      frequency: very_high
      active: true
      prefix:
        canonical_form: "vi-"
        allomorphs:
          - form: "v-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "CRITICAL DIFFERENCE from Chitonga: ciLuvale NC8 = vi- (voiced labiodental onset — Zone K diagnostic). NOT zi- (Chitonga/Chichewa), NOT bi-/fi- (Kaonde), NOT li- (SiLozi). vi- is the definitive Zone K NC8 marker. # VERIFY Horton (1949)."
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: things_instruments_plural
        features: [-human, -animate, +plural]
        typical_referents: [objects_plural, instruments_plural, languages_plural]

    # ==========================================================================
    # CLASS 9 - Animals/Loanwords Singular
    # ==========================================================================
    NC9:
      class_number: 9
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: very_high
      active: true
      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
            condition_formal: _[+labial]
          - form: "n-"
            condition: before_alveolars
            condition_formal: _[+alveolar]
          - form: "ng-"
            condition: before_velars
            condition_formal: _[+velar]
          - form: "nv-"
            condition: before_labiodentals_v
            condition_formal: _v
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
        notes: "nv- before /v/ is active in ciLuvale (labiodental nasal place assimilation)"
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.3
        - MP.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: animals_loanwords_diverse
        features: [-human, +singular]
        typical_referents: [animals, loanwords, diverse_objects]

    # ==========================================================================
    # CLASS 10 - Animals/Loanwords Plural
    # ==========================================================================
    NC10:
      class_number: 10
      class_type: regular
      grammatical_number: plural
      paired_class: NC9
      frequency: very_high
      active: true
      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
          - form: "n-"
            condition: before_alveolars
          - form: "ng-"
            condition: before_velars
          - form: "nv-"
            condition: before_labiodentals_v
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
        notes: "Identical to NC9 prefix; distinguished by concord"
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.3
        - MP.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: animals_loanwords_diverse_plural
        features: [-human, +plural]
        typical_referents: [animals_plural, loanwords_plural]

    # ==========================================================================
    # CLASS 11 - Long/Thin Objects Singular
    # ==========================================================================
    NC11:
      class_number: 11
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: medium
      active: true
      prefix:
        canonical_form: "lu-"
        allomorphs:
          - form: "lw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: long_thin_objects
        features: [-human, +singular]
        typical_referents: [long_thin_objects, abstract_nouns, strands]

    # ==========================================================================
    # CLASS 12 - Diminutive Singular
    # ==========================================================================
    NC12:
      class_number: 12
      class_type: regular
      grammatical_number: singular
      paired_class: NC13
      frequency: medium
      active: true
      prefix:
        canonical_form: "ka-"
        allomorphs:
          - form: "k-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: diminutives_small
        features: [-human, +singular, +diminutive]
        typical_referents: [small_objects, diminutives, affectionate_reference]

    # ==========================================================================
    # CLASS 13 - Diminutive Plural
    # ==========================================================================
    NC13:
      class_number: 13
      class_type: regular
      grammatical_number: plural
      paired_class: NC12
      frequency: medium
      active: true
      prefix:
        canonical_form: "tu-"
        allomorphs:
          - form: "tw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: diminutives_plural
        features: [-human, +plural, +diminutive]
        typical_referents: [small_objects_plural, diminutives_plural]

    # ==========================================================================
    # CLASS 14 - Abstract/Mass Nouns
    # ==========================================================================
    NC14:
      class_number: 14
      class_type: regular
      grammatical_number: singular
      paired_class: null
      frequency: high
      active: true
      prefix:
        canonical_form: "bu-"
        allomorphs:
          - form: "bw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "ciLuvale NC14 = bu- (same as Chitonga, SiLozi, Chibemba — NOT u- as in Nyanja)"
      augment:
        form: "a-"
        usage: optional
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: abstract_mass
        features: [-human, -count, +singular]
        typical_referents: [abstract_qualities, masses, uncountables]
      notes: "Typically no plural; mass/abstract interpretation"

    # ==========================================================================
    # CLASS 15 - Infinitives
    # ==========================================================================
    NC15:
      class_number: 15
      class_type: verbal
      grammatical_number: null
      paired_class: null
      frequency: very_high
      active: true
      prefix:
        canonical_form: "ku-"
        allomorphs:
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: verbal_infinitives
        features: [+verbal, -count]
        typical_referents: [actions, processes, infinitival_complements]

    # ==========================================================================
    # CLASS 16 - Locative (Definite/Surface) — pa- standard Bantu
    # ==========================================================================
    NC16:
      class_number: 16
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true
      prefix:
        canonical_form: "pa-"
        allomorphs:
          - form: "p-"
            condition: before_vowel_a
        tone: L
        notes: "ciLuvale NC16 = pa- (standard Bantu; NOT fa- as in SiLozi). # VERIFY Horton (1949)."
      augment:
        form: null
        usage: not_applicable
      triggers_rules:
        - SND.2
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: definite_surface_location
        features: [+locative, +definite]
        typical_referents: [specific_places, surfaces, at_locations]

    # ==========================================================================
    # CLASS 17 - Locative (Directional/General)
    # ==========================================================================
    NC17:
      class_number: 17
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true
      prefix:
        canonical_form: "ku-"
        allomorphs:
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: directional_general_location
        features: [+locative, -definite]
        typical_referents: [general_areas, directions, to_locations]

    # ==========================================================================
    # CLASS 18 - Locative (Interior)
    # ==========================================================================
    NC18:
      class_number: 18
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: medium
      active: true
      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules:
        - SND.1
        - VL.2
        - TS.1
        - TL.1
      semantics:
        primary_domain: interior_location
        features: [+locative, +interior]
        typical_referents: [inside_places, within_locations, in_locations]

  # ============================================================================
  # NOUN CLASS FEATURES
  # ============================================================================

  noun_class_features:
    cross_class_patterns:
      high_vowel_classes:
        description: "Classes triggering SND.1 (Glide Formation)"
        classes: [NC1, NC3, NC4, NC5, NC7, NC8, NC11, NC12, NC13, NC14, NC15, NC17, NC18]
        rule: SND.1

      low_vowel_classes:
        description: "Classes triggering SND.2 (Vowel Coalescence)"
        classes: [NC2, NC6, NC16]
        rule: SND.2

      nasal_classes:
        description: "Classes with exclusive nasal assimilation (nv- active)"
        classes: [NC9, NC10]
        rule: SND.3
        note: "nv- before /v/ is a ciLuvale-specific nasal assimilation surface form"

      human_classes:
        description: "Classes for human reference"
        classes: [NC1, NC2]
        features: [+human, +animate]

      locative_classes:
        description: "Locative noun classes"
        classes: [NC16, NC17, NC18]
        features: [+locative]

      homophonous_prefixes:
        "mu-": [NC1, NC3, NC18]
        "ku-": [NC15, NC17]
        "li-": [NC5]
        note: "NC7 chi- and NC8 vi- are unambiguous; distinguished from Chitonga ci-/zi-"

      derivational_patterns:

        diminutive_formation:
          source_class: "any"
          target_class: "NC12/NC13"
          pattern: "ka-/tu- + stem"
          semantic_change: "indicates smallness, affection, or contempt"
          examples:
            - base: "muntu (person, NC1)"
              derived: "kamuntu (little person)"
              plural: "tumuntu (little people)"
            - base: "ng'anda (house, NC9)"
              derived: "kang'anda (little house)"
              plural: "tung'anda (little houses)"
            - base: "chitu (thing, NC7)"
              derived: "kachitu (little thing)"
              plural: "tuchitu (little things)"

        augmentative_formation:
          source_class: "any"
          target_class: "NC5/NC6"
          pattern: "li-/ma- + stem"
          semantic_change: "indicates largeness or importance"
          examples:
            - base: "chitu (thing, NC7)"
              derived: "lichitu (big thing)"
              plural: "machitu (big things)"

        language_names:
          source_class: "NC1 (ethnic group)"
          target_class: "NC7"
          pattern: "chi- + ethnic stem"
          semantic_change: "creates language name from ethnic group"
          examples:
            - base: "muluvale (Luvale person, NC1)"
              derived: "chiluvale (Luvale language, NC7)"
            - base: "mubemba (Bemba person)"
              derived: "chibemba (Bemba language)"
            - base: "mutonga (Tonga person)"
              derived: "chitonga (Tonga language)"

        abstract_nouns:
          source_class: "adjective"
          target_class: "NC14"
          pattern: "bu- + adjective stem"
          semantic_change: "creates abstract quality noun"
          examples:
            - base: "-nene (big/great)"
              derived: "bunene (greatness)"
            - base: "-suma (good)"
              derived: "busuma (goodness)"
            - base: "-bipa (bad)"
              derived: "bubipa (badness)"

        infinitives:
          source_class: "verb stem"
          target_class: "NC15"
          pattern: "ku- + verb stem"
          semantic_change: "creates infinitive/verbal noun"
          examples:
            - base: "-lya (eat)"
              derived: "kulya (to eat)"
            - base: "-ya (go)"
              derived: "kuya (to go)"
            - base: "-bona (see)"
              derived: "kubona (to see)"

        manner_nouns:
          source_class: "verb stem"
          target_class: "NC7"
          pattern: "chi- + verb stem"
          semantic_change: "creates manner/way of doing"
          examples:
            - base: "-belenga (read)"
              derived: "chibelenga (way of reading)"
            - base: "-ya (go)"
              derived: "chiya (manner of going)"

        locative_derivation:
          source_class: "any noun"
          target_class: "NC16/17/18"
          patterns:
            - "pa- + noun (at/on)"
            - "ku- + noun (to/towards)"
            - "mu- + noun (in/inside)"
          examples:
            - base: "ng'anda (house, NC9)"
              derived:
                - "pang'anda (at the house)"
                - "kung'anda (to the house)"
                - "mung'anda (in the house)"

      semantic_notes:

        class_pairing_semantics:
          description: "Semantic relationships between singular and plural classes"
          patterns:
            - pairing: "NC1/NC2"
              semantics: "human beings"
              examples: ["muntu/antu (person/people)"]
              note: "NC2 a- gives plural antu (not bantu)"
            - pairing: "NC3/NC4"
              semantics: "trees, plants, natural objects"
              examples: ["muti/miti (tree/trees)"]
            - pairing: "NC5/NC6"
              semantics: "large/important objects, body parts"
              examples: ["lino/mano (tooth/teeth)"]
            - pairing: "NC7/NC8"
              semantics: "things, objects, instruments (chi-/vi-)"
              examples: ["chitu/vitu (thing/things)"]
              note: "vi- plural is the Zone K diagnostic for this pairing"
            - pairing: "NC9/NC10"
              semantics: "animals, loanwords"
              examples: ["ng'ombe/ing'ombe (cow/cows)"]
            - pairing: "NC12/NC13"
              semantics: "diminutives"
              examples: ["kamuntu/tumuntu (little person/little people)"]

        loanword_assignment:
          description: "How borrowed words are assigned to noun classes"
          strategies:
            - strategy: "phonological"
              description: "Consonant-initial nouns → NC9"
              examples:
                - word: "basi (bus)"
                  class: "NC9"
                  plural: "mabasi (NC6)"
            - strategy: "semantic"
              description: "Human referents → NC1/NC2 (a-)"
              examples:
                - word: "dokotela (doctor)"
                  class: "NC1"
                  plural: "adokotela (NC2 with a-)"

        homonymy_disambiguation:
          description: "How concord disambiguates identical prefix forms"
          examples:
            - forms: "mu-"
              meanings:
                - class: "NC1"
                  meaning: "human singular"
                  example: "muntu uyu (this person — NC1 concord u-)"
                - class: "NC3"
                  meaning: "tree singular"
                  example: "muti uyu (this tree — NC3 concord u-)"
                - class: "NC18"
                  meaning: "interior location"
                  example: "mung'anda muno (in this house — NC18 concord mu-)"
            - forms: "chi- vs vi-"
              meanings:
                - class: "NC7"
                  meaning: "thing singular"
                  example: "chitu ichi (this thing)"
                - class: "NC8"
                  meaning: "things plural"
                  example: "vitu ivi (these things)"

      dialectal_variation:
        description: "Variation across ciLuvale and related K.14 varieties"

        major_dialects:
          - name: "ciLuvale proper"
            region: "Zambezi, Chavuma — North-Western Province"
            speakers: "~250,000"
            characteristics:
              - "Standard variety; main literary form"
              - "Documented in Horton (1949)"
          - name: "Chokwe"
            region: "North-Western Province / DRC / Angola"
            speakers: "~100,000 in Zambia"
            characteristics:
              - "Closely related K.11 language; high mutual intelligibility"
              - "Shares chi-/vi- NC7/NC8 pattern"
              - "# VERIFY: boundary between Luvale and Chokwe"
          - name: "Lucazi"
            region: "North-Western Province (Lukulu area)"
            speakers: "~30,000"
            characteristics:
              - "# VERIFY: Lucazi relationship to ciLuvale proper"
          - name: "Mbunda"
            region: "Western Province"
            speakers: "~20,000"
            characteristics:
              - "# VERIFY: Mbunda features"

        phonological_variation:
          - feature: "NC7 orthography"
            luvale_proper: "chi- (tʃi-)"
            variant: "ci- (some orthographies)"
            notes: "# VERIFY: chi- vs ci- orthographic convention in Horton (1949)"
          - feature: "NC8 prefix"
            luvale_proper: "vi-"
            note: "vi- is consistent across ciLuvale varieties"

        lexical_variation:
          - concept: "person"
            luvale_proper: "muntu"
            plural: "antu (NC2 a-)"
          - concept: "house"
            luvale_proper: "ng'anda"
            note: "shared with Chitonga/Kaonde — widespread contact form"

      usage_notes:

        register_variation:
          formal:
            description: "Education, church, official contexts"
            features:
              - "Standard ciLuvale vocabulary"
              - "Fuller morphological forms"
          informal:
            description: "Casual conversation"
            features:
              - "English loanwords"
              - "Some tone simplification"
          respectful:
            description: "For elders and chiefs"
            features:
              - "NC2b honorific a- forms"
              - "Respectful kinship terminology"

        contemporary_changes:
          - change: "english_loanwords"
            description: "English loanwords entering NC9"
            examples: ["foni (phone)", "motoka (car)", "kompyuta (computer)"]
          - change: "bemba_contact"
            description: "Chibemba lexical influence in Solwezi area"
            trend: "increasing in urban contexts"

        cultural_notes:
          - note: "initiation_ceremonies"
            description: "ciLuvale has extensive vocabulary for mukanda (male initiation) and other ceremonies"
          - note: "nc7_language_names"
            description: "Language names formed with chi- prefix; chi- not ci- distinguishes K zone"
          - note: "nc2_a_prefix"
            description: "The a- NC2 human plural prefix marks ciLuvale as K/L zone alongside Lunda; contrasts with ba- of Chitonga/Chibemba/Kaonde"

        special_rules:
          - rule: "nc7_nc8_zone_k"
            description: "NC7 chi- pairs with NC8 vi-; this chi-/vi- pairing is the definitive Zone K diagnostic for ciLuvale"
          - rule: "nc2_a_prefix"
            description: "NC2 human plural a- (not ba-); all NC2-triggered concords use a- stem"
          - rule: "passive_aw"
            description: "Passive extension -w-/-aw-; -aw- after low-vowel stems (shared with SiLozi)"
          - rule: "negation_ka"
            description: "Pre-initial negation ka- (not ta- as in Chitonga; VERIFY Horton 1949)"


# ============================================================================
# CONCORD SYSTEM
# ============================================================================

concord_system:
  concords_metadata:
    description: "Agreement markers for ciLuvale. Critical: NC2=a- (not ba-); NC7=chi-; NC8=vi-; NC16=pa-. All NC2-class concords use a- stem throughout. Zone K characteristics."

  concords:

    # === SUBJECT CONCORDS ===
    subject_concords:
      description: "Subject markers appearing on verbs"
      position: "pre_TAM"

      NEG.SG:    { forms: ["ka"], tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "NEG.1SG", note: "# VERIFY: ciLuvale negation ka-; Horton (1949)" }
      1SG:       { forms: ["ndi"], allomorphs: { forms: ["nd", "n"] }, tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "1SG.SM" }
      2SG:       { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "2SG.SM" }
      3SG:       { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "3SG.SM" }
      NEG.1PL:   { forms: ["ka"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "NEG.1PL", note: "# VERIFY" }
      1PL_EXCL:  { forms: ["tu"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.EXCL.SM" }
      1PL_INCL:  { forms: ["tw"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.INCL.SM" }
      2PL:       { forms: ["mu"], allomorphs: { forms: ["mw"] }, tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "2PL.SM" }
      3PL_HUMAN: { forms: ["a", "Ø"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "3PL.SM", note: "NC2 a- prefix; SM may be a- or Ø in some forms — # VERIFY Horton (1949)" }
      NC3:  { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC3", syntax_expectation: "subject", gloss: "CL3.SM" }
      NC4:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC4", syntax_expectation: "subject", gloss: "CL4.SM" }
      NC5:  { forms: ["li"], allomorphs: { forms: ["l"] }, tone: "L", agreement: "NC5", syntax_expectation: "subject", gloss: "CL5.SM" }
      NC6:  { forms: ["a"], allomorphs: { forms: ["Ø"] }, tone: "L", agreement: "NC6", syntax_expectation: "subject", gloss: "CL6.SM" }
      NC7:  { forms: ["chi"], allomorphs: { forms: ["ch"] }, tone: "L", agreement: "NC7", syntax_expectation: "subject", gloss: "CL7.SM", note: "chi- not ci- — Zone K ciLuvale" }
      NC8:  { forms: ["vi"], allomorphs: { forms: ["v"] }, tone: "L", agreement: "NC8", syntax_expectation: "subject", gloss: "CL8.SM", note: "vi- KEY Zone K diagnostic; NOT zi- bi- or li-" }
      NC9:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC9", syntax_expectation: "subject", gloss: "CL9.SM" }
      NC10: { forms: ["vi", "i"], tone: "L", agreement: "NC10", syntax_expectation: "subject", gloss: "CL10.SM", note: "# VERIFY: NC10 SM vi- or i-; may be same as NC8" }
      NC11: { forms: ["lu"], allomorphs: { forms: ["lw"] }, tone: "L", agreement: "NC11", syntax_expectation: "subject", gloss: "CL11.SM" }
      NC12: { forms: ["ka"], allomorphs: { forms: ["k"] }, tone: "L", agreement: "NC12", syntax_expectation: "subject", gloss: "CL12.SM" }

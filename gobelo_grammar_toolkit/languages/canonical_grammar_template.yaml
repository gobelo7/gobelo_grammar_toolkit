# ============================================================
# GGT CANONICAL GRAMMAR YAML — template for new languages
# Schema version: 1.0.0
# Copy this file, rename to <language>.yaml, fill every field.
# Fields marked REQUIRED must be present or the loader rejects the file.
# Fields marked OPTIONAL may be omitted.
# ============================================================

# ── METADATA [REQUIRED] ──────────────────────────────────────
metadata:
  language: "chibemba"          # REQUIRED: lowercase, matches registry key
  iso_code: "bem"               # REQUIRED: ISO 639-3
  guthrie: "M.42"               # REQUIRED: Guthrie classification
  grammar_version: "1.0.0"      # REQUIRED: semver of this file's data
  min_loader_version: "1.0.0"   # REQUIRED: minimum GGT loader version
  max_loader_version: "999.0.0" # REQUIRED: maximum (999.0.0 = no upper bound)
  display_name: "ChiBemba"      # OPTIONAL: properly capitalised name
  contributors: []              # OPTIONAL: list of contributor names
  last_updated: "2025-01-01"    # OPTIONAL: ISO-8601 date
  notes: ""                     # OPTIONAL: free-text commentary

# ── PHONOLOGY [REQUIRED] ─────────────────────────────────────
phonology:
  vowels: [i, e, a, o, u]       # REQUIRED: list of vowel segments
  consonants: [b, c, d, f, g, h, j, k, l, m, n, p, r, s, t, v, w, y, z]  # REQUIRED
  tone_system: "2-tone"         # REQUIRED: e.g. "2-tone", "four_level", "none"
  nasal_prefixes: ["m-", "n-", "ny-"]  # OPTIONAL: used by morphological analyser
  sandhi_rules: ["SND.1", "SND.2"]     # OPTIONAL: rule identifiers (strings only)
  vowel_harmony_rules: ["VH.1"]        # OPTIONAL: rule identifiers
  notes: ""                            # OPTIONAL

# ── NOUN CLASSES [REQUIRED — at least one entry] ─────────────
# Each key is the NC identifier. Each entry must have the four
# REQUIRED fields; all others are optional.
noun_classes:
  NC1:
    id: "NC1"                          # REQUIRED
    prefix: "u-"                       # REQUIRED (with hyphen)
    allomorphs: ["w-"]                 # OPTIONAL: list of strings
    semantic_domain: "human_beings"    # REQUIRED
    active: true                       # REQUIRED
    singular_counterpart: null         # OPTIONAL
    plural_counterpart: "NC2"          # OPTIONAL
    notes: ""                          # OPTIONAL

  NC2:
    id: "NC2"
    prefix: "ba-"
    allomorphs: ["b-"]
    semantic_domain: "human_beings"
    active: true
    singular_counterpart: "NC1"
    plural_counterpart: null

  # ... NC3 through NC18 follow the same pattern

# ── CONCORD SYSTEMS [REQUIRED — at least one type] ───────────
# Each key names a concord paradigm. The value is a flat mapping
# from NC id (or person label) to the surface form string.
concord_systems:
  subject_concords:               # REQUIRED by apps
    "1SG": "ndi"
    "2SG": "u"
    NC1: "a"
    NC2: "ba"
    NC3: "u"
    NC4: "i"
    NC5: "li"
    NC6: "a"
    NC7: "ci"
    NC8: "zi"
    # ... NC9 through NC18

  object_concords:                # REQUIRED by apps
    "1SG": "ndi"
    NC1: "mu"
    NC2: "ba"
    # ...

  possessive_concords:            # OPTIONAL: any named paradigm
    NC1: "wa"
    NC2: "ba"
    # ...

  # Any other paradigm names are fine; they are enumerated dynamically.
  # Common ones: demonstrative_concords_proximal, demonstrative_concords_distal,
  # relative_concords, adjectival_concords, adverbial_concords

# ── VERB SYSTEM [REQUIRED] ───────────────────────────────────
verb_system:

  # TAM markers [REQUIRED]: list of dicts, one per TAM category
  tam_markers:
    - id: "TAM_PRES"             # REQUIRED: prefix TAM_ is the convention
      form: "a"                  # REQUIRED: surface morpheme (no hyphens)
      tense: "present"           # OPTIONAL: present/immediate_past/remote_past/
      aspect: "imperfective"     #           immediate_future/remote_future/none
      mood: "indicative"         # OPTIONAL: indicative/subjunctive/conditional/etc
      notes: ""

    - id: "TAM_PST"
      form: "ali"
      tense: "immediate_past"
      aspect: "perfective"
      mood: "indicative"

    - id: "TAM_FUT"
      form: "ka"
      tense: "immediate_future"
      aspect: "none"
      mood: "indicative"

  # Verb extensions [REQUIRED]: list of dicts, one per extension
  verb_extensions:
    - id: "APPL"                 # REQUIRED: matches VerbExtension.id used by apps
      canonical_form: "-il-"     # REQUIRED: primary surface form
      allomorphs: ["-el-"]       # OPTIONAL: conditioned variants
      zone: "Z1"                 # OPTIONAL: Z1/Z2/Z3/Z4 — defaults to Z1
      semantic_value: "applicative"  # OPTIONAL

    - id: "CAUS"
      canonical_form: "-is-"
      allomorphs: ["-ish-", "-y-"]
      zone: "Z1"

    - id: "PASS"
      canonical_form: "-w-"
      allomorphs: ["-iw-", "-ew-"]
      zone: "Z3"

    - id: "RECIP"
      canonical_form: "-an-"
      zone: "Z2"

  # Verb slots [REQUIRED]: list of dicts, one per slot
  verb_slots:
    - id: "SLOT1"                # REQUIRED
      name: "negation_pre"       # REQUIRED: human-readable name
      position: 1                # REQUIRED: integer, must be unique and ordered
      obligatory: false          # REQUIRED
      allowed_content_types: ["negation_pre"]  # REQUIRED: list of strings

    - id: "SLOT3"
      name: "subject_concords"
      position: 3
      obligatory: true
      allowed_content_types: ["subject_concords", "relative_concords"]

    - id: "SLOT5"
      name: "tense_aspect_mood"
      position: 5
      obligatory: false
      allowed_content_types: ["tam"]

    - id: "SLOT7"
      name: "object_concord"
      position: 7
      obligatory: false
      allowed_content_types: ["object_concords"]

    - id: "SLOT8"
      name: "verb_root"
      position: 8
      obligatory: true
      allowed_content_types: ["root"]

    - id: "SLOT9"
      name: "extensions"
      position: 9
      obligatory: false
      allowed_content_types: ["extensions"]

    - id: "SLOT10"
      name: "final_vowel"
      position: 10
      obligatory: true
      allowed_content_types: ["final_vowels"]

  # Derivational patterns [OPTIONAL]
  derivational_patterns: []

  # Verb template [OPTIONAL]: free-form dict for VerbSlotValidator
  verb_template: {}

# ── TOKENIZATION [REQUIRED] ──────────────────────────────────
tokenization:
  word_boundary_pattern: "\\s+"      # REQUIRED: regex string
  clitic_boundaries: ["-"]           # OPTIONAL
  prefix_strip_patterns: []          # OPTIONAL
  suffix_strip_patterns: []          # OPTIONAL
  special_cases: {}                  # OPTIONAL: {"ndi": "copula_1SG"}
  orthographic_normalization: {}     # OPTIONAL: {"ng'": "ŋ"}
  notes: ""                          # OPTIONAL

# ── VERIFY FLAGS [OPTIONAL] ───────────────────────────────────
# Written by the F-06 resolver workflow. Leave absent in new files.
# verify_flags: []

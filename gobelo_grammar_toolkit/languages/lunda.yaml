      NC15: { forms: ["oko"], tone: "L-L", agreement: "NC15", syntax_expectation: "pronoun", gloss: "CL15.PRO" }
      NC16: { forms: ["apo"], tone: "L-L", agreement: "NC16", syntax_expectation: "pronoun", gloss: "CL16.PRO" }
      NC17: { forms: ["oko"], tone: "L-L", agreement: "NC17", syntax_expectation: "pronoun", gloss: "CL17.PRO" }
      NC18: { forms: ["omo"], tone: "L-L", agreement: "NC18", syntax_expectation: "pronoun", gloss: "CL18.PRO" }


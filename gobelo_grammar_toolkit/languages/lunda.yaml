      NC14: { forms: ["bwa"], tone: "L", agreement: "NC14", syntax_expectation: "connective", gloss: "CL14.CONN" }
      NC15: { forms: ["kwa"], tone: "L", agreement: "NC15", syntax_expectation: "connective", gloss: "CL15.CONN" }
      NC16: { forms: ["pa"], tone: "L", agreement: "NC16", syntax_expectation: "connective", gloss: "CL16.CONN" }
      NC17: { forms: ["kwa"], tone: "L", agreement: "NC17", syntax_expectation: "connective", gloss: "CL17.CONN" }
      NC18: { forms: ["mwa"], tone: "L", agreement: "NC18", syntax_expectation: "connective", gloss: "CL18.CONN" }

    reflexive_concords:
      description: "Reflexive 'self' markers"
      construction: "li- + CLASS.POSS"
      NC1:  { forms: ["liwe"], tone: "L-L", agreement: "NC1", syntax_expectation: "reflexive", gloss: "CL1.REFL", example: "u-li-bona liwe (he sees himself)" }
      NC2:  { forms: ["loo"], tone: "L-L", agreement: "NC2", syntax_expectation: "reflexive", gloss: "CL2.REFL", note: "NC2 a- reflexive — # VERIFY" }
      NC3:  { forms: ["liwo"], tone: "L-L", agreement: "NC3", syntax_expectation: "reflexive", gloss: "CL3.REFL" }
      NC4:  { forms: ["liyo"], tone: "L-L", agreement: "NC4", syntax_expectation: "reflexive", gloss: "CL4.REFL" }
      NC5:  { forms: ["lilyo"], tone: "L-L", agreement: "NC5", syntax_expectation: "reflexive", gloss: "CL5.REFL" }
      NC6:  { forms: ["loo"], tone: "L-L", agreement: "NC6", syntax_expectation: "reflexive", gloss: "CL6.REFL" }
      NC7:  { forms: ["lico"], tone: "L-L", agreement: "NC7", syntax_expectation: "reflexive", gloss: "CL7.REFL" }
      NC8:  { forms: ["liyo", "lio"], tone: "L-L", agreement: "NC8", syntax_expectation: "reflexive", gloss: "CL8.REFL", note: "# VERIFY: NC8 i- reflexive form" }
      NC9:  { forms: ["liyo"], tone: "L-L", agreement: "NC9", syntax_expectation: "reflexive", gloss: "CL9.REFL" }
      NC10: { forms: ["liyo", "lizyo"], tone: "L-L", agreement: "NC10", syntax_expectation: "reflexive", gloss: "CL10.REFL", note: "# VERIFY" }

    copula_concords:
      description: "Identificational copula 'to be'"
      forms: ["ngu-", "ngo-"]
      NC1:  { forms: ["ngumuntu"], tone: "L-L-L", agreement: "NC1", syntax_expectation: "copula", gloss: "COP-person", construction: "ngu + noun" }
      NC2:  { forms: ["ngoantu"], tone: "L-L-L", agreement: "NC2", syntax_expectation: "copula", gloss: "COP-people", construction: "ngo + noun", note: "NC2 a- noun: antu" }

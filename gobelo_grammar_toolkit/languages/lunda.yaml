        NC1:  { forms: ["ngi"], tone: "L", agreement: "NC1", syntax_expectation: "quantifier", gloss: "CL1.many", note: "# VERIFY: ciLunda 'many' form" }
        NC2:  { forms: ["ngi"], tone: "L", agreement: "NC2", syntax_expectation: "quantifier", gloss: "CL2.many" }
        NC3:  { forms: ["ngi"], tone: "L", agreement: "NC3", syntax_expectation: "quantifier", gloss: "CL3.many" }
        NC4:  { forms: ["ngi"], tone: "L", agreement: "NC4", syntax_expectation: "quantifier", gloss: "CL4.many" }
        NC5:  { forms: ["ngi"], tone: "L", agreement: "NC5", syntax_expectation: "quantifier", gloss: "CL5.many" }

        NC2:  { forms: ["antu a mubala upi"], tone: "varies", agreement: "NC2", syntax_expectation: "interrogative", gloss: "CL2.what_kind", note: "NC2 a-" }

    connective_concords:
      description: "Associative/connective 'of' construction"
      construction: "N1 + CONN + N2"
      NC1:  { forms: ["wa"], tone: "L", agreement: "NC1", syntax_expectation: "connective", gloss: "CL1.CONN", example: "muntu wa muci (person of the village)" }
      NC2:  { forms: ["a"], tone: "L", agreement: "NC2", syntax_expectation: "connective", gloss: "CL2.CONN", example: "antu a muci (people of the village)", note: "NC2 a-" }

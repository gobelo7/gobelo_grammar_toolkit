        NC10: { forms: ["ngi"], tone: "L", agreement: "NC10", syntax_expectation: "quantifier", gloss: "CL10.many" }

    interrogative_concords:
      description: "Agreement with question words"
      which:
        description: "Which one(s)?"
        NC1:  { forms: ["-pi"], tone: "L", agreement: "NC1", syntax_expectation: "interrogative", gloss: "CL1.which", construction: "stem + -pi" }
        NC2:  { forms: ["-pi"], tone: "L", agreement: "NC2", syntax_expectation: "interrogative", gloss: "CL2.which", construction: "stem + -pi" }
        NC3:  { forms: ["-pi"], tone: "L", agreement: "NC3", syntax_expectation: "interrogative", gloss: "CL3.which", construction: "stem + -pi" }

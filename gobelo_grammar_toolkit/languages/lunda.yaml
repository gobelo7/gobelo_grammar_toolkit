        NC2:  { forms: ["onse"], tone: "L-L", agreement: "NC2", syntax_expectation: "quantifier", gloss: "CL2.all", note: "NC2 a- all: onse — # VERIFY" }
        NC3:  { forms: ["woonse"], tone: "L-L", agreement: "NC3", syntax_expectation: "quantifier", gloss: "CL3.all" }
        NC4:  { forms: ["yoonse"], tone: "L-L", agreement: "NC4", syntax_expectation: "quantifier", gloss: "CL4.all" }
        NC5:  { forms: ["lyoonse"], tone: "L-L", agreement: "NC5", syntax_expectation: "quantifier", gloss: "CL5.all" }

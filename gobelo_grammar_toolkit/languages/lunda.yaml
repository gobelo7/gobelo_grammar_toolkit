tokenization:
  tokenization_metadata:
    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"
    external_file: "6_tokenization_rules.yaml"
    description: "Tokenisation rules for ciLunda. Note: contrastive vowel length (ii/ee/aa/oo/uu) must be preserved as distinct tokens. NC8 i- prefix must be distinguished from NC9 SM i- by position."

  syllable:
    pattern: (C?V(N|C)?)
    description: "Default syllable structure; contrastive long vowels VV are bimoraic"
    note: "Tokeniser must handle long vowels (VV) as single syllable nuclei, not two vowels"

  word_boundary: "\\s+"
  morpheme_separators: ["+", "-"]
  special_tokens:
    punctuation: [".", ",", "!", "?"]
    discourse_markers: ["na", "kuti", "pano"]
  preserve_case: false


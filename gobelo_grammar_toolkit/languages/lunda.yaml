# LUNDA LANGUAGE - COMPREHENSIVE GRAMMAR
# ============================================================================
# ciLunda Grammar — Gobelo Grammar Toolkit (GGT)
# Schema: Gobelo-YAML Grammar Framework v1.0
# Reference: Kawasha (2003) Lunda Grammar (PhD, University of Oregon)
#            Doke (1945); White Fathers Dictionary
# Generated: 2025-07-11
# ============================================================================

metadata:
  language:
    name: "Lunda"
    iso_code: "lun"
    guthrie: "L.52"
    primary_region: "Zambia (North-Western Province); DRC; Angola"
    approximate_speakers: "500000"
    family: "Niger-Congo, Bantu (Zone L)"
    description: "A comprehensive concord and verbal morphology system for ciLunda, a Zone L Bantu language of North-Western Province, Zambia and adjacent DRC/Angola. Key features: NC2=a- (VERIFY); NC7=ci-; NC8=i- (Zone L — distinct from Chitonga zi- and Luvale vi-); augment a- optional; contrastive vowel length. Primary reference: Kawasha (2003) Lunda Grammar."
    dialects: ["Ndembu", "Humbu", "Lunda Kalunda", "Shinde"]

  orthography:
    base: "Standard ciLunda Orthography (Zambia)"
    standard: "Zambia SIL/MoE ciLunda Orthography"
    zimbawe: null
    zambia: "Zambia SIL Lunda Orthography"
    alternative: "White Fathers Mission Orthography"

  tone_marking: false
  date_created: "2025-07-11"
  last_updated: "2025-07-11"
  version: "1.0.0 (RC)"

  schema_compatibility:
    min_parser_version: "1.0"
    max_parser_version: "2.x"

  maintainer:
    name: "Your Name"
    email: "your.email@example.com"

  framework:
    name: "Gobelo-YAML Grammar Framework"
    version: "1.0"
    template_for: [Regional Official languages - Bemba, Nyanja, Lozi, Lunda, Kaonde, Luvale, Tonga]
    Yaml_version: 1.0
    license: "MIT"

  documentation: [See docs/grammar_documentation.yaml]
  Target_audience: [Educators, Linguists, Developers, Researchers, Students]
  reference_grammar: "Kawasha (2003), Lunda Grammar (PhD, University of Oregon); Doke (1945); White Fathers Dictionary"
  editing_instructions: |
    This file is designed for linguists to read and edit.
    - Add examples liberally for clarity
    - Use verbose descriptions where helpful
    - Include linguistic references
    - NOTE: ciLunda is Zone L Bantu (L.52); NC7=ci-; NC8=i- (NOT zi-)
    - NC2 human plural = a- (VERIFY Kawasha 2003; differs from ba- of Chitonga)
    - Augment = a- optional (definite contexts)
    - Contrastive vowel length present (Zone L feature)
    - VERIFY flags mark all forms requiring confirmation against Kawasha (2003)

# ============================================================================
# PHONOLOGY SYSTEM
# ============================================================================

phonology:

  phonology_metadata:
    language: lunda
    framework: gobelo
    module: unified_phonology
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    design_goals:
      - full_reversibility
      - explicit_rule_ordering
      - autosegmental_tone
      - dialect_feature_gating
      - NLP_safe_normalization
      - integrated_sandhi_processing
    sources:
      - Kawasha 2003
      - Doke 1945
      - White_Fathers_Dictionary
    integration_notes: |
      ciLunda (L.52) is a Zone L Bantu language of NW Zambia/DRC/Angola.
      Key phonological properties: contrastive vowel length (Zone L feature;
      like Chibemba and Luvale); 2-tone H/L system; NC8 prefix i- is
      distinct from all other languages in the GGT set (VERIFY Kawasha 2003);
      NC2 a- human plural prefix (VERIFY). No extended H-spread.
    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  vowels:
    segments: [i, e, a, o, u]
    short: [i, e, a, o, u]
    long: [ii, ee, aa, oo, uu]
    features:
      height:
        high: [i, u]
        mid: [e, o]
        low: [a]
      backness:
        front: [i, e]
        central: [a]
        back: [o, u]
      round:
        rounded: [o, u]
        unrounded: [i, e, a]
    notes: "Contrastive vowel length is productive in ciLunda (Zone L feature shared with Chibemba and Luvale); long vowels ii/ee/aa/oo/uu are phonemically distinct. # VERIFY Kawasha (2003) phonological inventory."

  consonants:
    segments: [
        b, c, ch, d, f, g, h, j, k, l, m, n, p, s, sh, t, v, w, y, z,
        mb, mp, nd, ng, nk, ns, nt, nz, ny, nf, nv,
        bw, cw, fw, gw, kw, lw, mw, pw, sw, tw, vw, zw,
        by, cy, dy, gy, ky, ny, py, ty,
        ts, dz
      ]
    features:
      place:
        labial: [p, b, m, w]
        labiodental: [f, v, nf, nv]
        alveolar: [t, d, n, s, z, l]
        palatal: [c, j, y, sh, ny, ch]
        velar: [k, g]
      manner:
        stop: [p, t, k, b, d, g]
        nasal: [m, n, ny]
        fricative: [f, v, s, z, sh, h]
        affricate: [c, j, ch, ts, dz]
        liquid: [l]
        glide: [w, y]
        prenasalised: [mb, mp, nd, nk, ng, nz, nf, nv]
      voicing:
        voiced: [b, d, g, m, n, v, z, l, w, y, j, mb, nd, ng, nz, nv, dz]
        voiceless: [p, t, k, f, s, sh, mp, nk, c, ch, ts, nf]
    notes: "# VERIFY: ciLunda consonant inventory against Kawasha (2003); c- may be [ts] or [tʃ]; the ci- NC7 prefix determines the specific affricate quality"

  syllable_structure:
    pattern: [(C)V(N), CCV(N), CCCV(N)]
    variants: []

  tones:
    levels: ["high", "low", "falling", "rising"]
    notation: ["´", "`", "^", "ˇ"]
    notes: "ciLunda 2-tone H/L system; tone is grammatically significant in TAM and relative constructions. # VERIFY: tonal grammar patterns against Kawasha (2003)."

  boundaries:
    morpheme: "+"
    zone: "|"
    word: "#"
    phrase: "##"

  engine_features:
    extended_H_spread:
      type: boolean
      default: false
      note: "Not applicable to ciLunda; extended H-spread is Chibemba-specific only"
    reduced_H_spread:
      type: boolean
      default: false
    initial_H_lowering:
      type: boolean
      default: false

  processing_stages:
    - stage: morphophonology
      description: "Stem-internal and morpheme-triggered alternations"
      applies_to: [stem, affix_attachment]
    - stage: sandhi
      description: "Boundary-conditioned surface adjustments"
      applies_to: [morpheme_boundary, zone_boundary, word_boundary]
    - stage: prosody
      description: "Suprasegmental and phrasal processes"
      applies_to: [syllable, word, phrase]
    - stage: tone
      description: "Tonal association and spreading"
      applies_to: [mora, word, phrase]

  morphophonology:

    - id: VH.1
      type: segmental
      subtype: vowel_harmony
      domain: stem
      stage: morphophonology
      ordering: 1
      input:
        suffix: applicative
      conditions:
        stem_vowel:
          high_or_low: il
          mid: el
      output:
        suffix_form: conditioned
      reversible: true
      notes: "Height harmony in extensions; -il-/-el- pattern; Zone L consistent. # VERIFY Kawasha (2003)."

    - id: CA.1
      type: segmental
      subtype: consonant_alternation
      domain: syllable_onset
      stage: morphophonology
      ordering: 2
      input:
        consonant: l
        following_vowel: [+high]
      output:
        consonant: d
      reversible: true
      notes: "l/d alternation before high vowels; # VERIFY distribution in ciLunda (Kawasha 2003)"

    - id: CA.2
      type: segmental
      subtype: palatalization
      domain: syllable_onset
      stage: morphophonology
      ordering: 3
      input:
        consonant: k
        following_vowel: [+front]
      output:
        consonant: c
      reversible: true
      notes: "Palatalisation k → c before front vowels; Zone L reflex c- (as in ci- NC7 prefix). # VERIFY Kawasha (2003)."

  sandhi_rules:

    - id: SND.1
      name: high_vowel_glide
      type: segmental
      subtype: glide_formation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme, zone]
      ordering: 10
      input:
        left:
          features: [+high, +vowel]
        right:
          features: [+vowel]
      output:
        mapping:
          i: y
          u: w
      blocks: [SND.2]
      reversible: true
      examples:
        - underlying: ku+i+ya
          surface: kuya
        - underlying: mu+ana
          surface: mwana
      notes: "Active in mu-/ku-/bu- prefix allomorphy before vowels"

    - id: SND.2
      name: vowel_coalescence
      type: segmental
      subtype: vowel_coalescence
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 11
      input:
        sequence: [V, V]
      conditions:
        blocked_by: [SND.1]
      output:
        mapping:
          a+i: e
          a+u: o
          i+a: ya
          u+a: wa
      reversible: true
      examples:
        - underlying: a+a+ya
          surface: aya
      notes: "Active with a- NC2/NC6 prefix coalescence"

    - id: SND.3
      name: nasal_assimilation
      type: segmental
      subtype: nasal_assimilation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 12
      input:
        left:
          segment: N
        right:
          features: [+consonant, +oral]
      output:
        left: homorganic_nasal
      reversible: true
      examples:
        - underlying: N+b
          surface: mb
        - underlying: N+d
          surface: nd
        - underlying: N+k
          surface: nk
      notes: "NC9/10 nasal prefix assimilation; standard place assimilation"

    - id: SND.4
      name: vowel_elision
      type: segmental
      subtype: vowel_deletion
      stage: sandhi
      direction: unidirectional
      applies_across: [word]
      ordering: 13
      input:
        left:
          features: [+vowel]
        right:
          boundary: word
      output:
        delete: left
      constraints:
        - prosodic_clitic
      reversible: false
      examples:
        - underlying: ku+i+ya#
          surface: kuya
      notes: "Unidirectional; word-boundary vowel deletion"

  prosody:

    - id: MP.1
      type: prosodic
      subtype: mora_preservation
      domain: syllable
      stage: prosody
      ordering: 20
      trigger:
        deleted_segment: consonant
      effect:
        target: adjacent_vowel
        add_mora: 1
      reversible: true

    - id: VL.2
      type: prosodic
      subtype: penultimate_lengthening
      domain: phonological_phrase
      stage: prosody
      ordering: 21
      input:
        position: penultimate
      output:
        vowel_length: long
      reversible: true
      notes: "Penultimate lengthening; interacts with contrastive vowel length in ciLunda"

  tone:

    - id: TBU.1
      type: tonal
      subtype: tone_bearing_unit
      domain: mora
      stage: tone
      ordering: 30
      definition:
        each_mora_bears_tone: true
      reversible: true

    - id: TS.1
      type: tonal
      subtype: high_spread
      domain: phonological_word
      stage: tone
      ordering: 31
      gate:
        tone: H
        following_tone: Ø
        block_if_following_tone: H
      effect:
        associate: H
      reversible: true

    - id: TS.2
      type: tonal
      subtype: unbounded_high_spread
      domain: phonological_phrase
      stage: tone
      ordering: 32
      gate:
        engine_feature: extended_H_spread
      effect:
        associate: H_to_all_following
      reversible: true
      notes: "Gated by extended_H_spread: false in ciLunda; does not fire"

    - id: OCP.1
      type: tonal
      subtype: adjacent_H_resolution
      domain: phonological_word
      stage: tone
      ordering: 33
      input:
        sequence: H H
      output:
        delete: first_H
      reversible: true

    - id: TL.1
      type: tonal
      subtype: final_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 34
      gate:
        position: final
        tone: H
      output:
        contour: HL
      reversible: true

    - id: TL.2
      type: tonal
      subtype: penultimate_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 35
      gate:
        position: penultimate
        tone: H
      output:
        contour: HL
      reversible: true

  rule_interactions:
    feeding:
      - [SND.1, SND.2]
      - [SND.3, MP.1]
    bleeding:
      - [SND.1, SND.2]
    counterfeeding:
      - [VL.2, SND.4]
    opacity:
      - note: "SND.1 creates opacity; a- augment triggers SND.2 in relevant environments"

  global_ordering:
    - morphophonology: [1-9]
    - sandhi: [10-19]
    - prosody: [20-29]
    - tone: [30-39]
  notes: |
    Sandhi rules apply after morphophonological processes but before
    phrasal prosody and tone. TS.2 does not fire in ciLunda.
    Contrastive vowel length interacts with VL.2 (penultimate lengthening)
    — long vowels must be distinguished from lengthening-induced variants.

  constraints:
    - id: R.1
      description: "Mora count must be preserved or explicitly reassigned"
      enforce: true

    - id: R.2
      description: "No contrastive feature deletion"
      forbidden:
        - tone
        - vowel_height
        - vowel_backness
        - vowel_length

    - id: R.3
      description: "Rule blocking must be explicit"
      enforce: true

    - id: R.4
      description: "Each rule must be independently invertible"
      enforce: true
      exceptions: [SND.4]

    - id: R.5
      description: "Sandhi rules must specify boundary conditions"
      enforce: true
      applies_to: sandhi


# ============================================================================
# NOUN CLASS SYSTEM
# ============================================================================

noun_class_system:

  noun_class_metadata:
    language: lunda
    framework: gobelo
    module: noun_class_system
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    default_pos_tag: NOUN

    augment_system:
      description: "ciLunda HAS an augment/pre-prefix system (a- optional, definite contexts)"
      form: "a-"
      usage: "optional"
      contexts: ["definite_reference", "specific_reference", "topicalisation"]
      examples:
        - without_augment: "muntu (a person)"
          with_augment: "amuntu (the person)"
        - without_augment: "cintu (a thing, NC7)"
          with_augment: "acintu (the thing)"
      notes: "# VERIFY: ciLunda augment a- distribution and contexts against Kawasha (2003). a- augment in definite/specific reference contexts."

    loanword_assignment:
      default_class: "NC9"
      strategy: "phonological_and_semantic"
      notes: "Loanwords from English typically enter NC9/NC10; human loanwords enter NC1/NC2 (a-)"

    sources:
      - Kawasha 2003
      - Doke 1945
      - White_Fathers_Dictionary

    integration_notes: |
      ciLunda (L.52) is a Zone L Bantu language of NW Zambia/DRC/Angola.
      Critical divergences from Chitonga: NC2=a- not ba- (VERIFY Kawasha 2003;
      cascades to ALL NC2 concords); NC7=ci- (Zone L); NC8=i- (NOT zi- —
      this is the key Zone L.52 diagnostic; VERIFY Kawasha 2003 carefully);
      NC14=bu- (same as Chitonga); NC16=pa- (standard Bantu); augment a-
      optional; contrastive vowel length. Closely related to Kaonde (L.41)
      but with distinct NC8 i- vs Kaonde bi-/fi-.

    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  noun_classes:

    NC1:
      class_number: 1
      class_type: regular
      grammatical_number: singular
      paired_class: NC2
      frequency: very_high
      active: true
      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
            examples: [mwana, mwami]
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +singular]
        typical_referents: [humans, kinship, professions, titles]

    NC1a:
      class_number: 1
      class_type: irregular
      grammatical_number: singular
      paired_class: NC2a
      frequency: medium
      active: true
      prefix:
        canonical_form: "Ø-"
        allomorphs: []
        formatives:
          - form: ["na-", "Ø"]
        tone: L
        notes: "# VERIFY: ciLunda kinship prefix forms (Kawasha 2003)"
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [VL.2, TS.1, TL.1]
      semantics:
        primary_domain: kinship_proper_names
        features: [+human, +animate, +singular]
        typical_referents: [kinship_terms, proper_names]

    NC2:
      class_number: 2
      class_type: regular
      grammatical_number: plural
      paired_class: NC1
      frequency: very_high
      active: true
      prefix:
        canonical_form: "a-"
        allomorphs: []
        tone: L
        notes: "CRITICAL DIFFERENCE from Chitonga: ciLunda NC2 = a- (NOT ba-). # VERIFY against Kawasha (2003). Cascades to ALL NC2 concord paradigms."
      augment:
        form: "a-"
        usage: optional
        notes: "# VERIFY: augment before a- NC2 prefix; may surface as aa-"
      triggers_rules: [SND.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +plural]
        typical_referents: [human_groups, plural_kinship, professions_plural]

    NC2a:
      class_number: 2
      class_type: subclass
      grammatical_number: plural
      paired_class: NC1a
      frequency: high
      active: true
      prefix:
        canonical_form: "a-"
        allomorphs: []
        tone: L
        notes: "Uses NC2 a- prefix; paired with NC1a nouns"
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: kinship_proper_names_plural
        features: [+human, +animate, +plural]
        typical_referents: [kinship_plural, proper_name_plural]

    NC3:
      class_number: 3
      class_type: regular
      grammatical_number: singular
      paired_class: NC4
      frequency: high
      active: true
      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: plants_trees_long_objects
        features: [-human, +animate, +singular]
        typical_referents: [trees, plants, long_objects, body_parts]
      notes: "Homophonous with NC1; distinguished by concord"

    NC4:
      class_number: 4
      class_type: regular
      grammatical_number: plural
      paired_class: NC3
      frequency: high
      active: true
      prefix:
        canonical_form: "mi-"
        allomorphs:
          - form: "my-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: plants_trees_long_objects_plural
        features: [-human, +animate, +plural]
        typical_referents: [trees_plural, plants_plural, body_parts_plural]

    NC5:
      class_number: 5
      class_type: regular
      grammatical_number: singular
      paired_class: NC6
      frequency: medium
      active: true
      prefix:
        canonical_form: "li-"
        allomorphs:
          - form: "l-"
            condition: before_vowels
            condition_formal: _V
          - form: "Ø"
            condition: some_nouns_take_zero_prefix
        tone: L
        notes: "# VERIFY: ciLunda NC5 li- prefix productivity (Kawasha 2003)"
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, CA.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: augmentative_body_parts
        features: [-human, +singular]
        typical_referents: [body_parts, large_items, paired_body_parts]

    NC6:
      class_number: 6
      class_type: regular
      grammatical_number: plural
      paired_class: NC5
      frequency: high
      active: true
      prefix:
        canonical_form: "ma-"
        allomorphs:
          - form: "m-"
            condition: before_consonants
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: liquids_masses_plurals
        features: [-human, +plural]
        typical_referents: [liquids, masses, collectives, NC5_plurals]

    NC7:
      class_number: 7
      class_type: regular
      grammatical_number: singular
      paired_class: NC8
      frequency: very_high
      active: true
      prefix:
        canonical_form: "ci-"
        allomorphs:
          - form: "c-"
            condition: before_vowels
            condition_formal: _V
          - form: "chi-"
            condition: variant_orthography
        tone: L
        notes: "ciLunda NC7 = ci- (Zone L pattern; same canonical form as Chitonga and Kaonde). # VERIFY exact orthographic convention in Kawasha (2003)."
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, CA.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: things_instruments_languages
        features: [-human, -animate, +singular]
        typical_referents: [objects, instruments, languages, customs]

    NC8:
      class_number: 8
      class_type: regular
      grammatical_number: plural
      paired_class: NC7
      frequency: very_high
      active: true
      prefix:
        canonical_form: "i-"
        allomorphs:
          - form: "y-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "CRITICAL DIFFERENCE from ALL other languages in GGT set: ciLunda NC8 = i- (NOT zi- as in Chitonga/Chichewa; NOT bi-/fi- as in Kaonde/Chibemba; NOT vi- as in Luvale; NOT li- as in SiLozi). This i- prefix is the Zone L.52 Lunda diagnostic for NC8. # VERIFY carefully against Kawasha (2003) — form could be yi- or i-."
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: things_instruments_plural
        features: [-human, -animate, +plural]
        typical_referents: [objects_plural, instruments_plural, languages_plural]

    NC9:
      class_number: 9
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: very_high
      active: true
      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
            condition_formal: _[+labial]
          - form: "n-"
            condition: before_alveolars
            condition_formal: _[+alveolar]
          - form: "ng-"
            condition: before_velars
            condition_formal: _[+velar]
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
        notes: "Abstract N- assimilates to following consonant place; IMPORTANT: NC9 SM = i- which is homophonous with NC8 prefix — parser must use concord context to disambiguate"
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.3, MP.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: animals_loanwords_diverse
        features: [-human, +singular]
        typical_referents: [animals, loanwords, diverse_objects]
      notes: "NC9 SM = i- (same surface form as NC8 prefix i-); disambiguation requires concord agreement context"

    NC10:
      class_number: 10
      class_type: regular
      grammatical_number: plural
      paired_class: NC9
      frequency: very_high
      active: true
      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
          - form: "n-"
            condition: before_alveolars
          - form: "ng-"
            condition: before_velars
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.3, MP.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: animals_loanwords_diverse_plural
        features: [-human, +plural]
        typical_referents: [animals_plural, loanwords_plural]

    NC11:
      class_number: 11
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: medium
      active: true
      prefix:
        canonical_form: "lu-"
        allomorphs:
          - form: "lw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: long_thin_objects
        features: [-human, +singular]
        typical_referents: [long_thin_objects, abstract_nouns, strands]

    NC12:
      class_number: 12
      class_type: regular
      grammatical_number: singular
      paired_class: NC13
      frequency: medium
      active: true
      prefix:
        canonical_form: "ka-"
        allomorphs:
          - form: "k-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: diminutives_small
        features: [-human, +singular, +diminutive]
        typical_referents: [small_objects, diminutives, affectionate_reference]

    NC13:
      class_number: 13
      class_type: regular
      grammatical_number: plural
      paired_class: NC12
      frequency: medium
      active: true
      prefix:
        canonical_form: "tu-"
        allomorphs:
          - form: "tw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: diminutives_plural
        features: [-human, +plural, +diminutive]
        typical_referents: [small_objects_plural, diminutives_plural]

    NC14:
      class_number: 14
      class_type: regular
      grammatical_number: singular
      paired_class: null
      frequency: high
      active: true
      prefix:
        canonical_form: "bu-"
        allomorphs:
          - form: "bw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "ciLunda NC14 = bu- (same as Chitonga; NOT u- as in Nyanja)"
      augment:
        form: "a-"
        usage: optional
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: abstract_mass
        features: [-human, -count, +singular]
        typical_referents: [abstract_qualities, masses, uncountables]
      notes: "Typically no plural; mass/abstract interpretation"

    NC15:
      class_number: 15
      class_type: verbal
      grammatical_number: null
      paired_class: null
      frequency: very_high
      active: true
      prefix:
        canonical_form: "ku-"
        allomorphs:
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: verbal_infinitives
        features: [+verbal, -count]
        typical_referents: [actions, processes, infinitival_complements]

    NC16:
      class_number: 16
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true
      prefix:
        canonical_form: "pa-"
        allomorphs:
          - form: "p-"
            condition: before_vowel_a
        tone: L
        notes: "ciLunda NC16 = pa- (standard Bantu; NOT fa- as in SiLozi). Consistent with Chitonga, Luvale, Kaonde."
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: definite_surface_location
        features: [+locative, +definite]
        typical_referents: [specific_places, surfaces, at_locations]

    NC17:
      class_number: 17
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true
      prefix:
        canonical_form: "ku-"
        allomorphs:
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: directional_general_location
        features: [+locative, -definite]
        typical_referents: [general_areas, directions, to_locations]
      notes: "Homophonous with NC15; distinguished by context and concord"

    NC18:
      class_number: 18
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: medium
      active: true
      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: interior_location
        features: [+locative, +interior]
        typical_referents: [inside_places, within_locations, in_locations]

  noun_class_features:
    cross_class_patterns:
      high_vowel_classes:
        description: "Classes triggering SND.1 (Glide Formation)"
        classes: [NC1, NC3, NC4, NC5, NC7, NC8, NC11, NC12, NC13, NC14, NC15, NC17, NC18]
        rule: SND.1

      low_vowel_classes:
        description: "Classes triggering SND.2 (Vowel Coalescence)"
        classes: [NC2, NC6, NC16]
        rule: SND.2

      nasal_classes:
        description: "Classes with exclusive nasal assimilation"
        classes: [NC9, NC10]
        rule: SND.3
        note: "NC9 SM = i- is homophonous with NC8 noun prefix i-; context required"

      human_classes:
        description: "Classes for human reference"
        classes: [NC1, NC2]
        features: [+human, +animate]

      locative_classes:
        description: "Locative noun classes"
        classes: [NC16, NC17, NC18]
        features: [+locative]

      homophonous_prefixes:
        "mu-": [NC1, NC3, NC18]
        "ku-": [NC15, NC17]
        "i-": [NC8]
        note: "NC8 i- is unique to ciLunda in the GGT set; NC9 SM i- adds a cross-paradigm homophony that requires concord context for disambiguation"

      derivational_patterns:

        diminutive_formation:
          source_class: "any"
          target_class: "NC12/NC13"
          pattern: "ka-/tu- + stem"
          semantic_change: "indicates smallness, affection, or contempt"
          examples:
            - base: "muntu (person, NC1)"
              derived: "kamuntu (little person)"
              plural: "tumuntu (little people)"
            - base: "ng'anda (house, NC9)"
              derived: "kang'anda (little house)"
              plural: "tung'anda (little houses)"
            - base: "cintu (thing, NC7)"
              derived: "kantu (little thing)"
              plural: "tuntu (little things)"

        augmentative_formation:
          source_class: "any"
          target_class: "NC5/NC6"
          pattern: "li-/ma- + stem"
          semantic_change: "indicates largeness or importance"
          examples:
            - base: "cintu (thing, NC7)"
              derived: "lintu (big thing)"
              plural: "mantu (big things)"

        language_names:
          source_class: "NC1 (ethnic group)"
          target_class: "NC7"
          pattern: "ci- + ethnic stem"
          semantic_change: "creates language name from ethnic group"
          examples:
            - base: "mulunda (Lunda person, NC1)"
              derived: "cilunda (Lunda language, NC7)"
            - base: "mutonga (Tonga person)"
              derived: "citonga (Tonga language)"
            - base: "mubemba (Bemba person)"
              derived: "cibemba (Bemba language)"

        abstract_nouns:
          source_class: "adjective"
          target_class: "NC14"
          pattern: "bu- + adjective stem"
          semantic_change: "creates abstract quality noun"
          examples:
            - base: "-nene (big/great)"
              derived: "bunene (greatness)"
            - base: "-suma (good)"
              derived: "busuma (goodness)"
            - base: "-bipa (bad)"
              derived: "bubipa (badness)"

        infinitives:
          source_class: "verb stem"
          target_class: "NC15"
          pattern: "ku- + verb stem"
          semantic_change: "creates infinitive/verbal noun"
          examples:
            - base: "-lya (eat)"
              derived: "kulya (to eat)"
            - base: "-ya (go)"
              derived: "kuya (to go)"
            - base: "-bona (see)"
              derived: "kubona (to see)"

        manner_nouns:
          source_class: "verb stem"
          target_class: "NC7"
          pattern: "ci- + verb stem"
          semantic_change: "creates manner/way of doing"
          examples:
            - base: "-belenga (read)"
              derived: "cibelenga (way of reading)"
            - base: "-ya (go)"
              derived: "ciya (manner of going)"

        locative_derivation:
          source_class: "any noun"
          target_class: "NC16/17/18"
          patterns:
            - "pa- + noun (at/on)"
            - "ku- + noun (to/towards)"
            - "mu- + noun (in/inside)"
          examples:
            - base: "ng'anda (house, NC9)"
              derived:
                - "pang'anda (at the house)"
                - "kung'anda (to the house)"
                - "mung'anda (in the house)"

      semantic_notes:

        class_pairing_semantics:
          description: "Semantic relationships between singular and plural classes"
          patterns:
            - pairing: "NC1/NC2"
              semantics: "human beings"
              examples: ["muntu/antu (person/people)"]
              note: "NC2 a- gives plural antu (not bantu)"
            - pairing: "NC3/NC4"
              semantics: "trees, plants, natural objects"
              examples: ["muti/miti (tree/trees)"]
            - pairing: "NC5/NC6"
              semantics: "large/important objects, body parts"
              examples: ["lino/mano (tooth/teeth)"]
            - pairing: "NC7/NC8"
              semantics: "things, objects, instruments (ci-/i-)"
              examples: ["cintu/intu (thing/things)"]
              note: "i- NC8 plural is the Zone L.52 Lunda diagnostic; # VERIFY cintu/intu paradigm"
            - pairing: "NC9/NC10"
              semantics: "animals, loanwords"
              examples: ["ng'ombe/ing'ombe (cow/cows)"]
            - pairing: "NC12/NC13"
              semantics: "diminutives"
              examples: ["kamuntu/tumuntu (little person/little people)"]

        loanword_assignment:
          description: "How borrowed words are assigned to noun classes"
          strategies:
            - strategy: "phonological"
              description: "Consonant-initial nouns → NC9"
              examples:
                - word: "basi (bus)"
                  class: "NC9"
                  plural: "mabasi (NC6)"
            - strategy: "semantic"
              description: "Human referents → NC1/NC2 (a-)"
              examples:
                - word: "dokotela (doctor)"
                  class: "NC1"
                  plural: "adokotela (NC2 a-)"

        homonymy_disambiguation:
          description: "How concord disambiguates identical prefix forms"
          examples:
            - forms: "i-"
              meanings:
                - class: "NC8"
                  meaning: "things plural (noun prefix)"
                  example: "intu izi (these things — NC8 concord; # VERIFY)"
                - class: "NC9"
                  meaning: "animal/loanword singular (SM only)"
                  example: "i-a-bona (it saw — NC9 SM on verb)"
              note: "NC8 i- appears as noun prefix; NC9 SM i- appears only on verbs — distinct positions prevent most ambiguity"
            - forms: "mu-"
              meanings:
                - class: "NC1"
                  meaning: "human singular"
                - class: "NC3"
                  meaning: "tree/plant singular"
                - class: "NC18"
                  meaning: "interior location"

      dialectal_variation:
        description: "Variation across ciLunda varieties"

        major_dialects:
          - name: "Ndembu"
            region: "Mwinilunga, North-Western Province"
            speakers: "~200,000"
            characteristics:
              - "Well-documented; Turner (1967) ethnographic record"
              - "Standard reference variety for most linguistic work"
              - "Covered in Kawasha (2003)"
          - name: "Humbu"
            region: "Central Lunda area, NW Province"
            speakers: "~150,000"
            characteristics:
              - "# VERIFY: Humbu-specific features vs Ndembu"
          - name: "Lunda Kalunda"
            region: "Northern NW Province"
            speakers: "~100,000"
            characteristics:
              - "# VERIFY: Kalunda features"
          - name: "Shinde"
            region: "DRC border area"
            speakers: "~50,000"
            characteristics:
              - "# VERIFY: Shinde relationship to Zambian Lunda"

        phonological_variation:
          - feature: "Vowel length"
            note: "Contrastive length is consistent across Lunda varieties (Zone L feature)"
          - feature: "NC8 prefix"
            note: "i- is expected across Lunda varieties; # VERIFY Kawasha (2003)"

        lexical_variation:
          - concept: "person"
            lunda_proper: "muntu"
            plural: "antu (NC2 a-)"
          - concept: "house"
            lunda_proper: "ng'anda"
            note: "shared with Chitonga/Kaonde/Luvale"

      usage_notes:

        register_variation:
          formal:
            description: "Education, church, official contexts"
            features:
              - "Standard ciLunda vocabulary"
              - "Fuller morphological forms with augment"
          informal:
            description: "Casual conversation"
            features:
              - "English/Bemba loanwords"
              - "Reduced augment usage"
          respectful:
            description: "For elders and chiefs (Lunda paramount: Mwata Yamvo)"
            features:
              - "NC2b honorific a- forms"
              - "Mwata Yamvo titles require special register"

        contemporary_changes:
          - change: "english_loanwords"
            description: "English loanwords entering NC9"
            examples: ["foni (phone)", "motoka (car)", "kompyuta (computer)"]
          - change: "bemba_contact"
            description: "Chibemba lexical influence in Solwezi urban area"
          - change: "nc8_homophony_awareness"
            description: "NC8 i- creates potential confusion with NC9 SM i- in rapid speech"

        cultural_notes:
          - note: "mwata_yamvo"
            description: "Lunda is the language of the Mwata Yamvo paramount chieftaincy — one of the historically most significant chieftaincies in Central Africa"
          - note: "nc2_a_prefix"
            description: "The a- NC2 human plural prefix groups ciLunda with Luvale in the K/L zone pattern"
          - note: "nc8_uniqueness"
            description: "NC8 i- is unique in the GGT language set; computational parsers must handle this carefully"

        special_rules:
          - rule: "nc7_nc8_zone_l52"
            description: "NC7 ci- pairs with NC8 i-; this ci-/i- pairing is unique to ciLunda (L.52) in the GGT set"
          - rule: "nc2_a_prefix"
            description: "NC2 human plural a- (not ba-); all NC2 concords use a- stem"
          - rule: "nc8_nc9_disambiguation"
            description: "NC8 noun prefix i- and NC9 verb SM i- require concord context for disambiguation"
          - rule: "augment_a_definite"
            description: "Augment a- marks definiteness/specificity; optional in ciLunda (unlike Chitonga where i- augment is more grammaticalised)"


# ============================================================================
# CONCORD SYSTEM
# ============================================================================

concord_system:
  concords_metadata:
    description: "Agreement markers for ciLunda. Critical: NC2=a- (not ba-); NC7=ci-; NC8=i- (Zone L.52 unique); NC16=pa-. NC8 i- concords are homophonous with NC9 SM i- — context required. All NC2-class concords use a- stem throughout."

  concords:

    subject_concords:
      description: "Subject markers appearing on verbs"
      position: "pre_TAM"

      NEG.SG:    { forms: ["ta", "si"], tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "NEG.1SG", note: "# VERIFY: ciLunda negation ta- vs other; Kawasha (2003)" }
      1SG:       { forms: ["ndi"], allomorphs: { forms: ["nd", "n"] }, tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "1SG.SM" }
      2SG:       { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "2SG.SM" }
      3SG:       { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "3SG.SM" }
      NEG.1PL:   { forms: ["ta"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "NEG.1PL", note: "# VERIFY" }
      1PL_EXCL:  { forms: ["tu"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.EXCL.SM" }
      1PL_INCL:  { forms: ["tw"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.INCL.SM" }
      2PL:       { forms: ["mu"], allomorphs: { forms: ["mw"] }, tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "2PL.SM" }
      3PL_HUMAN: { forms: ["a", "Ø"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "3PL.SM", note: "NC2 a- SM; # VERIFY Kawasha (2003)" }
      NC3:  { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC3", syntax_expectation: "subject", gloss: "CL3.SM" }
      NC4:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC4", syntax_expectation: "subject", gloss: "CL4.SM" }
      NC5:  { forms: ["li"], allomorphs: { forms: ["l"] }, tone: "L", agreement: "NC5", syntax_expectation: "subject", gloss: "CL5.SM" }
      NC6:  { forms: ["a"], allomorphs: { forms: ["Ø"] }, tone: "L", agreement: "NC6", syntax_expectation: "subject", gloss: "CL6.SM" }
      NC7:  { forms: ["ci"], allomorphs: { forms: ["c"] }, tone: "L", agreement: "NC7", syntax_expectation: "subject", gloss: "CL7.SM" }
      NC8:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC8", syntax_expectation: "subject", gloss: "CL8.SM", note: "i- SM for Zone L.52 NC8 i- class; HOMOPHONOUS with NC9 SM — disambiguate by noun class context. # VERIFY Kawasha (2003)." }
      NC9:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC9", syntax_expectation: "subject", gloss: "CL9.SM", note: "i- SM homophonous with NC8 SM; noun class context required" }
      NC10: { forms: ["i", "zi"], tone: "L", agreement: "NC10", syntax_expectation: "subject", gloss: "CL10.SM", note: "# VERIFY: NC10 SM form in ciLunda" }
      NC11: { forms: ["lu"], allomorphs: { forms: ["lw"] }, tone: "L", agreement: "NC11", syntax_expectation: "subject", gloss: "CL11.SM" }
      NC12: { forms: ["ka"], allomorphs: { forms: ["k"] }, tone: "L", agreement: "NC12", syntax_expectation: "subject", gloss: "CL12.SM" }
      NC13: { forms: ["tu"], allomorphs: { forms: ["tw"] }, tone: "L", agreement: "NC13", syntax_expectation: "subject", gloss: "CL13.SM" }
      NC14: { forms: ["bu"], allomorphs: { forms: ["bw"] }, tone: "L", agreement: "NC14", syntax_expectation: "subject", gloss: "CL14.SM" }
      NC15: { forms: ["ku"], allomorphs: { forms: ["kw"] }, tone: "L", agreement: "NC15", syntax_expectation: "subject", gloss: "CL15.SM" }
      NC16: { forms: ["pa"], allomorphs: { forms: ["p"] }, tone: "L", agreement: "NC16", syntax_expectation: "subject", gloss: "CL16.SM", note: "pa- standard Bantu locative" }
      NC17: { forms: ["ku"], allomorphs: { forms: ["kw"] }, tone: "L", agreement: "NC17", syntax_expectation: "subject", gloss: "CL17.SM" }
      NC18: { forms: ["mu"], allomorphs: { forms: ["mw"] }, tone: "L", agreement: "NC18", syntax_expectation: "subject", gloss: "CL18.SM" }

    object_concords:
      description: "Object markers appearing on verbs"
      position: "pre_root_post_TAM"

      1SG:  { forms: ["ndi"], tone: "H", agreement: "NC1", syntax_expectation: "object", gloss: "1SG.OM" }
      2SG:  { forms: ["ku"], tone: "L", agreement: "NC1", syntax_expectation: "object", gloss: "2SG.OM" }
      3SG:  { forms: ["mu"], tone: "L", agreement: "NC1", syntax_expectation: "object", gloss: "3SG.OM" }
      1PL:  { forms: ["tu"], tone: "L", agreement: "NC1", syntax_expectation: "object", gloss: "1PL.OM" }
      2PL:  { forms: ["mu"], tone: "L", agreement: "NC1", syntax_expectation: "object", gloss: "2PL.OM" }
      3PL:  { forms: ["a"], tone: "L", agreement: "NC2", syntax_expectation: "object", gloss: "3PL.OM", note: "NC2 a- OM; # VERIFY" }
      NC3:  { forms: ["u"], tone: "L", agreement: "NC3", syntax_expectation: "object", gloss: "CL3.OM" }
      NC4:  { forms: ["i"], tone: "L", agreement: "NC4", syntax_expectation: "object", gloss: "CL4.OM" }
      NC5:  { forms: ["li"], tone: "L", agreement: "NC5", syntax_expectation: "object", gloss: "CL5.OM" }
      NC6:  { forms: ["a"], tone: "L", agreement: "NC6", syntax_expectation: "object", gloss: "CL6.OM" }
      NC7:  { forms: ["ci"], allomorphs: { forms: ["c"] }, tone: "L", agreement: "NC7", syntax_expectation: "object", gloss: "CL7.OM" }
      NC8:  { forms: ["i"], tone: "L", agreement: "NC8", syntax_expectation: "object", gloss: "CL8.OM", note: "i- OM for NC8 i- class — # VERIFY" }
      NC9:  { forms: ["i"], tone: "L", agreement: "NC9", syntax_expectation: "object", gloss: "CL9.OM" }
      NC10: { forms: ["i", "zi"], tone: "L", agreement: "NC10", syntax_expectation: "object", gloss: "CL10.OM", note: "# VERIFY" }
      NC11: { forms: ["lu"], tone: "L", agreement: "NC11", syntax_expectation: "object", gloss: "CL11.OM" }
      NC12: { forms: ["ka"], tone: "L", agreement: "NC12", syntax_expectation: "object", gloss: "CL12.OM" }
      NC13: { forms: ["tu"], tone: "L", agreement: "NC13", syntax_expectation: "object", gloss: "CL13.OM" }
      NC14: { forms: ["bu"], tone: "L", agreement: "NC14", syntax_expectation: "object", gloss: "CL14.OM" }
      NC15: { forms: ["ku"], tone: "L", agreement: "NC15", syntax_expectation: "object", gloss: "CL15.OM" }
      NC16: { forms: ["pa"], tone: "L", agreement: "NC16", syntax_expectation: "object", gloss: "CL16.OM" }
      NC17: { forms: ["ku"], tone: "L", agreement: "NC17", syntax_expectation: "object", gloss: "CL17.OM" }
      NC18: { forms: ["mu"], tone: "L", agreement: "NC18", syntax_expectation: "object", gloss: "CL18.OM" }

    relative_concords:
      description: "Relative clause markers (high tone)"
      NC1:  { forms: ["uu"], tone: "H", agreement: "NC1", syntax_expectation: "relative", gloss: "CL1.REL" }
      NC2:  { forms: ["a"], tone: "H", agreement: "NC2", syntax_expectation: "relative", gloss: "CL2.REL", note: "a- NC2 relative; # VERIFY" }

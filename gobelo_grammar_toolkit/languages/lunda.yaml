      NC8:  { forms: ["ya"], tone: "L", agreement: "NC8", syntax_expectation: "connective", gloss: "CL8.CONN", example: "intu ya antu (things of people)", note: "# VERIFY: ya- connective for NC8 i-" }
      NC9:  { forms: ["ya"], tone: "L", agreement: "NC9", syntax_expectation: "connective", gloss: "CL9.CONN" }
      NC10: { forms: ["ya", "zya"], tone: "L", agreement: "NC10", syntax_expectation: "connective", gloss: "CL10.CONN", note: "# VERIFY" }
      NC11: { forms: ["lwa"], tone: "L", agreement: "NC11", syntax_expectation: "connective", gloss: "CL11.CONN" }
      NC12: { forms: ["ka"], tone: "L", agreement: "NC12", syntax_expectation: "connective", gloss: "CL12.CONN" }

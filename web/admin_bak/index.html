<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GGT Grammar Admin — Gobelo Grammar Toolkit</title>

    <!-- Tailwind CSS (play CDN — supports arbitrary values and config) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ggt: {
                bg:       '#080c10',
                panel:    '#0d1117',
                card:     '#121921',
                input:    '#09111a',
                border:   '#1c2736',
                borderL:  '#263547',
                text:     '#c9d8e8',
                muted:    '#5a7080',
                accent:   '#e8934a',
                accentBg: '#1f1308',
                verify:   '#d4a300',
                verifyBg: '#1a1500',
                success:  '#3db86e',
                danger:   '#e05454',
                blue:     '#4a9ede',
              }
            },
            fontFamily: {
              mono: ['"JetBrains Mono"', 'monospace'],
              sans: ['Syne', 'sans-serif'],
            }
          }
        }
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-ggt-bg text-ggt-text font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

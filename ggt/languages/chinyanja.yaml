# CHINYANJA LANGUAGE - COMPREHENSIVE GRAMMAR
# ============================================================================
# ChiNyanja/Chichewa Grammar — Gobelo Grammar Toolkit (GGT)
# Schema: Gobelo-YAML Grammar Framework v1.0
# Reference: Mchombo (2004) The Syntax of Chichewa; Mtenje (1986);
#            Watkins (1937); CBOLD
# Generated: 2025-07-11
# ============================================================================

metadata:
  language:
    name: "ChiNyanja"
    iso_code: "nya"
    guthrie: "N.31"
    primary_region: "Zambia (Eastern Province, Lusaka); Malawi (national language)"
    approximate_speakers: "1200000"
    family: "Niger-Congo, Bantu (Zone N)"
    description: "A comprehensive concord and verbal morphology system for ChiNyanja/Chichewa, a Zone N Bantu language. Key features diverging from Chitonga: NC2=a-; NC7=chi-; NC8=zi-; NC14=u- (NOT bu-); NO augment; negation via -sa- infix (SLOT4); APPL=-ir-/-er-; CAUS=-its-/-ets-; PASS=-idw-/-edw-; PRES=ma-; PST=na-; FUT=dza-; perfective=tonal -a. Primary references: Mchombo (2004) and Mtenje (1986)."
    dialects: ["Chichewa", "ChiNyanja proper", "Nsenga", "Manganja"]

  orthography:
    base: "Standard Zambia/Malawi ChiNyanja Orthography"
    standard: "Malawi Standard Chichewa; Zambia Eastern Province Nyanja"
    zimbawe: null
    zambia: "Zambia MoE Eastern Province Nyanja Orthography"
    alternative: "Missionary Orthography (Watkins 1937)"

  tone_marking: false
  date_created: "2025-07-11"
  last_updated: "2025-07-11"
  version: "1.0.0 (RC)"

  schema_compatibility:
    min_parser_version: "1.0"
    max_parser_version: "2.x"

  maintainer:
    name: "Your Name"
    email: "your.email@example.com"

  framework:
    name: "Gobelo-YAML Grammar Framework"
    version: "1.0"
    template_for: [Regional Official languages - Bemba, Nyanja, Lozi, Lunda, Kaonde, Luvale, Tonga]
    Yaml_version: 1.0
    license: "MIT"

  documentation: [See docs/grammar_documentation.yaml]
  Target_audience: [Educators, Linguists, Developers, Researchers, Students]
  reference_grammar: "Mchombo (2004), The Syntax of Chichewa (Cambridge); Mtenje (1986); Watkins (1937)"
  editing_instructions: |
    This file is designed for linguists to read and edit.
    - Add examples liberally for clarity
    - Use verbose descriptions where helpful
    - Include linguistic references
    - NOTE: ChiNyanja is Zone N Bantu (N.31); profoundly different from Chitonga:
    - NO augment system (all augment fields are null)
    - NC2 = a- (not ba-) — cascades to ALL NC2 concords
    - NC7 = chi-; NC8 = zi-; NC14 = u- (NOT bu-)
    - Negation: -sa- infix in SLOT4 (not pre-initial)
    - APPL = -ir-/-er-; CAUS = -its-/-ets-; PASS = -idw-/-edw-
    - PRES = -ma-; PST = -na-; FUT = -dza-
    - Perfective FV = tonal -a (H on TAM; FV stays -a)
    - OCP/Meeussen's Rule applies strictly (feeds TS.1)

# ============================================================================
# PHONOLOGY SYSTEM
# ============================================================================

phonology:

  phonology_metadata:
    language: chinyanja
    framework: gobelo
    module: unified_phonology
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    design_goals:
      - full_reversibility
      - explicit_rule_ordering
      - autosegmental_tone
      - dialect_feature_gating
      - NLP_safe_normalization
      - integrated_sandhi_processing
    sources:
      - Mchombo 2004
      - Mtenje 1986
      - Watkins 1937
      - CBOLD
      - Nurse_Philippson
    integration_notes: |
      ChiNyanja/Chichewa (N.31) is a Zone N Bantu language with many
      significant divergences from Chitonga (M.64). Phonologically:
      rhotic applicative -ir-/-er- instead of lateral -il-/-el-;
      affricate causative -its-/-ets-; passive -idw-/-edw-.
      Tonologically: Meeussen's Rule (OCP) applies strictly and feeds
      TS.1 — the rule interaction is feeding: [OCP.1, TS.1]. This is
      unique among the GGT language set. Vowel length is less contrastive
      than in Zone L languages.
    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  vowels:
    segments: [i, e, a, o, u]
    short: [i, e, a, o, u]
    long: [ii, ee, aa, oo, uu]
    features:
      height:
        high: [i, u]
        mid: [e, o]
        low: [a]
      backness:
        front: [i, e]
        central: [a]
        back: [o, u]
      round:
        rounded: [o, u]
        unrounded: [i, e, a]
    notes: "Vowel length is less contrastive in ChiNyanja than in Zone L languages (Chibemba, Luvale). Long vowels appear in some morphological contexts."

  consonants:
    segments: [
        b, ch, d, f, g, h, j, k, l, m, n, p, r, s, sh, t, v, w, y, z,
        mb, mp, nd, ng, nk, ns, nt, nz, ny, nf, nch,
        bw, chw, fw, gw, kw, lw, mw, nw, pw, rw, sw, tw, vw, zw,
        by, chy, dy, jy, ky, ny, py, ty, vy,
        ts, dz, dj
      ]
    features:
      place:
        labial: [p, b, m, w]
        labiodental: [f, v]
        alveolar: [t, d, n, s, z, l, r]
        palatal: [ch, j, y, sh, ny]
        velar: [k, g]
      manner:
        stop: [p, t, k, b, d, g]
        nasal: [m, n, ny]
        fricative: [f, v, s, z, sh, h]
        affricate: [ch, j, ts, dz, dj, nch]
        liquid: [l, r]
        glide: [w, y]
        prenasalised: [mb, mp, nd, nk, ng, nz, nch]
      voicing:
        voiced: [b, d, g, m, n, v, z, l, r, w, y, j, mb, nd, ng, nz, dz, dj]
        voiceless: [p, t, k, f, s, sh, mp, nk, ch, ts, nch]
    notes: "ChiNyanja has a rhotic /r/ (present in APPL suffix -ir-/-er-); ch/j affricate series; ts/dz series. The presence of /r/ is typologically significant for Zone N and motivates the -ir-/-er- applicative."

  syllable_structure:
    pattern: [(C)V(N), CCV(N), CCCV(N)]
    variants: []

  tones:
    levels: ["high", "low", "falling", "rising"]
    notation: ["´", "`", "^", "ˇ"]
    notes: "ChiNyanja is 2-tone H/L system. CRITICAL: Meeussen's Rule (OCP.1) applies strictly before TS.1 in ChiNyanja — OCP.1 feeds TS.1. This means adjacent H tones are resolved before H-spreading applies. Grammatical tone is critical: the PERFECT aspect is marked by H tone on the TAM marker (not a distinct FV)."

  boundaries:
    morpheme: "+"
    zone: "|"
    word: "#"
    phrase: "##"

  engine_features:
    extended_H_spread:
      type: boolean
      default: false
      note: "Not applicable to ChiNyanja; extended H-spread is Chibemba-specific"
    reduced_H_spread:
      type: boolean
      default: false
    initial_H_lowering:
      type: boolean
      default: false

  processing_stages:
    - stage: morphophonology
      description: "Stem-internal and morpheme-triggered alternations"
      applies_to: [stem, affix_attachment]
    - stage: sandhi
      description: "Boundary-conditioned surface adjustments"
      applies_to: [morpheme_boundary, zone_boundary, word_boundary]
    - stage: prosody
      description: "Suprasegmental and phrasal processes"
      applies_to: [syllable, word, phrase]
    - stage: tone
      description: "Tonal association and spreading"
      applies_to: [mora, word, phrase]

  morphophonology:

    - id: VH.1
      type: segmental
      subtype: vowel_harmony
      domain: stem
      stage: morphophonology
      ordering: 1
      input:
        suffix: applicative
      conditions:
        stem_vowel:
          high_or_low: ir
          mid: er
      output:
        suffix_form: conditioned
      reversible: true
      notes: "CRITICAL DIFFERENCE: ChiNyanja uses RHOTIC height harmony -ir-/-er- (not lateral -il-/-el- as in Chitonga). High/low stems take -ir-; mid-vowel stems take -er-. This is the Zone N applicative pattern."

    - id: CA.1
      type: segmental
      subtype: consonant_alternation
      domain: syllable_onset
      stage: morphophonology
      ordering: 2
      input:
        consonant: l
        following_vowel: [+high]
      output:
        consonant: d
      reversible: true
      notes: "l/d alternation before high vowels; active in ChiNyanja stem-internal processes"

    - id: CA.2
      type: segmental
      subtype: palatalization
      domain: syllable_onset
      stage: morphophonology
      ordering: 3
      input:
        consonant: k
        following_vowel: [+front]
      output:
        consonant: ch
      reversible: true
      notes: "Palatalisation k → ch before front vowels; Zone N reflex is ch- (as in chi- NC7 prefix). Distinct from Chitonga c- and Chibemba sh-."

  sandhi_rules:

    - id: SND.1
      name: high_vowel_glide
      type: segmental
      subtype: glide_formation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme, zone]
      ordering: 10
      input:
        left:
          features: [+high, +vowel]
        right:
          features: [+vowel]
      output:
        mapping:
          i: y
          u: w
      blocks: [SND.2]
      reversible: true
      examples:
        - underlying: ku+i+ya
          surface: kuya
        - underlying: mu+ana
          surface: mwana
      notes: "Glide formation at morpheme boundaries; active in chi-/mu-/ku- allomorphy"

    - id: SND.2
      name: vowel_coalescence
      type: segmental
      subtype: vowel_coalescence
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 11
      input:
        sequence: [V, V]
      conditions:
        blocked_by: [SND.1]
      output:
        mapping:
          a+i: e
          a+u: o
          i+a: ya
          u+a: wa
      reversible: true
      examples:
        - underlying: a+a+ya
          surface: aya
      notes: "Active with a- NC2/NC6 prefix coalescence"

    - id: SND.3
      name: nasal_assimilation
      type: segmental
      subtype: nasal_assimilation
      stage: sandhi
      direction: bidirectional
      applies_across: [morpheme]
      ordering: 12
      input:
        left:
          segment: N
        right:
          features: [+consonant, +oral]
      output:
        left: homorganic_nasal
      reversible: true
      examples:
        - underlying: N+b
          surface: mb
        - underlying: N+d
          surface: nd
        - underlying: N+ch
          surface: nch
      notes: "NC9/10 nasal prefix assimilation; nch- before /ch/ is active in ChiNyanja"

    - id: SND.4
      name: vowel_elision
      type: segmental
      subtype: vowel_deletion
      stage: sandhi
      direction: unidirectional
      applies_across: [word]
      ordering: 13
      input:
        left:
          features: [+vowel]
        right:
          boundary: word
      output:
        delete: left
      constraints:
        - prosodic_clitic
      reversible: false
      examples:
        - underlying: ku+i+ya#
          surface: kuya
      notes: "Word-boundary vowel deletion in cliticisation"

  prosody:

    - id: MP.1
      type: prosodic
      subtype: mora_preservation
      domain: syllable
      stage: prosody
      ordering: 20
      trigger:
        deleted_segment: consonant
      effect:
        target: adjacent_vowel
        add_mora: 1
      reversible: true

    - id: VL.2
      type: prosodic
      subtype: penultimate_lengthening
      domain: phonological_phrase
      stage: prosody
      ordering: 21
      input:
        position: penultimate
      output:
        vowel_length: long
      reversible: true

  tone:

    - id: TBU.1
      type: tonal
      subtype: tone_bearing_unit
      domain: mora
      stage: tone
      ordering: 30
      definition:
        each_mora_bears_tone: true
      reversible: true

    - id: TS.1
      type: tonal
      subtype: high_spread
      domain: phonological_word
      stage: tone
      ordering: 31
      gate:
        tone: H
        following_tone: Ø
        block_if_following_tone: H
      effect:
        associate: H
      reversible: true
      notes: "H-spread; CRITICAL: in ChiNyanja, OCP.1 feeds TS.1 (Meeussen's Rule applies before H-spreading)"

    - id: TS.2
      type: tonal
      subtype: unbounded_high_spread
      domain: phonological_phrase
      stage: tone
      ordering: 32
      gate:
        engine_feature: extended_H_spread
      effect:
        associate: H_to_all_following
      reversible: true
      notes: "Gated by extended_H_spread: false in ChiNyanja; does not fire"

    - id: OCP.1
      type: tonal
      subtype: adjacent_H_resolution
      domain: phonological_word
      stage: tone
      ordering: 33
      input:
        sequence: H H
      output:
        delete: first_H
      reversible: true
      notes: "CRITICAL for ChiNyanja: Meeussen's Rule (OCP) applies strictly and FEEDS TS.1. Adjacent H tones are resolved before H-spreading. See rule_interactions.feeding: [OCP.1, TS.1]."

    - id: TL.1
      type: tonal
      subtype: final_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 34
      gate:
        position: final
        tone: H
      output:
        contour: HL
      reversible: true

    - id: TL.2
      type: tonal
      subtype: penultimate_lowering
      domain: phonological_phrase
      stage: tone
      ordering: 35
      gate:
        position: penultimate
        tone: H
      output:
        contour: HL
      reversible: true

  rule_interactions:
    feeding:
      - [SND.1, SND.2]
      - [SND.3, MP.1]
      - [OCP.1, TS.1]
    bleeding:
      - [SND.1, SND.2]
    counterfeeding:
      - [VL.2, SND.4]
    opacity:
      - note: "OCP.1 feeding TS.1 creates a feeding opacity in ChiNyanja tonal derivations — the order OCP.1 → TS.1 is strictly required (Meeussen's Rule / Mtenje 1986)"

  global_ordering:
    - morphophonology: [1-9]
    - sandhi: [10-19]
    - prosody: [20-29]
    - tone: [30-39]
  notes: |
    CRITICAL ChiNyanja-specific rule ordering: OCP.1 (Meeussen's Rule)
    must apply before TS.1 (H-spread). This feeding relationship is
    encoded in rule_interactions.feeding: [OCP.1, TS.1]. The perfect
    aspect is grammatically encoded via H tone on the TAM marker -na-
    rather than a distinct perfective FV (unlike Chitonga -ide or Bemba -ile).

  constraints:
    - id: R.1
      description: "Mora count must be preserved or explicitly reassigned"
      enforce: true

    - id: R.2
      description: "No contrastive feature deletion"
      forbidden:
        - tone
        - vowel_height
        - vowel_backness

    - id: R.3
      description: "Rule blocking must be explicit"
      enforce: true

    - id: R.4
      description: "Each rule must be independently invertible"
      enforce: true
      exceptions: [SND.4]

    - id: R.5
      description: "Sandhi rules must specify boundary conditions"
      enforce: true
      applies_to: sandhi


# ============================================================================
# NOUN CLASS SYSTEM
# ============================================================================

noun_class_system:

  noun_class_metadata:
    language: chinyanja
    framework: gobelo
    module: noun_class_system
    version: "1.0"
    last_updated: "2025-07-11"
    status: stable
    default_pos_tag: NOUN

    augment_system:
      description: "ChiNyanja has NO augment/pre-prefix system"
      form: null
      usage: "not_applicable"
      contexts: []
      examples: []
      notes: "Unlike Chitonga (i-) or Lunda (a-), ChiNyanja does not use a pre-prefix augment. All augment fields are null throughout this file. This is consistent with Mchombo (2004)."

    loanword_assignment:
      default_class: "NC9"
      strategy: "phonological_and_semantic"
      notes: "Loanwords from English typically enter NC9/NC10; human loanwords enter NC1/NC2 (a-)"

    sources:
      - Mchombo 2004
      - Mtenje 1986
      - Watkins 1937
      - CBOLD
      - Nurse_Philippson

    integration_notes: |
      ChiNyanja/Chichewa (N.31) has multiple critical divergences from Chitonga.
      NO augment. NC2 = a- (not ba-) — cascades to all NC2 concords.
      NC7 = chi- (Zone N affricate). NC8 = zi- (same as Chitonga — but
      note this is shared with Chitonga, not a divergence). NC14 = u- (NOT
      bu-!) — unique in GGT set; allomorph w- before vowels. NC5 = Ø- or
      li- (dialect-dependent). NC12 (ka-) marginal productivity.
      Negation via -sa- infix (SLOT4). Perfective = tonal -a.

    schema_compatibility:
      min_parser_version: "1.0"
      max_parser_version: "2.x"

  noun_classes:

    NC1:
      class_number: 1
      class_type: regular
      grammatical_number: singular
      paired_class: NC2
      frequency: very_high
      active: true
      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
            examples: [mwana, mwamuna]
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +singular]
        typical_referents: [humans, kinship, professions, titles]

    NC1a:
      class_number: 1
      class_type: irregular
      grammatical_number: singular
      paired_class: NC2a
      frequency: medium
      active: true
      prefix:
        canonical_form: "Ø-"
        allomorphs: []
        formatives:
          - form: ["a-", "Ø"]
        tone: L
        notes: "# VERIFY: ChiNyanja kinship prefix forms (Mchombo 2004); a- or Ø for kin terms"
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [VL.2, TS.1, TL.1]
      semantics:
        primary_domain: kinship_proper_names
        features: [+human, +animate, +singular]
        typical_referents: [kinship_terms, proper_names]

    NC2:
      class_number: 2
      class_type: regular
      grammatical_number: plural
      paired_class: NC1
      frequency: very_high
      active: true
      prefix:
        canonical_form: "a-"
        allomorphs: []
        tone: L
        notes: "CRITICAL DIFFERENCE from Chitonga: ChiNyanja NC2 = a- (NOT ba-). This is confirmed in Mchombo (2004) and cascades to ALL NC2 concord paradigms throughout this file."
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: human_beings
        features: [+human, +animate, +plural]
        typical_referents: [human_groups, plural_kinship, professions_plural]

    NC2a:
      class_number: 2
      class_type: subclass
      grammatical_number: plural
      paired_class: NC1a
      frequency: high
      active: true
      prefix:
        canonical_form: "a-"
        allomorphs: []
        tone: L
        notes: "Uses NC2 a- prefix; paired with NC1a nouns"
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: kinship_proper_names_plural
        features: [+human, +animate, +plural]
        typical_referents: [kinship_plural, proper_name_plural]

    NC2b:
      class_number: 2
      class_type: irregular
      grammatical_number: plural
      paired_class: NC1
      frequency: low
      active: true
      prefix:
        canonical_form: "a-"
        allomorphs: []
        formative: "ama-"
        tone: L
        notes: "# VERIFY: ChiNyanja honorific plural; ama- or mu- class forms (Mchombo 2004)"
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: respectful_reference
        features: [+human, +animate, +respectful]
        typical_referents: [elders, chiefs, respected_persons]

    NC3:
      class_number: 3
      class_type: regular
      grammatical_number: singular
      paired_class: NC4
      frequency: high
      active: true
      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: plants_trees_long_objects
        features: [-human, +animate, +singular]
        typical_referents: [trees, plants, long_objects, body_parts]
      notes: "Homophonous with NC1; distinguished by concord"

    NC4:
      class_number: 4
      class_type: regular
      grammatical_number: plural
      paired_class: NC3
      frequency: high
      active: true
      prefix:
        canonical_form: "mi-"
        allomorphs:
          - form: "my-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: plants_trees_long_objects_plural
        features: [-human, +animate, +plural]
        typical_referents: [trees_plural, plants_plural, body_parts_plural]

    NC5:
      class_number: 5
      class_type: regular
      grammatical_number: singular
      paired_class: NC6
      frequency: medium
      active: true
      prefix:
        canonical_form: "li-"
        allomorphs:
          - form: "Ø"
            condition: "many_nouns_take_zero_prefix_Chichewa_dialect"
          - form: "l-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "DIALECT VARIATION: NC5 prefix varies by dialect — li- is traditional/Valley Nyanja form; Ø- (zero prefix) is predominant in Chichewa/Malawi dialect. Both are attested. Mchombo (2004) analyses this as underlying li- with frequent deletion."
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, CA.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: augmentative_body_parts
        features: [-human, +singular]
        typical_referents: [body_parts, large_items, paired_body_parts]

    NC6:
      class_number: 6
      class_type: regular
      grammatical_number: plural
      paired_class: NC5
      frequency: high
      active: true
      prefix:
        canonical_form: "ma-"
        allomorphs:
          - form: "m-"
            condition: before_consonants
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: liquids_masses_plurals
        features: [-human, +plural]
        typical_referents: [liquids, masses, collectives, NC5_plurals]

    NC7:
      class_number: 7
      class_type: regular
      grammatical_number: singular
      paired_class: NC8
      frequency: very_high
      active: true
      prefix:
        canonical_form: "chi-"
        allomorphs:
          - form: "ch-"
            condition: before_vowels
            condition_formal: _V
          - form: "ci-"
            condition: variant_orthography_older_texts
        tone: L
        notes: "ChiNyanja NC7 = chi- (Zone N; same canonical form as Luvale but distinct from Chitonga ci- and Chibemba fi-). chi- is the standard Malawi/Zambia Chichewa orthography. CA.2 historically *k→ch before i."
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, CA.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: things_instruments_languages
        features: [-human, -animate, +singular]
        typical_referents: [objects, instruments, languages, customs, diminutives]

    NC8:
      class_number: 8
      class_type: regular
      grammatical_number: plural
      paired_class: NC7
      frequency: very_high
      active: true
      prefix:
        canonical_form: "zi-"
        allomorphs:
          - form: "z-"
            condition: before_vowels
            condition_formal: _V
          - form: "zy-"
            condition: before_vowels_variant
        tone: L
        notes: "ChiNyanja NC8 = zi- (same as Chitonga — the Zone N chi-/zi- pairing mirrors Chitonga ci-/zi-). Distinct from Luvale vi-, Chibemba bi-, SiLozi li-."
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: things_instruments_plural
        features: [-human, -animate, +plural]
        typical_referents: [objects_plural, instruments_plural, languages_plural]

    NC9:
      class_number: 9
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: very_high
      active: true
      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
            condition_formal: _[+labial]
          - form: "n-"
            condition: before_alveolars
            condition_formal: _[+alveolar]
          - form: "ng-"
            condition: before_velars
            condition_formal: _[+velar]
          - form: "nch-"
            condition: before_ch_affricate
            condition_formal: _ch
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
        notes: "Abstract N- assimilates to following consonant; nch- before /ch/ is ChiNyanja-specific"
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.3, MP.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: animals_loanwords_diverse
        features: [-human, +singular]
        typical_referents: [animals, loanwords, diverse_objects]

    NC10:
      class_number: 10
      class_type: regular
      grammatical_number: plural
      paired_class: NC9
      frequency: very_high
      active: true
      prefix:
        canonical_form: "N-"
        allomorphs:
          - form: "m-"
            condition: before_labials
          - form: "n-"
            condition: before_alveolars
          - form: "ng-"
            condition: before_velars
          - form: "nch-"
            condition: before_ch_affricate
          - form: "Ø"
            condition: before_fricatives_and_vowels
        tone: L
        notes: "Identical to NC9 prefix; distinguished by concord"
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.3, MP.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: animals_loanwords_diverse_plural
        features: [-human, +plural]
        typical_referents: [animals_plural, loanwords_plural]

    NC11:
      class_number: 11
      class_type: regular
      grammatical_number: singular
      paired_class: NC10
      frequency: medium
      active: true
      prefix:
        canonical_form: "lu-"
        allomorphs:
          - form: "lw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: long_thin_objects
        features: [-human, +singular]
        typical_referents: [long_thin_objects, abstract_nouns, strands]

    NC12:
      class_number: 12
      class_type: regular
      grammatical_number: singular
      paired_class: NC13
      frequency: limited
      active: true
      prefix:
        canonical_form: "ka-"
        allomorphs:
          - form: "k-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "NC12 ka- is marginal in ChiNyanja (Chichewa dialect) — less productive than in Chitonga or Chibemba. Frequency set to limited."
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: diminutives_small
        features: [-human, +singular, +diminutive]
        typical_referents: [small_objects, diminutives, affectionate_reference]

    NC13:
      class_number: 13
      class_type: regular
      grammatical_number: plural
      paired_class: NC12
      frequency: limited
      active: true
      prefix:
        canonical_form: "tu-"
        allomorphs:
          - form: "tw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "NC13 tu- is marginal — paired with limited-productivity NC12"
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: diminutives_plural
        features: [-human, +plural, +diminutive]
        typical_referents: [small_objects_plural, diminutives_plural]

    NC14:
      class_number: 14
      class_type: regular
      grammatical_number: singular
      paired_class: null
      frequency: high
      active: true
      prefix:
        canonical_form: "u-"
        allomorphs:
          - form: "w-"
            condition: before_vowels
            condition_formal: _V
        tone: L
        notes: "CRITICAL DIFFERENCE: ChiNyanja NC14 = u- (NOT bu- as in Chitonga/Chibemba/Luvale). This is unique to ChiNyanja/Chichewa and Nyanja in the GGT set. Allomorph w- before vowels (e.g., wanthu not u+anthu). Confirmed in Mchombo (2004)."
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: abstract_mass
        features: [-human, -count, +singular]
        typical_referents: [abstract_qualities, masses, uncountables]
      notes: "Typically no plural; mass/abstract interpretation. u- prefix is the most distinctive NC14 form in the GGT set."

    NC15:
      class_number: 15
      class_type: verbal
      grammatical_number: null
      paired_class: null
      frequency: very_high
      active: true
      prefix:
        canonical_form: "ku-"
        allomorphs:
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: verbal_infinitives
        features: [+verbal, -count]
        typical_referents: [actions, processes, infinitival_complements]

    NC16:
      class_number: 16
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true
      prefix:
        canonical_form: "pa-"
        allomorphs:
          - form: "p-"
            condition: before_vowel_a
        tone: L
        notes: "pa- standard Bantu locative; consistent across all GGT languages except SiLozi (fa-)"
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.2, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: definite_surface_location
        features: [+locative, +definite]
        typical_referents: [specific_places, surfaces, at_locations]

    NC17:
      class_number: 17
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: high
      active: true
      prefix:
        canonical_form: "ku-"
        allomorphs:
          - form: "kw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: directional_general_location
        features: [+locative, -definite]
        typical_referents: [general_areas, directions, to_locations]

    NC18:
      class_number: 18
      class_type: locative
      grammatical_number: null
      paired_class: null
      frequency: medium
      active: true
      prefix:
        canonical_form: "mu-"
        allomorphs:
          - form: "mw-"
            condition: before_vowels
            condition_formal: _V
        tone: L
      augment:
        form: null
        usage: not_applicable
      triggers_rules: [SND.1, VL.2, TS.1, TL.1]
      semantics:
        primary_domain: interior_location
        features: [+locative, +interior]
        typical_referents: [inside_places, within_locations, in_locations]

  noun_class_features:
    cross_class_patterns:
      high_vowel_classes:
        description: "Classes triggering SND.1 (Glide Formation)"
        classes: [NC1, NC3, NC4, NC5, NC7, NC8, NC11, NC12, NC13, NC14, NC15, NC17, NC18]
        rule: SND.1

      low_vowel_classes:
        description: "Classes triggering SND.2 (Vowel Coalescence)"
        classes: [NC2, NC6, NC16]
        rule: SND.2

      nasal_classes:
        description: "Classes with exclusive nasal assimilation; nch- before /ch/ active"
        classes: [NC9, NC10]
        rule: SND.3

      human_classes:
        description: "Classes for human reference"
        classes: [NC1, NC2]
        features: [+human, +animate]

      locative_classes:
        description: "Locative noun classes"
        classes: [NC16, NC17, NC18]
        features: [+locative]

      homophonous_prefixes:
        "mu-": [NC1, NC3, NC18]
        "ku-": [NC15, NC17]
        "a-": [NC2, NC6]
        note: "NC2 a- and NC6 a- (ma- root) share the same vowel sequence; NC14 u- is unique in the set"

      derivational_patterns:

        diminutive_formation:
          source_class: "any"
          target_class: "NC12/NC13"
          pattern: "ka-/tu- + stem"
          semantic_change: "indicates smallness (marginal in Chichewa dialect)"
          examples:
            - base: "munthu (person, NC1)"
              derived: "kamunthu (little person)"
              plural: "tumunthu (little people)"
            - base: "nyumba (house, NC9)"
              derived: "kanyumba (little house)"
              plural: "tunyumba (little houses)"
            - base: "chinthu (thing, NC7)"
              derived: "kanthu (little thing)"
              plural: "tunthu (little things)"

        augmentative_formation:
          source_class: "any"
          target_class: "NC5/NC6"
          pattern: "li-/ma- + stem (li- marginal; Ø- in Chichewa)"
          semantic_change: "indicates largeness or importance"
          examples:
            - base: "chinthu (thing, NC7)"
              derived: "linthu (big thing)"
              plural: "manthu (big things)"

        language_names:
          source_class: "NC1 (ethnic group)"
          target_class: "NC7"
          pattern: "chi- + ethnic stem"
          semantic_change: "creates language name from ethnic group"
          examples:
            - base: "Mnyanja (Nyanja person, NC1)"
              derived: "Chinyanja (Nyanja language, NC7)"
            - base: "Mchewa (Chewa person, NC1)"
              derived: "Chichewa (Chichewa language, NC7)"
            - base: "Mtonga (Tonga person)"
              derived: "Chitonga (Tonga language)"

        abstract_nouns:
          source_class: "adjective"
          target_class: "NC14"
          pattern: "u- + adjective stem"
          semantic_change: "creates abstract quality noun"
          examples:
            - base: "-ndi (good)"
              derived: "undi (goodness)"
            - base: "-kulu (big/great)"
              derived: "ukulu (greatness/authority)"
            - base: "-wisi (bad)"
              derived: "uwisi (badness)"
          note: "NC14 u- (NOT bu-) is the ChiNyanja-specific abstract prefix"

        infinitives:
          source_class: "verb stem"
          target_class: "NC15"
          pattern: "ku- + verb stem"
          semantic_change: "creates infinitive/verbal noun"
          examples:
            - base: "-dya (eat)"
              derived: "kudya (to eat)"
            - base: "-ya (go)"
              derived: "kuya (to go)"
            - base: "-ona (see)"
              derived: "kuona (to see)"

        manner_nouns:
          source_class: "verb stem"
          target_class: "NC7"
          pattern: "chi- + verb stem"
          semantic_change: "creates manner/way of doing"
          examples:
            - base: "-lemba (write)"
              derived: "chilembo (letter/writing style)"
            - base: "-ya (go)"
              derived: "chiyembekezo (hope/expectation)"

        locative_derivation:
          source_class: "any noun"
          target_class: "NC16/17/18"
          patterns:
            - "pa- + noun (at/on)"
            - "ku- + noun (to/towards)"
            - "mu- + noun (in/inside)"
          examples:
            - base: "nyumba (house, NC9)"
              derived:
                - "panyumba (at the house)"
                - "kunyumba (to the house)"
                - "mnyumba (in the house)"

      semantic_notes:

        class_pairing_semantics:
          description: "Semantic relationships between singular and plural classes"
          patterns:
            - pairing: "NC1/NC2"
              semantics: "human beings"
              examples: ["munthu/anthu (person/people)"]
              note: "NC2 a- → anthu (not banthu)"
            - pairing: "NC3/NC4"
              semantics: "trees, plants, natural objects"
              examples: ["mtengo/mitengo (tree/trees)", "mutu/mitu (head/heads)"]
            - pairing: "NC5/NC6"
              semantics: "large/important objects, body parts"
              examples: ["dzino/mano (tooth/teeth)", "bondo/mabondo (knee/knees)"]
            - pairing: "NC7/NC8"
              semantics: "things, objects, instruments, languages (chi-/zi-)"
              examples: ["chinthu/zinthu (thing/things)", "Chichewa (Chewa language)"]
            - pairing: "NC9/NC10"
              semantics: "animals, loanwords"
              examples: ["ng'ombe/ing'ombe (cow/cows)", "nyumba/nyumba (house/houses)"]
            - pairing: "NC12/NC13"
              semantics: "diminutives (marginal in Chichewa)"
              examples: ["kanthu/tunthu (little thing/little things)"]

        loanword_assignment:
          description: "How borrowed words are assigned to noun classes"
          strategies:
            - strategy: "phonological"
              description: "Consonant-initial nouns → NC9"
              examples:
                - word: "basi (bus)"
                  class: "NC9"
                  plural: "mabasi (NC6)"
            - strategy: "semantic"
              description: "Human referents → NC1/NC2 (a-)"
              examples:
                - word: "dakitala (doctor)"
                  class: "NC1"
                  plural: "adakitala (NC2 a-)"

        homonymy_disambiguation:
          description: "How concord disambiguates identical prefix forms"
          examples:
            - forms: "mu-"
              meanings:
                - class: "NC1"
                  meaning: "human singular"
                  example: "munthu uyu (this person — NC1 concord)"
                - class: "NC3"
                  meaning: "tree singular"
                  example: "mtengo uyu (this tree — NC3 concord)"
                - class: "NC18"
                  meaning: "interior location"
                  example: "mnyumba muno (in this house — NC18 concord)"
            - forms: "a-"
              meanings:
                - class: "NC2"
                  meaning: "human plural prefix"
                  example: "anthu awa (these people)"
                - class: "NC6"
                  meaning: "mass/plural (prefix ma- → a-)"
                  example: "madzi (water)"

      dialectal_variation:
        description: "Variation across ChiNyanja/Chichewa varieties"

        major_dialects:
          - name: "Chichewa"
            region: "Malawi (national language); Central/Southern Malawi"
            speakers: "~8,000,000"
            characteristics:
              - "Prestige dialect; most documented"
              - "NC5 Ø- prefix predominant (li- rare)"
              - "NC12/13 (ka-/tu-) marginal"
              - "Main reference: Mchombo (2004)"
          - name: "ChiNyanja proper"
            region: "Zambia Eastern Province; Lusaka"
            speakers: "~1,200,000 in Zambia"
            characteristics:
              - "More conservative in some features"
              - "li- prefix in NC5 more common than Chichewa"
              - "Lingua franca of Zambia urban contexts"
          - name: "Nsenga"
            region: "Eastern Province, Petauke area"
            speakers: "~500,000"
            characteristics:
              - "# VERIFY: Nsenga-specific features vs ChiNyanja"
              - "High mutual intelligibility"
          - name: "Manganja"
            region: "Lake Malawi lakeshore"
            speakers: "~200,000"
            characteristics:
              - "# VERIFY: Manganja features"

        phonological_variation:
          - feature: "NC5 prefix"
            chichewa: "Ø- (zero prefix predominant)"
            zambia_nyanja: "li- more common"
            note: "Significant dialect difference; Mchombo (2004) analyses as underlying li- with deletion in Chichewa"
          - feature: "NC12/13 productivity"
            chichewa: "limited (ka-/tu- marginal)"
            older_nyanja: "more productive"

        lexical_variation:
          - concept: "house"
            chichewa: "nyumba (NC9)"
            note: "widespread across dialects"
          - concept: "person"
            all_dialects: "munthu (NC1)"
            plural: "anthu (NC2 a-)"

      usage_notes:

        register_variation:
          formal:
            description: "Education, government, church"
            features:
              - "Standard Chichewa/Nyanja orthography"
              - "Fuller morphological forms"
          informal:
            description: "Casual conversation"
            features:
              - "English loanwords common"
              - "Some code-switching with English/Bemba"
          respectful:
            description: "For elders and chiefs"
            features:
              - "NC2b honorific forms"
              - "Respectful terms for elders"

        contemporary_changes:
          - change: "english_loanwords"
            description: "English loanwords enter NC9"
            examples: ["foni (phone)", "kompyuta (computer)", "motokala (car)"]
          - change: "nc5_zero_spread"
            description: "Zero NC5 prefix spreading in urban Chichewa"
            trend: "increasing, especially in Malawi urban areas"

        cultural_notes:
          - note: "lingua_franca_zambia"
            description: "ChiNyanja/Nyanja is one of Zambia's official languages; widely used as urban lingua franca especially in Lusaka and Eastern Province"
          - note: "malawi_national_language"
            description: "Chichewa is Malawi's national language; government and education primary medium"
          - note: "nc2_a_prefix"
            description: "a- NC2 prefix distinguishes ChiNyanja from Chitonga/Chibemba; anthu (not banthu) for 'people'"
          - note: "nc14_u_prefix"
            description: "u- NC14 abstract prefix is unique in the GGT set; ChiNyanja uses u- where all other GGT languages use bu-"

        special_rules:
          - rule: "nc5_zero_prefix"
            description: "NC5 li- is often zero in Chichewa; parser must infer NC5 class from concord agreement"
          - rule: "negation_sa_infix"
            description: "ChiNyanja negation uses -sa- infix in SLOT4 (between SM and TAM) rather than pre-initial ta- (Chitonga) or ka- (Luvale)"
          - rule: "perfective_tonal"
            description: "Perfective aspect is encoded by H tone on TAM marker (na-→ná-), not by distinct final vowel"
          - rule: "nc14_u_abstract"
            description: "NC14 u- (NOT bu-); parser must not apply Chitonga/Chibemba bu- rules to ChiNyanja abstract nouns"


# ============================================================================
# CONCORD SYSTEM
# ============================================================================

concord_system:
  concords_metadata:
    description: "Agreement markers for ChiNyanja/Chichewa. Critical: NC2=a- (not ba-); NC7=chi-; NC8=zi-; NC14=u- (not bu-); NC16=pa-. NC2 a- cascades to ALL NC2 concord paradigms. No augment system."

  concords:

    subject_concords:
      description: "Subject markers appearing on verbs"
      position: "pre_TAM"

      NEG.SG:    { forms: ["si"], tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "NEG.1SG", note: "si- pre-initial negation exists but main negation is -sa- infix in SLOT4 (Mchombo 2004)" }
      1SG:       { forms: ["ndi"], allomorphs: { forms: ["nd", "n"] }, tone: "H", agreement: "NC1", syntax_expectation: "subject", gloss: "1SG.SM" }
      2SG:       { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "2SG.SM" }
      3SG:       { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC1", syntax_expectation: "subject", gloss: "3SG.SM" }
      NEG.1PL:   { forms: ["si"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "NEG.1PL", note: "# VERIFY" }
      1PL_EXCL:  { forms: ["ti"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.EXCL.SM", note: "ti- 1PL exclusive (Nyanja/Chichewa pattern; not tu-)" }
      1PL_INCL:  { forms: ["ti"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "1PL.INCL.SM" }
      2PL:       { forms: ["mu"], allomorphs: { forms: ["mw"] }, tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "2PL.SM" }
      3PL_HUMAN: { forms: ["a", "Ø"], tone: "L", agreement: "NC2", syntax_expectation: "subject", gloss: "3PL.SM", note: "NC2 a- SM; # VERIFY Mchombo (2004) 3PL SM form" }
      NC3:  { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC3", syntax_expectation: "subject", gloss: "CL3.SM" }
      NC4:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC4", syntax_expectation: "subject", gloss: "CL4.SM" }
      NC5:  { forms: ["li"], allomorphs: { forms: ["l"] }, tone: "L", agreement: "NC5", syntax_expectation: "subject", gloss: "CL5.SM", note: "li- SM for NC5 even when noun prefix is zero" }
      NC6:  { forms: ["a"], allomorphs: { forms: ["Ø"] }, tone: "L", agreement: "NC6", syntax_expectation: "subject", gloss: "CL6.SM" }
      NC7:  { forms: ["chi"], allomorphs: { forms: ["ch"] }, tone: "L", agreement: "NC7", syntax_expectation: "subject", gloss: "CL7.SM" }
      NC8:  { forms: ["zi"], allomorphs: { forms: ["z"] }, tone: "L", agreement: "NC8", syntax_expectation: "subject", gloss: "CL8.SM" }
      NC9:  { forms: ["i"], allomorphs: { forms: ["y"] }, tone: "L", agreement: "NC9", syntax_expectation: "subject", gloss: "CL9.SM" }
      NC10: { forms: ["zi"], allomorphs: { forms: ["z"] }, tone: "L", agreement: "NC10", syntax_expectation: "subject", gloss: "CL10.SM" }
      NC11: { forms: ["lu"], allomorphs: { forms: ["lw"] }, tone: "L", agreement: "NC11", syntax_expectation: "subject", gloss: "CL11.SM" }
      NC12: { forms: ["ka"], allomorphs: { forms: ["k"] }, tone: "L", agreement: "NC12", syntax_expectation: "subject", gloss: "CL12.SM" }
      NC13: { forms: ["tu"], allomorphs: { forms: ["tw"] }, tone: "L", agreement: "NC13", syntax_expectation: "subject", gloss: "CL13.SM" }
      NC14: { forms: ["u"], allomorphs: { forms: ["w"] }, tone: "L", agreement: "NC14", syntax_expectation: "subject", gloss: "CL14.SM", note: "u- SM for NC14 u- class (not bu-)" }
      NC15: { forms: ["ku"], allomorphs: { forms: ["kw"] }, tone: "L", agreement: "NC15", syntax_expectation: "subject", gloss: "CL15.SM" }
      NC16: { forms: ["pa"], allomorphs: { forms: ["p"] }, tone: "L", agreement: "NC16", syntax_expectation: "subject", gloss: "CL16.SM" }
      NC17: { forms: ["ku"], allomorphs: { forms: ["kw"] }, tone: "L", agreement: "NC17", syntax_expectation: "subject", gloss: "CL17.SM" }
      NC18: { forms: ["mu"], allomorphs: { forms: ["mw"] }, tone: "L", agreement: "NC18", syntax_expectation: "subject", gloss: "CL18.SM" }

    object_concords:
